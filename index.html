// PAGE: REGISTER TALENT (3-step form)
// ═══════════════════════════════════════════
function RegisterTalent({onNavigate}){
  const [step,setStep]=useState(1);
  const [done,setDone]=useState(false);
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const [f,setF]=useState({first:"",last:"",email:"",password:"",location:"",gender:"",age:"",height:"",weight:"",hair:"",eyes:"",ethnicity:"",union_status:"Non-Union",types:[],bio:"",training:"",skills:"",agent:"",agree:false});
  const up=(k,v)=>setF(x=>({...x,[k]:v}));
  const toggleType=t=>setF(x=>({...x,types:x.types.includes(t)?x.types.filter(y=>y!==t):[...x.types,t]}));
  const validStep1=()=>{if(!f.first||!f.last){setErr("Please enter your first and last name.");return false;}if(!f.email||!f.email.includes("@")){setErr("Please enter a valid email address.");return false;}if(!f.password||f.password.length<8){setErr("Password must be at least 8 characters.");return false;}if(!f.location){setErr("Please enter your location.");return false;}setErr("");return true;};
  const submit=async()=>{
    if(!f.agree){setErr("Please agree to the Terms of Service and Privacy Policy.");return;}
    setErr("");setLoading(true);
    try{
      const display_name=(f.first+" "+f.last).trim();
      const {data,error}=await window.sb.auth.signUp({
        email:f.email.trim().toLowerCase(),
        password:f.password,
        options:{
          emailRedirectTo:window.location.origin,
          data:{user_type:"talent",display_name}
        }
      });
      if(error)throw error;
      // Update the auto-created profile row with the rest
      if(data.user){
        const patch={
          display_name,
          user_type:"talent",
          location:f.location,
          gender:f.gender||null,
          age:f.age?parseInt(f.age):null,
          height:f.height||null,
          weight:f.weight||null,
          hair:f.hair||null,
          eyes:f.eyes||null,
          ethnicity:f.ethnicity||null,
          union_status:f.union_status,
          bio:f.bio||null,
          training:f.training||null,
          skills:f.skills?f.skills.split(",").map(s=>s.trim()).filter(Boolean):[],
          agent:f.agent||null,
          onboarded:true
        };
        await window.sb.from("profiles").update(patch).eq("id",data.user.id);
      }
      setDone(true);
    }catch(e){
      setErr(e.message||"Something went wrong. Please try again.");
    }finally{setLoading(false);}
  };
  if(done)return(<div className="page"><div className="success-msg" style={{padding:"80px 24px",maxWidth:560,margin:"0 auto"}}><div className="check">✓</div><h3>Check your email to confirm</h3><p style={{marginBottom:12}}>We just sent a verification link to <strong>{f.email}</strong>.</p><p style={{marginBottom:24,color:"var(--t2)",fontSize:14}}>Click the link in that email to activate your account. Then you can log in and start submitting to castings.</p><div style={{display:"flex",gap:12,justifyContent:"center"}}><button className="btn-p" onClick={()=>onNavigate("login")}>Go to Login</button><button className="btn-s" onClick={()=>onNavigate("home")}>Home</button></div></div><Footer onNavigate={onNavigate}/></div>);
  return(
    <div className="page"><div style={{maxWidth:640,margin:"0 auto"}}>
      <div className="section-label">Join SwipeCast</div>
      <h1 style={{fontWeight:800,fontSize:36,letterSpacing:"-1.5px",marginBottom:8}}>Create Your Talent Profile</h1>
      <p style={{color:"var(--t2)",fontSize:14,marginBottom:32}}>100% free. No credit card. No hidden fees. Ever. Already have an account? <span style={{color:"var(--acc)",cursor:"pointer"}} onClick={()=>onNavigate("login")}>Log in</span></p>
      <div style={{display:"flex",gap:8,marginBottom:32}}>{[1,2,3].map(s=><div key={s} style={{flex:1,height:4,borderRadius:2,background:s<=step?"var(--acc)":"var(--s3)",transition:"background .3s"}}/>)}</div>
      {err&&<div style={{background:"rgba(255,100,100,0.1)",border:"1px solid rgba(255,100,100,0.3)",color:"#c0392b",padding:"10px 14px",borderRadius:8,fontSize:13,marginBottom:16}}>{err}</div>}

      {step===1&&<><h3 style={{fontSize:18,fontWeight:700,marginBottom:20}}>Step 1: Account Info</h3>
        <div className="form-row"><div className="form-group"><label className="label">First Name</label><input className="input" placeholder="First name" value={f.first} onChange={e=>up("first",e.target.value)}/></div><div className="form-group"><label className="label">Last Name</label><input className="input" placeholder="Last name" value={f.last} onChange={e=>up("last",e.target.value)}/></div></div>
        <div className="form-group"><label className="label">Email Address</label><input className="input" type="email" placeholder="you@email.com" value={f.email} onChange={e=>up("email",e.target.value)}/></div>
        <div className="form-group"><label className="label">Password</label><input className="input" type="password" placeholder="Create a password (8+ characters)" value={f.password} onChange={e=>up("password",e.target.value)}/></div>
        <div className="form-group"><label className="label">Location</label><input className="input" placeholder="City, State (e.g. New York, NY)" value={f.location} onChange={e=>up("location",e.target.value)}/></div>
        <button className="btn-p" style={{width:"100%",marginTop:8}} onClick={()=>{if(validStep1())setStep(2);}}>Continue →</button></>}

      {step===2&&<><h3 style={{fontSize:18,fontWeight:700,marginBottom:20}}>Step 2: Physical Stats & Details</h3>
        <div className="form-row"><div className="form-group"><label className="label">Gender</label><select className="select" style={{width:"100%"}} value={f.gender} onChange={e=>up("gender",e.target.value)}><option value="">Select</option><option>Female</option><option>Male</option><option>Non-Binary</option><option>Other</option></select></div><div className="form-group"><label className="label">Age</label><input className="input" type="number" placeholder="Age" value={f.age} onChange={e=>up("age",e.target.value)}/></div></div>
        <div className="form-row"><div className="form-group"><label className="label">Height</label><input className="input" placeholder={'e.g. 5\'8"'} value={f.height} onChange={e=>up("height",e.target.value)}/></div><div className="form-group"><label className="label">Weight</label><input className="input" placeholder="e.g. 150 lbs" value={f.weight} onChange={e=>up("weight",e.target.value)}/></div></div>
        <div className="form-row"><div className="form-group"><label className="label">Hair Color</label><input className="input" placeholder="e.g. Dark Brown" value={f.hair} onChange={e=>up("hair",e.target.value)}/></div><div className="form-group"><label className="label">Eye Color</label><input className="input" placeholder="e.g. Brown" value={f.eyes} onChange={e=>up("eyes",e.target.value)}/></div></div>
        <div className="form-row"><div className="form-group"><label className="label">Ethnicity</label><input className="input" placeholder="e.g. Latina, Black, Asian" value={f.ethnicity} onChange={e=>up("ethnicity",e.target.value)}/></div><div className="form-group"><label className="label">Union Status</label><select className="select" style={{width:"100%"}} value={f.union_status} onChange={e=>up("union_status",e.target.value)}><option>Non-Union</option><option>SAG-AFTRA</option><option>AEA</option><option>SAG-AFTRA / AEA</option><option>ACTRA</option></select></div></div>
        <div className="form-group"><label className="label">Talent Type (select all that apply)</label><div style={{display:"flex",gap:16,flexWrap:"wrap",marginTop:6}}>{["Film","TV","Theater","Commercial","Modeling","Voiceover"].map(t=><label key={t} className="checkbox-row"><input type="checkbox" checked={f.types.includes(t)} onChange={()=>toggleType(t)}/>{t}</label>)}</div></div>
        <div style={{display:"flex",gap:12,marginTop:8}}><button className="btn-s" onClick={()=>setStep(1)}>← Back</button><button className="btn-p" style={{flex:1}} onClick={()=>setStep(3)}>Continue →</button></div></>}

      {step===3&&<><h3 style={{fontSize:18,fontWeight:700,marginBottom:20}}>Step 3: Your Craft</h3>
        <div className="form-group"><label className="label">Bio / About</label><textarea className="textarea" placeholder="Tell casting directors about yourself..." style={{minHeight:120}} value={f.bio} onChange={e=>up("bio",e.target.value)}></textarea></div>
        <div className="form-group"><label className="label">Training</label><input className="input" placeholder="e.g. BFA Acting, NYU Tisch" value={f.training} onChange={e=>up("training",e.target.value)}/></div>
        <div className="form-group"><label className="label">Special Skills</label><input className="input" placeholder="e.g. Stage Combat, Fluent Spanish (comma separated)" value={f.skills} onChange={e=>up("skills",e.target.value)}/></div>
        <div className="form-group"><label className="label">Agent / Manager (optional)</label><input className="input" placeholder="Representation or 'Unrepresented'" value={f.agent} onChange={e=>up("agent",e.target.value)}/></div>
        <div style={{background:"var(--s2)",borderRadius:10,padding:14,fontSize:12,color:"var(--t2)",marginTop:4}}>📸 You'll be able to upload your headshot and demo reel on your profile page after you verify your email.</div>
        <label className="checkbox-row" style={{marginTop:12}}><input type="checkbox" checked={f.agree} onChange={e=>up("agree",e.target.checked)}/> I agree to SwipeCast's Terms of Service and Privacy Policy</label>
        <div style={{display:"flex",gap:12,marginTop:8}}><button className="btn-s" onClick={()=>setStep(2)} disabled={loading}>← Back</button><button className="btn-p" style={{flex:1}} onClick={submit} disabled={loading}>{loading?"Creating your profile…":"Create My Profile — Free"}</button></div></>}
    </div><Footer onNavigate={onNavigate}/></div>
  );
}

    setErr("");

  return(
    <div className="page"><div style={{maxWidth:640,margin:"0 auto"}}>

// PAGE: LOGIN
// ═══════════════════════════════════════════
function LoginPage({onNavigate,onLoggedIn}){
  const [email,setEmail]=useState("");
  const [password,setPassword]=useState("");
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const [forgot,setForgot]=useState(false);
  const [sentReset,setSentReset]=useState(false);
  const submit=async(e)=>{
    if(e&&e.preventDefault)e.preventDefault();
    setErr("");
    if(!email||!email.includes("@")){setErr("Please enter a valid email.");return;}
    if(!forgot&&!password){setErr("Please enter your password.");return;}
    setLoading(true);
    try{
      if(forgot){
        const {error}=await window.sb.auth.resetPasswordForEmail(email.trim().toLowerCase(),{redirectTo:window.location.origin});
        if(error)throw error;
        setSentReset(true);
      }else{
        const {data,error}=await window.sb.auth.signInWithPassword({email:email.trim().toLowerCase(),password});
        if(error)throw error;
        if(onLoggedIn&&data.user)await onLoggedIn(data.user);
      }
    }catch(e){
      let msg=e.message||"Login failed. Please try again.";
      if(msg.toLowerCase().includes("email not confirmed"))msg="Please verify your email first. Check your inbox for the confirmation link.";
      if(msg.toLowerCase().includes("invalid login credentials"))msg="Email or password incorrect.";
      setErr(msg);
    }finally{setLoading(false);}
  };
  if(sentReset)return(<div className="page"><div className="success-msg" style={{padding:"80px 24px",maxWidth:480,margin:"0 auto"}}><div className="check">✓</div><h3>Check your email</h3><p>We sent a password reset link to <strong>{email}</strong>.</p><button className="btn-s" style={{marginTop:24}} onClick={()=>{setForgot(false);setSentReset(false);}}>Back to login</button></div><Footer onNavigate={onNavigate}/></div>);
  return(
    <div className="page"><form onSubmit={submit} style={{maxWidth:420,margin:"60px auto 0"}}>
      <div style={{textAlign:"center",marginBottom:32}}>
        <div className="logo" style={{justifyContent:"center",fontSize:24,marginBottom:12}}><div className="logo-i" style={{width:36,height:36,fontSize:20}}>↔</div>SwipeCast</div>
        <h2 style={{fontSize:28,fontWeight:800,marginBottom:8}}>{forgot?"Reset Password":"Welcome Back"}</h2>
        <p style={{color:"var(--t2)",fontSize:14}}>{forgot?"Enter your email — we'll send a reset link.":"Log in to your account"}</p>
      </div>

const BLOG_CONTENT={
  1:"The grid view has been the default interface for casting platforms since they went digital. Open a breakdown, and you see 50, 100, sometimes 200+ headshots arranged in a tidy grid. It looks organized. It feels efficient. But it's destroying the casting process.\n\nCasting directors are human. When presented with a wall of faces, they default to pattern recognition — scanning for what 'looks right' in under two seconds per face. Research on visual attention shows that grid layouts encourage skimming, not evaluating. The result? Great actors with slightly unconventional headshots get overlooked entirely.\n\nSwipeCast was designed around a different principle: forced attention. By presenting one headshot at a time and requiring a decision (callback or pass), we ensure every submission gets a genuine look. Our internal data shows that casting directors spend an average of 8.4 seconds per submission on SwipeCast, compared to 1.7 seconds on grid-based platforms.\n\nThe swipe mechanic isn't a gimmick — it's a design choice rooted in how human attention actually works. And for talent, it means the playing field is finally level.",
  2:"If you're an actor, model, or performer, you've probably done the math: $20/month for one casting site, $15/month for another, maybe $30/month for the 'premium' one. That's $780 a year — just for the privilege of submitting to roles.\n\nLet's be honest about what that money buys: access to a database. You upload your headshot, fill out your stats, and hope someone sees you. Most platforms can't even guarantee your submission gets viewed.\n\nSwipeCast takes a fundamentally different approach. Talent accounts are free. No trial period, no credit card, no 'freemium' tier with limited features. You get unlimited submissions, full profile tools, and — most importantly — a guarantee that every submission you send is seen individually by the casting director.\n\nSo who pays? Casting directors pay $20 per casting post. That's it. No subscriptions, no seat licenses, no hidden fees. We believe the people hiring should bear the cost of the platform, not the people auditioning.\n\nIf a platform charges actors monthly fees, ask yourself: whose interests are they really serving?",
  3:"After six months in closed beta with 200 casting directors and 12,000 talent profiles, SwipeCast is officially live in New York City and Los Angeles.\n\nThe numbers from beta exceeded our expectations. Over 50,000 talent have created profiles. Casting directors reviewed an average of 94% of all submissions (compared to the industry average of roughly 40% on grid-based platforms). And talent reported a 3x higher callback rate than on competing platforms.\n\nLaunch markets were chosen strategically — NYC and LA represent the two largest talent pools in North America and account for over 60% of all professional casting activity.\n\nWhat's next? Chicago, Atlanta, and Vancouver are on the roadmap for Q3 2026, with London and Toronto planned for Q4. We're also rolling out self-tape integration, direct messaging between talent and casting, and audition scheduling tools in the coming months.\n\nTo every actor, model, and performer who signed up during beta: thank you for believing in a better way.",
  4:"We sat down with 15 working casting directors across film, TV, commercial, and theater to ask one question: What makes you swipe right on a headshot?\n\nThe answers were surprisingly consistent. Here's what they told us:\n\n1. Authenticity over glamour. 'I want to see YOU, not a retouched version of you,' said one Netflix casting director. 'If you show up to the audition looking nothing like your headshot, we both wasted our time.'\n\n2. Eyes tell the story. Almost every CD mentioned eyes first. 'The eyes need to be alive. I'm looking for someone who can act through a still image.'\n\n3. Simple backgrounds. Distracting backgrounds, heavy filters, and artistic crops all got negative reactions. 'Plain gray or white. Maybe a subtle outdoor background. That's it.'\n\n4. Current photos. 'If your headshot is more than two years old, get a new one. People change. Hair changes. Weight changes. I need to know what you look like now.'\n\n5. Resolution matters. Blurry, low-res, or poorly lit headshots were the #1 instant-pass reason cited. Invest in a professional photographer — it's the single best investment in your career.",
  5:"When we started SwipeCast, people asked us the same question: 'If it's free for talent, how do you make money?'\n\nThe answer is simple: casting directors pay $20 per casting post. That's our entire business model. No talent subscriptions. No premium tiers for actors. No data selling. No ads.\n\nWhy? Because the current model is broken. Legacy casting platforms charge actors $15-$30 per month — effectively a tax on people who are often working service jobs between auditions. Meanwhile, those same platforms can't even guarantee a casting director will see your submission.\n\nWe believe the cost of casting infrastructure should be borne by the people doing the hiring, not the people seeking work. A casting director posting a breakdown is making a business decision with a budget behind it. Asking them to pay $20 to access SwipeCast's talent pool is reasonable and sustainable.\n\nOur long-term sustainability comes from volume. As more casting directors use the platform, per-post revenue scales naturally. For larger studios and agencies, we offer custom enterprise pricing with team access, branding, and API integration.\n\nThe mission hasn't changed since day one: make casting fair, make it efficient, and never charge the talent."
};

const RESOURCE_CONTENT={
  "Setting Up Your Profile":["Getting Started","Your profile is your first impression on SwipeCast. Here is how to make it count.\n\n**Step 1: Upload a Professional Headshot**\nThis is the single most important element of your profile. Use a current, high-resolution photo (at least 800x1000px) with a clean background. Your face should fill about 60% of the frame. Natural lighting is best.\n\n**Step 2: Fill Out Your Stats Completely**\nCasting directors filter by height, age, gender, ethnicity, and union status. Every field you leave blank is a search you won't appear in. Be accurate — showing up to an audition looking different from your profile wastes everyone's time.\n\n**Step 3: Write a Strong Bio**\nTwo to three sentences that tell a casting director who you are as a performer. Lead with your training, then your strengths, then what you're looking for.\n\n**Step 4: Add Your Credits**\nList your most impressive or recent credits first. Include the role name, project title, project type (film, TV, theater), and year.\n\n**Step 5: List Special Skills**\nBe honest and specific. 'Fluent Spanish' is useful. 'Stage combat certified (SAFD)' books roles."],
  "How Submissions Work":["Getting Started","SwipeCast uses a one-tap submission process designed to be fast for talent and thorough for casting directors.\n\n**Finding Castings**\nBrowse open castings from the main search page. Filter by type (Film, TV, Theater, Commercial, Modeling), location, and union status.\n\n**Submitting**\nWhen you find a role that fits, click 'Apply Now.' Select which headshot to submit and optionally write a cover note.\n\n**What Happens Next**\nYour submission enters the casting director's review queue. On SwipeCast, directors review submissions one at a time — your headshot is guaranteed to be seen individually.\n\n**Tracking Your Submissions**\nYour dashboard shows all active submissions with their status. When a casting director adds you to their callback list, you'll receive a notification.\n\n**Tips for Better Submissions**\n- Only submit to roles that genuinely match your type\n- Use a headshot that fits the character breakdown\n- Keep cover notes brief (2-3 sentences max)\n- Submit early — casting directors often start reviewing before the deadline"],
  "The Swipe System Explained":["Getting Started","The swipe system is what makes SwipeCast fundamentally different from every other casting platform.\n\n**The Problem with Grids**\nOn traditional platforms, casting directors see a grid of 50-200+ headshots at once. Research shows they spend an average of 1.7 seconds per face.\n\n**How Swiping Works**\nEach submission is presented one at a time as a full card — headshot, name, stats, and key skills. The casting director must take action: swipe right for callback, swipe left to pass. No skipping.\n\n**Why It Works**\nOur data shows casting directors spend an average of 8.4 seconds per submission on SwipeCast — nearly 5x longer than grid-based platforms.\n\n**For Talent**\nEvery submission you send is genuinely seen and evaluated. Whether you're seasoned SAG-AFTRA or a first-time submitter, your headshot gets the same full-screen attention.\n\n**For Casting Directors**\nThe swipe interface is faster than it sounds. Most CDs review 50+ submissions in under 15 minutes, with better callback quality."],
  "Headshot Best Practices":["Optimize Your Profile","We surveyed 15 working casting directors. Here is what they actually look for.\n\n**Authenticity Over Glamour**\nYour headshot should look like you on your best day — not a retouched fantasy. CDs consistently said: 'If you show up looking different from your headshot, we've both wasted our time.'\n\n**Eyes First**\nEvery casting director mentioned eyes. 'The eyes need to be alive. I'm looking for someone who can act through a still image.'\n\n**Keep Backgrounds Simple**\nPlain gray, white, or a subtle outdoor background. Nothing distracting. No heavy filters.\n\n**Current Photos Only**\nIf your headshot is more than two years old, get a new one.\n\n**Technical Requirements**\n- Resolution: at least 800x1000px\n- Format: JPG or PNG\n- Lighting: natural or soft studio lighting\n- Framing: head and shoulders, face filling 60% of frame\n- Expression: neutral to slight smile"],
  "Writing Your Bio":["Optimize Your Profile","Your bio is a 2-3 sentence pitch that helps casting directors understand who you are.\n\n**What to Include**\n- Your training and where you trained\n- Your primary performance strengths\n- What types of roles you're strongest in\n- Any notable achievements\n\n**What to Avoid**\n- Life stories ('I've been acting since I was 3...')\n- Vague statements ('I'm passionate about storytelling')\n- Self-deprecation ('I'm still learning but...')\n\n**Strong Examples**\n'NYC-based actress with 8 years of stage experience. Tisch-trained (Meisner). Strong with intense dramatic material and physical roles. Fluent in Spanish.'\n\n'Versatile character actor with comedy and drama range. Yale Drama MFA. Extensive TV credits including recurring roles.'\n\n**The Formula**\n[Location]-based [type] with [experience level]. [Training]. [Strength/specialty]. [Unique skill or quality]."],
  "Reel Do's and Don'ts":["Optimize Your Profile","Your demo reel is your moving headshot. Here is how to make it work.\n\n**The Dos**\n- Keep it under 2 minutes total\n- Lead with your best, most recent work\n- Show range: include at least 2 different types of scenes\n- Use high-quality footage only\n- Put your name and contact at the beginning and end\n\n**The Don'ts**\n- No montages set to music (CDs skip these immediately)\n- No behind-the-scenes footage\n- No student film footage unless production quality is professional\n- No scenes where you're barely visible\n- No opening animations or long intros\n\n**If You Don't Have Footage**\nCreate a self-tape reel. Pick 2-3 contrasting monologues and record them with professional lighting and audio. A clean self-tape reel beats a poorly produced scene reel.\n\n**Technical Specs**\n- Format: MP4 (H.264)\n- Resolution: 1080p minimum\n- File size: under 100MB"],
  "Understanding Union Status":["Industry Knowledge","Union status affects which roles you can submit for and how you're paid.\n\n**SAG-AFTRA**\nCovers film, TV, commercials, voiceover, and new media. Members earn minimum rates (scale), receive residuals, and have access to health and pension plans. Joining requires booking a SAG-AFTRA job, being a member of an affiliated union for one year, or accumulating three vouchers as background.\n\n**AEA (Actors' Equity)**\nCovers stage actors and stage managers in professional theater. Members earn minimum weekly salaries based on theater size and contract type.\n\n**Non-Union**\nNo union membership. You can submit to any non-union role and many union roles open to non-union talent. Pay rates vary widely.\n\n**On SwipeCast**\nEach casting post specifies its union requirement. Your profile's union status is used for filtering. Be accurate."],
  "How to Read a Breakdown":["Industry Knowledge","A breakdown is the industry document that describes an open role.\n\n**Project Title & Type**\nWhether it's film, TV, theater, commercial, or modeling. The type affects pay structure and time commitment.\n\n**Production Company**\nWho's making it. Research them — a legitimate company will have credits or an IMDb page.\n\n**Role Description**\nAge range, gender, ethnicity, physical requirements, personality traits. If you're outside the specified range, don't submit.\n\n**Specs**\nShorthand for physical and demographic requirements. 'Female, 25-35, Latina, 5'4\"-5'8\"' means exactly what it says.\n\n**Union Status**\nWhether the production is SAG-AFTRA, AEA, Non-Union, or open to both. Only submit if your status matches.\n\n**Location & Dates**\nWhere the production shoots and when. Make sure you're available.\n\n**Deadline**\nSubmit before it. Many CDs start reviewing early, so earlier is better."],
  "Self-Tape Guidelines":["Industry Knowledge","Self-tapes are now standard in the audition process.\n\n**Framing**\nMedium close-up: head and shoulders. Eyes in the upper third of frame. Shoot in landscape unless asked otherwise.\n\n**Background**\nSolid, neutral color. Blue or gray is standard. Avoid patterns and windows.\n\n**Lighting**\nTwo-point lighting is ideal: key light at 45 degrees, fill light on the other side. Natural window light works if consistent. Avoid overhead lighting.\n\n**Audio**\nThis is where most self-tapes fail. Use a lavalier microphone or record in a quiet, carpeted room. No echo, no background noise.\n\n**Reader**\nHave someone read the other character's lines off-camera. They should be flat and neutral.\n\n**Slating**\nStart with: your name, the role, and your height. Smile. Under 10 seconds.\n\n**File Delivery**\nMP4 format, 1080p, under 100MB. Label: YourName_RoleName_ProjectName."]
};

// PAGE: CASTING DETAIL
// ═══════════════════════════════════════════
function CastingDetailPage({casting,onBack,onNavigate,isLoggedIn,onRequireAuth}){
  const [applyRole,setApplyRole]=useState(null);
  const [applied,setApplied]=useState(new Set());
  const [coverNote,setCoverNote]=useState("");
  const [submitting,setSubmitting]=useState(false);
  const [applyErr,setApplyErr]=useState("");
  const [realRoleIds,setRealRoleIds]=useState({}); // maps role index -> real DB role id (for DB-backed castings)
  const c=casting;
  const isDbCasting=!!(c&&c.id&&typeof c.id==="string"&&c.id.length>20); // UUID check
  const handleApply=(r,i)=>{if(isLoggedIn){setApplyRole({...r,idx:i});setCoverNote("");setApplyErr("");}else{onRequireAuth&&onRequireAuth(c,{...r,idx:i});}};
  useEffect(()=>{(async()=>{
    if(!isLoggedIn||!c)return;
    // if casting is DB-backed, fetch real role ids & already-applied
    if(isDbCasting){
      const {data:roles}=await window.sb.from("roles").select("id,name").eq("casting_id",c.id);
      const map={};(roles||[]).forEach((r,idx)=>{map[idx]=r.id;});
      setRealRoleIds(map);
      const {data:{session:s}}=await window.sb.auth.getSession();
      if(s?.user){
        const {data:apps}=await window.sb.from("applications").select("role_id").eq("talent_id",s.user.id).eq("casting_id",c.id);
        const appliedIdx=new Set();
        (apps||[]).forEach(a=>{Object.entries(map).forEach(([idx,rid])=>{if(rid===a.role_id)appliedIdx.add(parseInt(idx));});});
        setApplied(appliedIdx);
      }
    }
  })();},[c,isLoggedIn,isDbCasting]);
  const submitApp=async()=>{
    setApplyErr("");setSubmitting(true);
    try{
      const {data:{session:s}}=await window.sb.auth.getSession();
      if(!s?.user)throw new Error("You must be logged in.");
      if(!isDbCasting){
        // demo casting — fake it for now (still mark applied locally so UI feels real)
        setApplied(p=>new Set([...p,applyRole.idx]));
        setApplyRole(null);return;
      }
      const roleId=realRoleIds[applyRole.idx];
      if(!roleId)throw new Error("Role not found.");
      const {error}=await window.sb.from("applications").insert({role_id:roleId,casting_id:c.id,talent_id:s.user.id,cover_note:coverNote||null});
      if(error)throw error;
      setApplied(p=>new Set([...p,applyRole.idx]));
      setApplyRole(null);
    }catch(e){
      let msg=e.message||"Could not submit.";
      if(msg.includes("duplicate"))msg="You already applied to this role.";
      setApplyErr(msg);
    }finally{setSubmitting(false);}
  };
  if(!c)return(<div className="page"><p>Casting not found.</p><button className="btn-s" onClick={onBack}>← Back</button></div>);
  const render=(txt)=>txt.split(/(\*[^*]+\*)/g).map((s,i)=>s.startsWith("*")&&s.endsWith("*")?<em key={i} style={{fontStyle:"italic",color:"var(--t1)"}}>{s.slice(1,-1)}</em>:<span key={i}>{s}</span>);
  return(<div className="page" style={{maxWidth:920}}>
    <button className="btn-s btn-sm mb-20" onClick={onBack}>← Back to Castings</button>

    <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
      <span className="badge tag-acc">{c.type}</span>
      <span className="badge" style={{background:"var(--s2)",color:"var(--t2)"}}>{c.union}</span>
      <span className="badge" style={{background:"var(--s2)",color:"var(--t2)"}}>{c.location}</span>
    </div>
    <h1 style={{fontSize:42,fontWeight:800,letterSpacing:-1.5,marginBottom:8,color:"var(--t1)"}}>{c.title}</h1>
    <p style={{color:"var(--t2)",fontSize:17,marginBottom:4}}>{c.tagline}</p>
    <p style={{color:"var(--t3)",fontSize:13,marginBottom:28}}>Produced by {c.prod} {c.director?`· Directed by ${c.director}`:""}</p>

    <div style={{background:"var(--s1)",border:"1px solid var(--bdr)",borderRadius:12,padding:"20px 24px",marginBottom:32,display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:"14px 28px"}}>
      <div><div style={{fontSize:11,color:"var(--t3)",textTransform:"uppercase",letterSpacing:1.5,marginBottom:4,fontWeight:700}}>Union</div><div style={{fontSize:14,color:"var(--t1)",fontWeight:600}}>{c.union}</div></div>
      <div><div style={{fontSize:11,color:"var(--t3)",textTransform:"uppercase",letterSpacing:1.5,marginBottom:4,fontWeight:700}}>Location</div><div style={{fontSize:14,color:"var(--t1)",fontWeight:600}}>{c.location}</div></div>
      <div><div style={{fontSize:11,color:"var(--t3)",textTransform:"uppercase",letterSpacing:1.5,marginBottom:4,fontWeight:700}}>Rate</div><div style={{fontSize:14,color:"var(--t1)",fontWeight:600}}>{c.rate||c.pay}</div></div>
      <div><div style={{fontSize:11,color:"var(--t3)",textTransform:"uppercase",letterSpacing:1.5,marginBottom:4,fontWeight:700}}>Submission Deadline</div><div style={{fontSize:14,color:"var(--t1)",fontWeight:600}}>{c.deadline}</div></div>
      {c.shoots&&<div><div style={{fontSize:11,color:"var(--t3)",textTransform:"uppercase",letterSpacing:1.5,marginBottom:4,fontWeight:700}}>Shoot / Run Dates</div><div style={{fontSize:14,color:"var(--t1)",fontWeight:600}}>{c.shoots}</div></div>}
      {c.rehearsal&&<div><div style={{fontSize:11,color:"var(--t3)",textTransform:"uppercase",letterSpacing:1.5,marginBottom:4,fontWeight:700}}>Rehearsal</div><div style={{fontSize:14,color:"var(--t1)",fontWeight:600}}>{c.rehearsal}</div></div>}
      {c.auditionFormat&&<div style={{gridColumn:"1 / -1"}}><div style={{fontSize:11,color:"var(--t3)",textTransform:"uppercase",letterSpacing:1.5,marginBottom:4,fontWeight:700}}>Audition Format</div><div style={{fontSize:14,color:"var(--t1)",fontWeight:600}}>{c.auditionFormat}</div></div>}
    </div>

    <section style={{marginBottom:40}}>
      <div className="section-label" style={{marginBottom:12}}>Project Summary</div>
      <p style={{color:"var(--t2)",fontSize:15,lineHeight:1.75,maxWidth:720}}>{c.synopsis?render(c.synopsis):c.desc}</p>
    </section>

    <section style={{marginBottom:40}}>
      <div className="flex-between" style={{marginBottom:16}}>
        <div>
          <div className="section-label">Roles Casting</div>
          <h2 style={{fontSize:26,fontWeight:800,letterSpacing:-0.5,marginTop:4}}>{c.roles?.length||0} Role{(c.roles?.length||0)===1?"":"s"} Open</h2>
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        {(c.roles||[]).map((r,i)=>
          <div key={i} className="card" style={{padding:"22px 26px"}}>
            <div className="flex-between" style={{marginBottom:10,alignItems:"flex-start",gap:16}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",gap:8,marginBottom:8,flexWrap:"wrap"}}>
                  <span className="badge tag-acc">{r.type}</span>
                  <span className="badge" style={{background:"var(--s2)",color:"var(--t2)"}}>{r.gender}</span>
                  <span className="badge" style={{background:"var(--s2)",color:"var(--t2)"}}>Age {r.ageRange}</span>
                  <span className="badge" style={{background:"var(--s2)",color:"var(--t2)"}}>{r.ethnicity}</span>
                </div>
                <h3 style={{fontSize:18,fontWeight:800,letterSpacing:"-0.3px",marginBottom:8,color:"var(--t1)"}}>{r.name}</h3>
                <p style={{color:"var(--t2)",fontSize:14,lineHeight:1.65}}>{r.desc}</p>
              </div>
              <div>
                {applied.has(i)?<span className="tag tag-grn" style={{fontSize:12,fontWeight:700,padding:"8px 14px"}}>✓ Applied</span>:<button className="btn-p btn-sm" onClick={()=>handleApply(r,i)}>Apply for Role</button>}
              </div>
            </div>
          </div>)}
      </div>
    </section>

    <section style={{padding:"28px 32px",background:"var(--s1)",border:"1px solid var(--bdr)",borderRadius:12,marginBottom:32,textAlign:"center"}}>
      <h3 style={{fontSize:18,fontWeight:700,marginBottom:6}}>Think you're right for multiple roles?</h3>
      <p style={{color:"var(--t2)",fontSize:13,marginBottom:14}}>You can submit for as many roles as you'd like. Each submission is reviewed individually by the casting director.</p>
      <button className="btn-s btn-sm" onClick={onBack}>← Back to All Castings</button>
    </section>

    {applyRole&&<div className="modal-overlay" onClick={()=>!submitting&&setApplyRole(null)}><div className="modal" onClick={e=>e.stopPropagation()}>
      <h2>Submit for Role</h2>
      <div style={{background:"var(--s2)",borderRadius:10,padding:16,marginBottom:20}}>
        <h4 style={{fontSize:14,fontWeight:700}}>{applyRole.name}</h4>
        <p style={{color:"var(--t2)",fontSize:12,marginTop:2}}>{c.title} · {c.prod}</p>
      </div>
      {applyErr&&<div style={{background:"rgba(255,100,100,0.1)",border:"1px solid rgba(255,100,100,0.3)",color:"#c0392b",padding:"10px 14px",borderRadius:8,fontSize:13,marginBottom:12}}>{applyErr}</div>}
      <div className="form-group"><label className="label">Cover Note (Optional)</label><textarea className="textarea" placeholder="Tell the casting director why you're right for this role..." value={coverNote} onChange={e=>setCoverNote(e.target.value)}></textarea></div>
      <p style={{fontSize:12,color:"var(--t3)",marginTop:-4,marginBottom:16}}>The casting director will see your full profile — headshot, reel, bio, and credits — along with this note.</p>
      <div style={{display:"flex",gap:12,marginTop:24}}><button className="btn-p" style={{flex:1}} onClick={submitApp} disabled={submitting}>{submitting?"Submitting…":"Submit Application"}</button><button className="btn-s" onClick={()=>setApplyRole(null)} disabled={submitting}>Cancel</button></div>
    </div></div>}

    <Footer onNavigate={onNavigate}/></div>);
}

          </button>)}

            </div>
            <div className="casting-row-right">
              <span className="badge tag-acc">{j.dept}</span>
              <span style={{color:"var(--acc)",fontSize:18}}>→</span>
            </div>
          </div>)}

    <section style={{maxWidth:820,margin:"60px auto",padding:"44px",background:"linear-gradient(135deg,rgba(26,26,46,.06),rgba(26,26,46,.02))",border:"1px solid var(--bdr)",borderRadius:16,textAlign:"center"}}>
      <h3 style={{fontWeight:800,fontSize:26,marginBottom:10}}>Don't see your role?</h3>

    <Footer onNavigate={onNavigate}/></div>);

function SearchPage({onViewProfile,userType,onNavigate,onViewCasting,isLoggedIn,onRequireAuth}){
  const [mode,setMode]=useState(userType==="cd"?"talent":"castings");
  const [q,setQ]=useState("");

  useEffect(()=>{setPg(1);},[q,f.type,f.location,f.union,f.gender,f.ethnicity,mode]);

      const mapped=(ps||[]).filter(p=>p.headshot_url).map(p=>({
        id:p.id,
        name:p.display_name||"Talent",
        img:p.headshot_url,
        age:p.age||"",
        gender:p.gender||"",
        ethnicity:p.ethnicity||"",
        location:p.location||"",
        union:p.union_status||"Non-Union",
        height:"",
        skills:Array.isArray(p.skills)?p.skills:[],
        bio:p.bio||"",
        credits:[],
        training:"",
        _db:true
      }));
      setDbTalent(mapped);
    }catch(e){/* silent */}
  })();},[]);
  // Merge: real DB castings first (newest), then demo. Real talent first, then demo.
  const allCastings=[...dbCastings,...CASTINGS];
  const allTalent=[...dbTalent,...TALENT];
  const ft=allTalent.filter(t=>{if(q&&!t.name.toLowerCase().includes(q.toLowerCase())&&!t.skills.join(" ").toLowerCase().includes(q.toLowerCase()))return false;if(f.gender&&t.gender!==f.gender)return false;if(f.ethnicity&&!t.ethnicity.toLowerCase().includes(f.ethnicity.toLowerCase()))return false;if(f.location&&!t.location.toLowerCase().includes(f.location.toLowerCase()))return false;if(f.union&&t.union!==f.union)return false;return true;});
  const fc=allCastings.filter(c=>{if(q&&!c.title.toLowerCase().includes(q.toLowerCase())&&!(c.desc||"").toLowerCase().includes(q.toLowerCase()))return false;if(f.type&&c.type!==f.type)return false;if(f.location&&!c.location.toLowerCase().includes(f.location.toLowerCase()))return false;if(f.union&&!(c.union||"").includes(f.union))return false;return true;});
  return(<div className="page page-wide">
    <div className="section-label">Search</div>
    <div className="tabs"><button className={`tab ${mode==="castings"?"active":""}`} onClick={()=>setMode("castings")}>Open Castings</button><button className={`tab ${mode==="talent"?"active":""}`} onClick={()=>setMode("talent")}>Talent Directory</button></div>
    <div className="search-bar"><input className="input" placeholder={mode==="talent"?"Search by name, skill, keyword...":"Search castings..."} value={q} onChange={e=>setQ(e.target.value)}/><button className="btn-p">Search</button></div>
    {mode==="talent"?<>
      <div className="filter-row"><select className="select" value={f.gender} onChange={e=>setF(x=>({...x,gender:e.target.value}))}><option value="">All Genders</option><option>Male</option><option>Female</option><option>Non-Binary</option></select><select className="select" value={f.ethnicity} onChange={e=>setF(x=>({...x,ethnicity:e.target.value}))}><option value="">All Ethnicities</option><option value="Black">Black</option><option value="Latin">Latino/Latina</option><option value="Asian">Asian</option><option value="European">European</option></select><select className="select" value={f.location} onChange={e=>setF(x=>({...x,location:e.target.value}))}><option value="">All Locations</option><option value="New York">New York</option><option value="Los Angeles">Los Angeles</option><option value="Atlanta">Atlanta</option><option value="Chicago">Chicago</option><option value="Miami">Miami</option></select><select className="select" value={f.union} onChange={e=>setF(x=>({...x,union:e.target.value}))}><option value="">All Union Status</option><option>SAG-AFTRA</option><option>AEA</option><option>Non-Union</option></select></div>
      <p style={{color:"var(--t2)",fontSize:13,marginBottom:16}}>{ft.length} results</p>
      <div className="results-grid">{ft.map(t=><div key={t.id} className="talent-thumb" onClick={()=>onViewProfile(t)}><img src={t.img} alt={t.name}/><div className="talent-thumb-info"><h4>{t.name}</h4><p>{t.age} · {t.gender} · {t.location}</p><div style={{marginTop:6}}><span className="tag" style={{fontSize:10}}>{t.union||"Non-Union"}</span></div></div></div>)}</div>
    </>:<>
      <div className="filter-row"><select className="select" value={f.type} onChange={e=>setF(x=>({...x,type:e.target.value}))}><option value="">All Types</option><option>Film</option><option>TV</option><option>Theater</option><option>Commercial</option><option>Modeling</option></select><select className="select" value={f.location} onChange={e=>setF(x=>({...x,location:e.target.value}))}><option value="">All Locations</option><option value="New York">New York</option><option value="Los Angeles">Los Angeles</option><option value="Atlanta">Atlanta</option><option value="Miami">Miami</option></select><select className="select" value={f.union} onChange={e=>setF(x=>({...x,union:e.target.value}))}><option value="">All Union Status</option><option value="SAG-AFTRA">SAG-AFTRA</option><option value="AEA">AEA</option><option value="Non-Union">Non-Union</option></select></div>
      <p style={{color:"var(--t2)",fontSize:13,marginBottom:16}}>Showing {fc.length===0?0:(pg-1)*10+1}-{Math.min(pg*10,fc.length)} of {fc.length} results</p>
      <div style={{display:"flex",flexDirection:"column",gap:16}}>{fc.slice((pg-1)*10,pg*10).map(c=>
        <div key={c.id} className="card" style={{padding:0,overflow:"hidden",cursor:"pointer"}} onClick={()=>onViewCasting&&onViewCasting(c)}>
          <div style={{padding:"24px 28px",display:"grid",gridTemplateColumns:"1fr auto",gap:24,alignItems:"start"}}>
            <div>
              <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
                <span className="badge tag-acc">{c.type}</span>
                <span className="badge" style={{background:"var(--s2)",color:"var(--t2)"}}>{c.union}</span>
                <span className="badge" style={{background:"var(--s2)",color:"var(--t2)"}}>{c.roles?.length||1} {(c.roles?.length||1)===1?"role":"roles"}</span>
              </div>
              <h3 style={{fontSize:22,fontWeight:800,letterSpacing:"-0.5px",marginBottom:4,color:"var(--t1)"}}>{c.title}</h3>
              <p style={{color:"var(--t2)",fontSize:14,marginBottom:4}}>{c.tagline||c.prod}</p>
              <p style={{color:"var(--t3)",fontSize:12,marginBottom:14}}>{c.prod}</p>
              <p style={{color:"var(--t2)",fontSize:13,lineHeight:1.6,marginBottom:16,maxWidth:620}}>{c.synopsis?c.synopsis.replace(/\*/g,"").slice(0,200)+(c.synopsis.length>200?"…":""):c.desc}</p>
              <div style={{display:"flex",gap:20,flexWrap:"wrap",fontSize:12,color:"var(--t2)"}}>
                <span><strong style={{color:"var(--t1)"}}>Location</strong> · {c.location}</span>
                <span><strong style={{color:"var(--t1)"}}>Pay</strong> · {c.pay}</span>
                <span><strong style={{color:"var(--t1)"}}>Deadline</strong> · {c.deadline}</span>
              </div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:10,alignItems:"flex-end",minWidth:140}}>
              <button className="btn-p" onClick={e=>{e.stopPropagation();onViewCasting&&onViewCasting(c);}}>View Roles →</button>
              {applied.has(c.id)?<span className="tag tag-grn" style={{fontSize:11,fontWeight:700}}>✓ Applied</span>:<button className="btn-s btn-sm" onClick={e=>{e.stopPropagation();if(isLoggedIn){setApplyTo(c);}else{onRequireAuth&&onRequireAuth(c,null);}}}>Quick Apply</button>}
              <span style={{color:"var(--t3)",fontSize:11,marginTop:4}}>{c.submissions} submissions</span>
            </div>
          </div>
        </div>)}</div>
      {fc.length>10&&(()=>{const tp=Math.ceil(fc.length/10);const pages=[];for(let i=1;i<=tp;i++)pages.push(i);return(
        <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:6,marginTop:32,flexWrap:"wrap"}}>
          <button className="btn-s btn-sm" disabled={pg===1} onClick={()=>{setPg(p=>Math.max(1,p-1));window.scrollTo(0,0);}} style={{opacity:pg===1?0.4:1}}>← Prev</button>
          {pages.map(n=><button key={n} onClick={()=>{setPg(n);window.scrollTo(0,0);}} style={{minWidth:36,height:36,borderRadius:8,border:pg===n?"1px solid var(--acc)":"1px solid var(--bdr)",background:pg===n?"var(--acc)":"var(--s1)",color:pg===n?"#fff":"var(--t1)",fontWeight:600,fontSize:13,cursor:"pointer"}}>{n}</button>)}
          <button className="btn-s btn-sm" disabled={pg===tp} onClick={()=>{setPg(p=>Math.min(tp,p+1));window.scrollTo(0,0);}} style={{opacity:pg===tp?0.4:1}}>Next →</button>
        </div>);})()}
    </>}
    {applyTo&&<div className="modal-overlay" onClick={()=>setApplyTo(null)}><div className="modal" onClick={e=>e.stopPropagation()}><h2>Submit for Role</h2><div style={{background:"var(--s2)",borderRadius:10,padding:16,marginBottom:20}}><h4 style={{fontSize:14,fontWeight:700}}>{applyTo.title}</h4><p style={{color:"var(--t2)",fontSize:12,marginTop:2}}>{applyTo.prod} · {applyTo.location}</p></div><div className="form-group"><label className="label">Cover Note (Optional)</label><textarea className="textarea" placeholder="Tell the casting director why you're right for this role..."></textarea></div><div className="form-group"><label className="label">Which headshot?</label><div style={{display:"flex",gap:10,marginTop:8}}><div style={{width:70,height:90,borderRadius:8,background:"var(--s3)",border:"2px solid var(--acc)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"var(--t2)",textAlign:"center",padding:4}}>Primary</div><div style={{width:70,height:90,borderRadius:8,background:"var(--s3)",border:"1px solid var(--bdr)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"var(--t3)",textAlign:"center",padding:4,cursor:"pointer"}}>+ Add</div></div></div><div style={{display:"flex",gap:12,marginTop:24}}><button className="btn-p" style={{flex:1}} onClick={()=>{setApplied(p=>new Set([...p,applyTo.id]));setApplyTo(null);}}>Submit Application</button><button className="btn-s" onClick={()=>setApplyTo(null)}>Cancel</button></div></div></div>}
    <Footer onNavigate={onNavigate}/></div>);
}

// ═══════════════════════════════════════════
// PAGE: CD DASHBOARD — real data
// ═══════════════════════════════════════════
function CDDashboard({onViewProfile,onNavigate,session,myProfile}){
  const [active,setActive]=useState(null);        // casting currently being reviewed
  const [submissions,setSubmissions]=useState([]);// applications for `active` casting
  const [si,setSi]=useState(0);
  const [tab,setTab]=useState("castings");
  const [showNew,setShowNew]=useState(false);
  const [myCastings,setMyCastings]=useState([]);
  const [loading,setLoading]=useState(true);
  const [stats,setStats]=useState({totalSubs:0,callbacks:0,reviewed:0});
  const [reloadTick,setReloadTick]=useState(0);
  const [allCallbacks,setAllCallbacks]=useState([]);

  const uid=session?.user?.id;
  // ─── Load this CD's castings + aggregate stats
  useEffect(()=>{if(!uid){setLoading(false);return;}(async()=>{
    setLoading(true);
    const {data:cs}=await window.sb.from("castings").select("*,roles(id,name)").eq("cd_id",uid).order("created_at",{ascending:false});
    const castings=cs||[];
    // for each casting, count applications
    const ids=castings.map(c=>c.id);
    let counts={};let totalSubs=0;let callbacks=0;let reviewed=0;let allCb=[];
    if(ids.length){
      const {data:apps}=await window.sb.from("applications").select("id,casting_id,status,talent_id,profiles!inner(id,display_name,headshot_url,age,gender,location,skills,union_status)").in("casting_id",ids);
      (apps||[]).forEach(a=>{
        counts[a.casting_id]=(counts[a.casting_id]||0)+1;
        totalSubs++;
        if(a.status&&a.status!=="submitted"&&a.status!=="viewed")reviewed++;
        if(a.status==="callback"){callbacks++;allCb.push({...a.profiles,_app:a});}
      });
    }
    setMyCastings(castings.map(c=>({...c,_count:counts[c.id]||0})));
    setStats({totalSubs,callbacks,reviewed});
    setAllCallbacks(allCb);
    setLoading(false);
  })();},[uid,reloadTick]);

  // ─── Load submissions for one casting (for review-swipe)
  const openReview=async(casting)=>{
    setActive(casting);setSi(0);
    const {data}=await window.sb.from("applications").select("*,profiles!inner(id,display_name,headshot_url,age,gender,location,ethnicity,skills,union_status,bio,height,reel_url),roles(id,name)").eq("casting_id",casting.id).order("created_at",{ascending:false});
    setSubmissions(data||[]);
  };

  const updateAppStatus=async(appId,status)=>{
    await window.sb.from("applications").update({status}).eq("id",appId);
    setSubmissions(p=>p.map(a=>a.id===appId?{...a,status}:a));
    setReloadTick(t=>t+1);
  };

  const doSwipe=async(action)=>{
    const app=submissions[si];if(!app)return;
    const status=action==="yes"?"callback":"passed";
    await updateAppStatus(app.id,status);
    if(si<submissions.length-1)setSi(i=>i+1);
  };

  const SwipeUI=()=>{
    const [dx,setDx]=useState(0);const [dr,setDr]=useState(false);const sx=useRef(0);
    const app=submissions[si];const nextApp=submissions[(si+1)%Math.max(submissions.length,1)];
    if(!app)return null;
    const t=app.profiles;const nt=nextApp?.profiles||t;const ac=dx>60?"yes":dx<-60?"pass":null;
    const img=t.headshot_url||"https://placehold.co/400x500/e5e5e5/999?text=No+Headshot";
    const nimg=nt.headshot_url||img;
    return(<><div className="sw-counter">{si+1} of {submissions.length} submissions · Role: {app.roles?.name||"—"}</div>
      <div className="swipe-card-wrap">
        <div className="s-card" style={{transform:"scale(.94) translateY(10px)",opacity:.4,zIndex:1}}><img src={nimg} alt=""/><div className="s-card-info"><h3>{nt.display_name}</h3></div></div>
        <div className="s-card" style={{transform:`translateX(${dx}px) rotate(${dx*.04}deg)`,transition:dr?"none":"transform .4s cubic-bezier(.34,1.56,.64,1)",zIndex:2,cursor:dr?"grabbing":"grab"}} onPointerDown={e=>{setDr(true);sx.current=e.clientX;}} onPointerMove={e=>{if(dr)setDx(e.clientX-sx.current);}} onPointerUp={()=>{setDr(false);if(dx>100)doSwipe("yes");else if(dx<-100)doSwipe("pass");else setDx(0);}}>
          <div className="sw-overlay" style={{color:"var(--red)",opacity:ac==="pass"?1:0}}>PASS</div>
          <div className="sw-overlay" style={{color:"var(--grn)",opacity:ac==="yes"?1:0}}>CALLBACK ✓</div>
          <img src={img} alt={t.display_name} draggable="false"/>
          <div className="s-card-info">
            <h3>{t.display_name}</h3>
            <div className="s-card-meta">{[t.age,t.gender,t.height,t.location].filter(Boolean).join(" · ")}</div>
            <div className="s-card-tags">{(t.skills||[]).slice(0,3).map((s,i)=><span key={i}>{s}</span>)}{t.union_status&&<span style={{background:"rgba(26,26,46,.08)",color:"var(--acc)"}}>{t.union_status}</span>}</div>
            {app.cover_note&&<p style={{marginTop:8,fontSize:12,color:"var(--t2)",fontStyle:"italic"}}>"{app.cover_note.slice(0,140)}"</p>}
          </div>
        </div>
      </div></>);
  };

  if(!uid)return(<div className="page page-wide"><p>Not logged in.</p></div>);
  if(loading)return(<div className="page page-wide"><p style={{color:"var(--t2)"}}>Loading your dashboard…</p></div>);

  return(<div className="page page-wide">
    <div className="flex-between mb-20">
      <div>
        <div className="section-label">Dashboard</div>
        <h2 className="section-title" style={{marginBottom:0}}>{myProfile?.display_name||"Casting Director"}</h2>
      </div>
      <button className="btn-p" onClick={()=>setShowNew(true)}>+ New Casting</button>
    </div>
    <div className="dash-stats">
      <div className="dash-stat"><div className="dash-stat-num">{myCastings.length}</div><div className="dash-stat-label">Active Castings</div></div>
      <div className="dash-stat"><div className="dash-stat-num">{stats.totalSubs}</div><div className="dash-stat-label">Total Submissions</div></div>
      <div className="dash-stat"><div className="dash-stat-num">{stats.callbacks}</div><div className="dash-stat-label">Callbacks</div></div>
      <div className="dash-stat"><div className="dash-stat-num">{stats.reviewed}</div><div className="dash-stat-label">Reviewed</div></div>
    </div>

    {active?<>

// ─── New Casting creation modal — writes to castings + roles tables
function NewCastingModal({onClose,onPosted,uid}){
  const [step,setStep]=useState(1); // 1 = form, 2 = success
  const [err,setErr]=useState("");
  const [busy,setBusy]=useState(false);
  const [f,setF]=useState({title:"",prod:"",type:"Film",location:"",pay:"",union:"SAG-AFTRA",deadline:"",tagline:"",synopsis:""});
  const [roles,setRoles]=useState([{name:"",description:"",gender:"Any",age_range:"",ethnicity:"Any"}]);
  const setField=(k,v)=>setF(p=>({...p,[k]:v}));
  const setRole=(i,k,v)=>setRoles(p=>p.map((r,idx)=>idx===i?{...r,[k]:v}:r));
  const addRole=()=>setRoles(p=>[...p,{name:"",description:"",gender:"Any",age_range:"",ethnicity:"Any"}]);
  const removeRole=(i)=>setRoles(p=>p.filter((_,idx)=>idx!==i));
  const submit=async()=>{
    setErr("");
    if(!f.title.trim()){setErr("Title required.");return;}
    if(!roles.length||!roles[0].name.trim()){setErr("At least one role with a name is required.");return;}
    setBusy(true);
    try{
      const payload={cd_id:uid,title:f.title.trim(),type:f.type,prod:f.prod||null,tagline:f.tagline||null,synopsis:f.synopsis||null,location:f.location||null,pay:f.pay||null,union_status:f.union,deadline:f.deadline||null,status:"open",published:true};
      const {data:casting,error:cErr}=await window.sb.from("castings").insert(payload).select().single();
      if(cErr)throw cErr;
      const rolePayload=roles.filter(r=>r.name.trim()).map(r=>({casting_id:casting.id,name:r.name.trim(),description:r.description||null,gender:r.gender||null,age_range:r.age_range||null,ethnicity:r.ethnicity||null}));
      if(rolePayload.length){
        const {error:rErr}=await window.sb.from("roles").insert(rolePayload);
        if(rErr)throw rErr;
      }
      setStep(2);
    }catch(e){setErr(e.message||"Something went wrong.");}finally{setBusy(false);}
  };
  return(<div className="modal-overlay" onClick={()=>!busy&&onClose()}><div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:700,maxHeight:"90vh",overflowY:"auto"}}>
    {step===2?<div className="success-msg">
      <div className="check">✓</div>
      <h3>Casting Posted</h3>
      <p>Your casting is now live and visible to every actor on SwipeCast. They'll get notified and start submitting immediately.</p>
      <button className="btn-p mt-20" onClick={onPosted}>Back to Dashboard</button>
    </div>:<>
      <h2>Post New Casting</h2>
      <p style={{color:"var(--t2)",fontSize:13,marginTop:-8,marginBottom:20}}>Free during launch. Goes live immediately.</p>
      {err&&<div style={{background:"rgba(255,100,100,0.1)",border:"1px solid rgba(255,100,100,0.3)",color:"#c0392b",padding:"10px 14px",borderRadius:8,fontSize:13,marginBottom:16}}>{err}</div>}
      <div className="form-group"><label className="label">Project Title *</label><input className="input" value={f.title} onChange={e=>setField("title",e.target.value)} placeholder="e.g. Lead Role — Untitled Horror Feature"/></div>
      <div className="form-row">
        <div><label className="label">Production Company</label><input className="input" value={f.prod} onChange={e=>setField("prod",e.target.value)} placeholder="Company name"/></div>
        <div><label className="label">Project Type</label><select className="select" style={{width:"100%"}} value={f.type} onChange={e=>setField("type",e.target.value)}><option>Film</option><option>TV</option><option>Theater</option><option>Commercial</option><option>Modeling</option></select></div>
      </div>
      <div className="form-row">
        <div><label className="label">Location</label><input className="input" value={f.location} onChange={e=>setField("location",e.target.value)} placeholder="City, State"/></div>
        <div><label className="label">Pay / Rate</label><input className="input" value={f.pay} onChange={e=>setField("pay",e.target.value)} placeholder="e.g. SAG Scale, $500/day"/></div>
      </div>
      <div className="form-row">
        <div><label className="label">Union Status</label><select className="select" style={{width:"100%"}} value={f.union} onChange={e=>setField("union",e.target.value)}><option>SAG-AFTRA</option><option>AEA</option><option>Non-Union</option><option>SAG-AFTRA / Non-Union</option></select></div>
        <div><label className="label">Deadline</label><input className="input" type="date" value={f.deadline} onChange={e=>setField("deadline",e.target.value)}/></div>
      </div>
      <div className="form-group"><label className="label">Tagline (short)</label><input className="input" value={f.tagline} onChange={e=>setField("tagline",e.target.value)} placeholder="One-line hook"/></div>
      <div className="form-group"><label className="label">Project Summary</label><textarea className="textarea" value={f.synopsis} onChange={e=>setField("synopsis",e.target.value)} placeholder="Describe the project — genre, tone, what the production is about..."></textarea></div>

      <div style={{borderTop:"1px solid var(--bdr)",paddingTop:20,marginTop:20}}>
        <div className="flex-between" style={{marginBottom:12}}><h3 style={{fontSize:16,fontWeight:700}}>Roles</h3><button className="btn-s btn-sm" onClick={addRole} type="button">+ Add Role</button></div>
        {roles.map((r,i)=><div key={i} style={{background:"var(--s2)",borderRadius:10,padding:16,marginBottom:12}}>
          <div className="flex-between" style={{marginBottom:10}}><strong style={{fontSize:13}}>Role {i+1}</strong>{roles.length>1&&<button onClick={()=>removeRole(i)} style={{background:"none",border:"none",color:"var(--t3)",cursor:"pointer",fontSize:12}}>✕ Remove</button>}</div>
          <div className="form-group" style={{marginBottom:10}}><label className="label">Role Name *</label><input className="input" value={r.name} onChange={e=>setRole(i,"name",e.target.value)} placeholder="e.g. Sarah — Lead"/></div>
          <div className="form-row">
            <div><label className="label">Gender</label><select className="select" style={{width:"100%"}} value={r.gender} onChange={e=>setRole(i,"gender",e.target.value)}><option>Any</option><option>Male</option><option>Female</option><option>Non-Binary</option></select></div>
            <div><label className="label">Age Range</label><input className="input" value={r.age_range} onChange={e=>setRole(i,"age_range",e.target.value)} placeholder="e.g. 25-35"/></div>
          </div>
          <div className="form-group" style={{marginTop:10,marginBottom:0}}><label className="label">Ethnicity</label><input className="input" value={r.ethnicity} onChange={e=>setRole(i,"ethnicity",e.target.value)} placeholder="e.g. Any, Black, Latin, Asian"/></div>
          <div className="form-group" style={{marginTop:10,marginBottom:0}}><label className="label">Role Description</label><textarea className="textarea" value={r.description} onChange={e=>setRole(i,"description",e.target.value)} placeholder="Describe the role, personality, key scenes..."></textarea></div>
        </div>)}
      </div>

      <div style={{display:"flex",gap:12,marginTop:24}}>
        <button className="btn-p" style={{flex:1}} onClick={submit} disabled={busy}>{busy?"Posting…":"Post Casting"}</button>
        <button className="btn-s" onClick={onClose} disabled={busy}>Cancel</button>
      </div>
    </>}
  </div></div>);
}

          {q:"Who pays for this?",a:"Casting directors and production companies pay $20 per casting post, with enterprise pricing for studios and networks. Actors never pay a cent."},
          {q:"How is this different from Backstage or Casting Networks?",a:"On those platforms, your submission lands in a grid where a CD can scan 80 faces in 20 seconds. On SwipeCast, every submission is full-screen, one at a time. CDs must decide on you individually. No one gets skipped."},
          {q:"Can minors (under 18) sign up?",a:"Only with a parent or legal guardian managing the account. We require guardian verification and comply with COPPA and state child-performer laws."},

    {/* ───────── WAITLIST CTA ───────── */}
    <section style={{padding:"80px 40px",background:"linear-gradient(135deg,#1a1a2e 0%,#16213e 100%)",color:"#fff",textAlign:"center"}}>
      <div style={{maxWidth:640,margin:"0 auto"}}>
        <div style={{display:"inline-block",background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",color:"#fff",fontSize:11,fontWeight:700,letterSpacing:2,padding:"6px 14px",borderRadius:100,marginBottom:20,fontFamily:"'Syne',sans-serif"}}>FOUNDING MEMBERS · LIMITED</div>
        <h2 style={{fontSize:42,fontWeight:800,letterSpacing:-1.5,lineHeight:1.1,marginBottom:16,color:"#fff"}}>Get early access.<br/>Be the reason this works.</h2>
        <p style={{fontSize:16,lineHeight:1.6,color:"rgba(255,255,255,0.75)",marginBottom:32,maxWidth:500,margin:"0 auto 32px"}}>The first 5,000 actors and 500 casting directors on the platform get founding-member status — free forever, priority placement, and a badge on your profile.</p>
        {wlDone?
          <div style={{background:"rgba(46,204,113,0.15)",border:"1px solid rgba(46,204,113,0.4)",borderRadius:14,padding:"22px 28px",maxWidth:480,margin:"0 auto"}}>
            <div style={{fontSize:28,marginBottom:6}}>✓</div>
            <h3 style={{fontSize:18,fontWeight:700,marginBottom:6,color:"#fff"}}>You're on the list.</h3>

// PAGE: MY PROFILE (talent edits their own profile, uploads headshot/reel)
// ═══════════════════════════════════════════
function MyProfilePage({session,profile,onReload,onNavigate}){
  const [saving,setSaving]=useState(false);
  const [msg,setMsg]=useState("");
  const [err,setErr]=useState("");
  const [uploading,setUploading]=useState(false);
  const [myApps,setMyApps]=useState([]);
  const [f,setF]=useState(()=>({
    display_name:profile?.display_name||"",bio:profile?.bio||"",location:profile?.location||"",
    age:profile?.age||"",gender:profile?.gender||"",ethnicity:profile?.ethnicity||"",
    height:profile?.height||"",weight:profile?.weight||"",hair:profile?.hair||"",eyes:profile?.eyes||"",
    union_status:profile?.union_status||"Non-Union",agent:profile?.agent||"",training:profile?.training||"",
    skills:(profile?.skills||[]).join(", "),instagram:profile?.instagram||"",phone:profile?.phone||"",
    company_name:profile?.company_name||"",company_role:profile?.company_role||"",website:profile?.website||"",
    credits:profile?.credits||""
  }));
  useEffect(()=>{if(profile)setF(x=>({
    ...x,
    display_name:profile.display_name||"",bio:profile.bio||"",location:profile.location||"",
    age:profile.age||"",gender:profile.gender||"",ethnicity:profile.ethnicity||"",
    height:profile.height||"",weight:profile.weight||"",hair:profile.hair||"",eyes:profile.eyes||"",
    union_status:profile.union_status||"Non-Union",agent:profile.agent||"",training:profile.training||"",
    skills:(profile.skills||[]).join(", "),instagram:profile.instagram||"",phone:profile.phone||"",
    company_name:profile.company_name||"",company_role:profile.company_role||"",website:profile.website||"",
    credits:profile.credits||""
  }));},[profile]);
  useEffect(()=>{(async()=>{if(session?.user&&profile?.user_type==="talent"){const {data}=await window.sb.from("applications").select("id,status,created_at,cover_note,casting_id,castings(title,prod,type,location)").eq("talent_id",session.user.id).order("created_at",{ascending:false});setMyApps(data||[]);}})();},[session,profile]);
  const up=(k,v)=>setF(x=>({...x,[k]:v}));
  const save=async()=>{
    setErr("");setMsg("");setSaving(true);
    try{
      const patch={
        display_name:f.display_name.trim()||null,bio:f.bio||null,location:f.location||null,
        age:f.age?parseInt(f.age):null,gender:f.gender||null,ethnicity:f.ethnicity||null,
        height:f.height||null,weight:f.weight||null,hair:f.hair||null,eyes:f.eyes||null,
        union_status:f.union_status||null,agent:f.agent||null,training:f.training||null,
        skills:f.skills?f.skills.split(",").map(s=>s.trim()).filter(Boolean):[],
        instagram:f.instagram||null,phone:f.phone||null,
        company_name:f.company_name||null,company_role:f.company_role||null,website:f.website||null,
        credits:f.credits||null
      };
      const {error}=await window.sb.from("profiles").update(patch).eq("id",session.user.id);
      if(error)throw error;
      setMsg("Profile saved.");
      onReload&&onReload();
      setTimeout(()=>setMsg(""),3000);
    }catch(e){setErr(e.message||"Could not save.");}finally{setSaving(false);}
  };
  const uploadFile=async(file,bucket,field)=>{
    if(!file)return;
    setUploading(true);setErr("");
    try{
      const ext=(file.name.split(".").pop()||"jpg").toLowerCase();
      const path=`${session.user.id}/${Date.now()}.${ext}`;
      const {error:upErr}=await window.sb.storage.from(bucket).upload(path,file,{cacheControl:"3600",upsert:false});
      if(upErr)throw upErr;
      const {data:pub}=window.sb.storage.from(bucket).getPublicUrl(path);
      const patch={};patch[field]=pub.publicUrl;
      const {error:uErr}=await window.sb.from("profiles").update(patch).eq("id",session.user.id);
      if(uErr)throw uErr;
      onReload&&onReload();
      setMsg(field==="headshot_url"?"Headshot uploaded.":"Reel uploaded.");
      setTimeout(()=>setMsg(""),3000);
    }catch(e){setErr(e.message||"Upload failed. Make sure the storage bucket exists and is set to public.");}
    finally{setUploading(false);}
  };
  if(!profile)return(<div className="page"><div className="section-label">My Profile</div><p style={{color:"var(--t2)"}}>Loading your profile…</p><Footer onNavigate={onNavigate}/></div>);
  const isCD=profile.user_type==="cd";
  return(<div className="page page-wide">
    <div className="section-label">My Profile</div>
    <h1 style={{fontWeight:800,fontSize:32,letterSpacing:-1,marginBottom:24}}>{isCD?"Casting Director":"Actor"} Profile</h1>
    {msg&&<div style={{background:"rgba(46,204,113,0.12)",border:"1px solid rgba(46,204,113,0.3)",color:"#1d7b44",padding:"10px 14px",borderRadius:8,fontSize:13,marginBottom:16}}>{msg}</div>}
    {err&&<div style={{background:"rgba(255,100,100,0.1)",border:"1px solid rgba(255,100,100,0.3)",color:"#c0392b",padding:"10px 14px",borderRadius:8,fontSize:13,marginBottom:16}}>{err}</div>}

    <div style={{display:"grid",gridTemplateColumns:"320px 1fr",gap:30,alignItems:"start"}}>
      <div className="card" style={{padding:20,position:"sticky",top:20}}>
        {!isCD&&<>
          <div style={{textAlign:"center"}}>
            {profile.headshot_url?<img src={profile.headshot_url} style={{width:"100%",aspectRatio:"3/4",objectFit:"cover",borderRadius:10,marginBottom:12}}/>:<div style={{width:"100%",aspectRatio:"3/4",background:"var(--s2)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",color:"var(--t3)",fontSize:13,marginBottom:12}}>No headshot yet</div>}
          </div>
          <label className="btn-s" style={{width:"100%",display:"block",textAlign:"center",cursor:"pointer"}}>{uploading?"Uploading…":profile.headshot_url?"Change Headshot":"Upload Headshot"}<input type="file" accept="image/*" style={{display:"none"}} onChange={e=>uploadFile(e.target.files?.[0],"headshots","headshot_url")}/></label>
          <label className="btn-s" style={{width:"100%",display:"block",textAlign:"center",cursor:"pointer",marginTop:8}}>{profile.reel_url?"Change Demo Reel":"Upload Demo Reel"}<input type="file" accept="video/*" style={{display:"none"}} onChange={e=>uploadFile(e.target.files?.[0],"reels","reel_url")}/></label>
          {profile.reel_url&&<video src={profile.reel_url} controls style={{width:"100%",marginTop:12,borderRadius:8,background:"#000"}}/>}
        </>}
        <div style={{marginTop:12,padding:12,background:"var(--s2)",borderRadius:8,fontSize:12}}>
          <div style={{color:"var(--t3)",fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Account</div>
          <div style={{fontWeight:600}}>{session?.user?.email}</div>
          <div style={{color:"var(--t3)",fontSize:11,marginTop:4}}>Member since {new Date(profile.created_at).toLocaleDateString()}</div>
        </div>
      </div>

      <div>
        <div className="card" style={{padding:24,marginBottom:20}}>
          <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>Basic info</h3>
          <div className="form-group"><label className="label">Display name</label><input className="input" value={f.display_name} onChange={e=>up("display_name",e.target.value)}/></div>
          <div className="form-row"><div className="form-group"><label className="label">Location</label><input className="input" placeholder="City, State" value={f.location} onChange={e=>up("location",e.target.value)}/></div><div className="form-group"><label className="label">Instagram</label><input className="input" placeholder="@handle" value={f.instagram} onChange={e=>up("instagram",e.target.value)}/></div></div>
          <div className="form-group"><label className="label">Bio</label><textarea className="textarea" style={{minHeight:110}} value={f.bio} onChange={e=>up("bio",e.target.value)} placeholder={isCD?"About you and your casting work…":"Who you are, what you do, what you're looking for…"}></textarea></div>
        </div>

        {!isCD?<>
          <div className="card" style={{padding:24,marginBottom:20}}>
            <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>Physical & Union</h3>
            <div className="form-row"><div className="form-group"><label className="label">Gender</label><select className="select" style={{width:"100%"}} value={f.gender} onChange={e=>up("gender",e.target.value)}><option value="">—</option><option>Female</option><option>Male</option><option>Non-Binary</option><option>Other</option></select></div><div className="form-group"><label className="label">Age</label><input className="input" type="number" value={f.age} onChange={e=>up("age",e.target.value)}/></div></div>
            <div className="form-row"><div className="form-group"><label className="label">Height</label><input className="input" value={f.height} onChange={e=>up("height",e.target.value)}/></div><div className="form-group"><label className="label">Weight</label><input className="input" value={f.weight} onChange={e=>up("weight",e.target.value)}/></div></div>
            <div className="form-row"><div className="form-group"><label className="label">Hair</label><input className="input" value={f.hair} onChange={e=>up("hair",e.target.value)}/></div><div className="form-group"><label className="label">Eyes</label><input className="input" value={f.eyes} onChange={e=>up("eyes",e.target.value)}/></div></div>
            <div className="form-row"><div className="form-group"><label className="label">Ethnicity</label><input className="input" value={f.ethnicity} onChange={e=>up("ethnicity",e.target.value)}/></div><div className="form-group"><label className="label">Union</label><select className="select" style={{width:"100%"}} value={f.union_status} onChange={e=>up("union_status",e.target.value)}><option>Non-Union</option><option>SAG-AFTRA</option><option>AEA</option><option>SAG-AFTRA / AEA</option><option>ACTRA</option></select></div></div>
          </div>
          <div className="card" style={{padding:24,marginBottom:20}}>
            <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>Craft</h3>
            <div className="form-group"><label className="label">Training</label><input className="input" value={f.training} onChange={e=>up("training",e.target.value)}/></div>
            <div className="form-group"><label className="label">Special skills (comma separated)</label><input className="input" value={f.skills} onChange={e=>up("skills",e.target.value)}/></div>
            <div className="form-group"><label className="label">Representation</label><input className="input" value={f.agent} onChange={e=>up("agent",e.target.value)}/></div>
          </div>
        </>:<>
          <div className="card" style={{padding:24,marginBottom:20}}>
            <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>Company</h3>
            <div className="form-row"><div className="form-group"><label className="label">Company / Production</label><input className="input" value={f.company_name} onChange={e=>up("company_name",e.target.value)}/></div><div className="form-group"><label className="label">Title</label><input className="input" value={f.company_role} onChange={e=>up("company_role",e.target.value)}/></div></div>
            <div className="form-group"><label className="label">Website / IMDb</label><input className="input" value={f.website} onChange={e=>up("website",e.target.value)}/></div>
            <div className="form-group"><label className="label">Recent credits (one per line)</label><textarea className="textarea" style={{minHeight:100}} value={f.credits} onChange={e=>up("credits",e.target.value)}/></div>
          </div>
        </>}

        <button className="btn-p" onClick={save} disabled={saving} style={{padding:"14px 32px"}}>{saving?"Saving…":"Save Profile"}</button>

        {!isCD&&myApps.length>0&&<div className="card" style={{padding:24,marginTop:24}}>
          <h3 style={{fontSize:16,fontWeight:700,marginBottom:16}}>My Applications ({myApps.length})</h3>
          {myApps.map(a=><div key={a.id} style={{padding:"12px 0",borderBottom:"1px solid var(--bdr)",display:"flex",justifyContent:"space-between",alignItems:"center",gap:12}}>
            <div><div style={{fontWeight:600,fontSize:14}}>{a.castings?.title||"—"}</div><div style={{fontSize:12,color:"var(--t3)"}}>{a.castings?.prod} · {a.castings?.location} · {new Date(a.created_at).toLocaleDateString()}</div></div>
            <span className="tag" style={{background:a.status==="callback"?"rgba(46,204,113,0.15)":a.status==="passed"?"rgba(255,100,100,0.1)":"var(--s2)",color:a.status==="callback"?"#1d7b44":a.status==="passed"?"#c0392b":"var(--t2)",fontSize:11,fontWeight:700}}>{a.status.toUpperCase()}</span>
          </div>)}
        </div>}
      </div>
    </div>
    <Footer onNavigate={onNavigate}/></div>);
}
