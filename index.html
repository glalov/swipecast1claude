// PAGE: CASTING DETAIL
// ═══════════════════════════════════════════
function CastingDetailPage({casting,onBack,onNavigate,isLoggedIn,onRequireAuth}){
  const [applyRole,setApplyRole]=useState(null);
  const [applied,setApplied]=useState(new Set());
  const [coverNote,setCoverNote]=useState("");
  const [submitting,setSubmitting]=useState(false);
  const [applyErr,setApplyErr]=useState("");
  const [applyOk,setApplyOk]=useState(false);      // shows success confirmation in modal before auto-close
  const [realRoleIds,setRealRoleIds]=useState({}); // maps role index -> real DB role id (for DB-backed castings)
  const [myPhotos,setMyPhotos]=useState([]);   // list of actor's photo URLs (headshot first, then gallery)
  const [selectedPhoto,setSelectedPhoto]=useState("");
  const submittingRef=useRef(false);           // double-click guard for Submit Application
  const withTimeout=(promise,ms=20000,label="Request")=>Promise.race([promise,new Promise((_,rej)=>setTimeout(()=>rej(new Error(`${label} timed out. Please try again.`)),ms))]);
  const c=casting;
  const isDbCasting=!!(c&&c.id&&typeof c.id==="string"&&c.id.length>20); // UUID check
  const handleApply=(r,i)=>{if(isLoggedIn){setApplyRole({...r,idx:i});setCoverNote("");setApplyErr("");setApplyOk(false);setSelectedPhoto(myPhotos[0]||"");}else{onRequireAuth&&onRequireAuth(c,{...r,idx:i});}};
  useEffect(()=>{(async()=>{
    if(!isLoggedIn||!c)return;
    // load the actor's photos for the picker
    const {data:{session:s}}=await window.sb.auth.getSession();
    if(s?.user){
      const {data:prof}=await window.sb.from("profiles").select("headshot_url,additional_photos").eq("id",s.user.id).maybeSingle();
      const list=[];
      if(prof?.headshot_url)list.push(prof.headshot_url);
      (prof?.additional_photos||[]).forEach(u=>{if(u&&!list.includes(u))list.push(u);});
      setMyPhotos(list);
    }
    // if casting is DB-backed, fetch real role ids & already-applied
    if(isDbCasting){
      const {data:roles}=await window.sb.from("roles").select("id,name").eq("casting_id",c.id);
      const map={};(roles||[]).forEach((r,idx)=>{map[idx]=r.id;});
      setRealRoleIds(map);
      if(s?.user){
        const {data:apps}=await window.sb.from("applications").select("role_id").eq("talent_id",s.user.id).eq("casting_id",c.id);
        const appliedIdx=new Set();
        (apps||[]).forEach(a=>{Object.entries(map).forEach(([idx,rid])=>{if(rid===a.role_id)appliedIdx.add(parseInt(idx));});});
        setApplied(appliedIdx);
      }
    }
  })();},[c,isLoggedIn,isDbCasting]);
  const submitApp=async()=>{
    if(submittingRef.current){console.log("[apply] blocked: already submitting");return;}
    submittingRef.current=true;
    setApplyErr("");setApplyOk(false);setSubmitting(true);
    try{
      const {data:{session:s}}=await window.sb.auth.getSession();
      if(!s?.user){setApplyErr("Your session has expired. Please log in again to apply.");return;}
      if(!isDbCasting){
        // demo/mock casting (seeded landing data, not a real row) — still acknowledge locally
        console.log("[apply] demo casting, local-only mark applied");
        setApplied(p=>new Set([...p,applyRole.idx]));
        setApplyOk(true);
        setTimeout(()=>{setApplyRole(null);setApplyOk(false);},1200);
        return;
      }
      const roleId=realRoleIds[applyRole.idx];
      if(!roleId){setApplyErr("This role is no longer available. Please refresh the page and try again.");return;}
      if(myPhotos.length>0&&!selectedPhoto){setApplyErr("Please pick a photo to submit with your application.");return;}
      console.log("[apply] submitting role:",roleId,"casting:",c.id,"talent:",s.user.id);
      const {error}=await withTimeout(
        window.sb.from("applications").insert({role_id:roleId,casting_id:c.id,talent_id:s.user.id,cover_note:coverNote||null,selected_photo_url:selectedPhoto||null}),
        20000,
        "Submission"
      );
      if(error){
        console.warn("[apply] insert error:",error.code||"",error.message||error);
        const raw=(error.message||"").toLowerCase();
        const code=(error.code||"").toLowerCase();
        if(raw.includes("duplicate")||raw.includes("unique")||code==="23505"){
          setApplyErr("You've already applied to this role.");
          // treat as success locally — the row exists
          setApplied(p=>new Set([...p,applyRole.idx]));
        }else if(raw.includes("recursion")||raw.includes("policy")||raw.includes("permission")||raw.includes("row-level")||raw.includes("rls")||code==="42p17"||code==="42501"){
          setApplyErr("Something's temporarily wrong on our end. Please try again in a moment — if it keeps failing, contact support.");
        }else if(raw.includes("violates foreign key")||code==="23503"){
          setApplyErr("This role or casting is no longer available.");
        }else if(raw.includes("not-null")||code==="23502"){
          setApplyErr("Some required information is missing. Please reload the page and try again.");
        }else if(raw.includes("timed out")){
          setApplyErr("The submission timed out. Check your connection and try again.");
        }else{
          setApplyErr("Could not submit your application. Please try again, or contact support if this keeps happening.");
        }
        return;
      }
      console.log("[apply] success for role:",roleId);
      setApplied(p=>new Set([...p,applyRole.idx]));
      setApplyOk(true);
      setTimeout(()=>{setApplyRole(null);setApplyOk(false);},1400);
    }catch(e){
      console.warn("[apply] threw:",e?.message||e);
      const raw=(e?.message||"").toLowerCase();
      if(raw.includes("timed out")){setApplyErr("The submission timed out. Check your connection and try again.");}
      else if(raw.includes("network")||raw.includes("fetch")){setApplyErr("Network error. Please check your connection and try again.");}
      else{setApplyErr("Could not submit your application. Please try again.");}
    }finally{
      submittingRef.current=false;
      setSubmitting(false);
    }
  };
  if(!c)return(<div className="page"><p>Casting not found.</p><button className="btn-s" onClick={onBack}>← Back</button></div>);
  const render=(txt)=>txt.split(/(\*[^*]+\*)/g).map((s,i)=>s.startsWith("*")&&s.endsWith("*")?<em key={i} style={{fontStyle:"italic",color:"var(--t1)"}}>{s.slice(1,-1)}</em>:<span key={i}>{s}</span>);
  return(<div className="page" style={{maxWidth:920}}>
    <button className="btn-s btn-sm mb-20" onClick={onBack}>← Back to Castings</button>

    <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
      <span className="badge tag-acc">{c.type}</span>
      <span className="badge" style={{background:"var(--s2)",color:"var(--t2)"}}>{c.union}</span>
      <span className="badge" style={{background:"var(--s2)",color:"var(--t2)"}}>{c.location}</span>
    </div>
    <h1 style={{fontSize:42,fontWeight:800,letterSpacing:-1.5,marginBottom:8,color:"var(--t1)"}}>{c.title}</h1>
    <p style={{color:"var(--t2)",fontSize:17,marginBottom:4}}>{c.tagline}</p>
    <p style={{color:"var(--t3)",fontSize:13,marginBottom:28}}>Produced by {c.prod} {c.director?`· Directed by ${c.director}`:""}</p>

    <div style={{background:"var(--s1)",border:"1px solid var(--bdr)",borderRadius:12,padding:"20px 24px",marginBottom:32,display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:"14px 28px"}}>
      <div><div style={{fontSize:11,color:"var(--t3)",textTransform:"uppercase",letterSpacing:1.5,marginBottom:4,fontWeight:700}}>Union</div><div style={{fontSize:14,color:"var(--t1)",fontWeight:600}}>{c.union}</div></div>
      <div><div style={{fontSize:11,color:"var(--t3)",textTransform:"uppercase",letterSpacing:1.5,marginBottom:4,fontWeight:700}}>Location</div><div style={{fontSize:14,color:"var(--t1)",fontWeight:600}}>{c.location}</div></div>
      <div><div style={{fontSize:11,color:"var(--t3)",textTransform:"uppercase",letterSpacing:1.5,marginBottom:4,fontWeight:700}}>Rate</div><div style={{fontSize:14,color:"var(--t1)",fontWeight:600}}>{c.rate||c.pay}</div></div>
      <div><div style={{fontSize:11,color:"var(--t3)",textTransform:"uppercase",letterSpacing:1.5,marginBottom:4,fontWeight:700}}>Submission Deadline</div><div style={{fontSize:14,color:"var(--t1)",fontWeight:600}}>{c.deadline}</div></div>
      {c.shoots&&<div><div style={{fontSize:11,color:"var(--t3)",textTransform:"uppercase",letterSpacing:1.5,marginBottom:4,fontWeight:700}}>Shoot / Run Dates</div><div style={{fontSize:14,color:"var(--t1)",fontWeight:600}}>{c.shoots}</div></div>}
      {c.rehearsal&&<div><div style={{fontSize:11,color:"var(--t3)",textTransform:"uppercase",letterSpacing:1.5,marginBottom:4,fontWeight:700}}>Rehearsal</div><div style={{fontSize:14,color:"var(--t1)",fontWeight:600}}>{c.rehearsal}</div></div>}
      {c.auditionFormat&&<div style={{gridColumn:"1 / -1"}}><div style={{fontSize:11,color:"var(--t3)",textTransform:"uppercase",letterSpacing:1.5,marginBottom:4,fontWeight:700}}>Audition Format</div><div style={{fontSize:14,color:"var(--t1)",fontWeight:600}}>{c.auditionFormat}</div></div>}
    </div>

    <section style={{marginBottom:40}}>
      <div className="section-label" style={{marginBottom:12}}>Project Summary</div>
      <p style={{color:"var(--t2)",fontSize:15,lineHeight:1.75,maxWidth:720}}>{c.synopsis?render(c.synopsis):c.desc}</p>
    </section>

    <section style={{marginBottom:40}}>
      <div className="flex-between" style={{marginBottom:16}}>
        <div>
          <div className="section-label">Roles Casting</div>
          <h2 style={{fontSize:26,fontWeight:800,letterSpacing:-0.5,marginTop:4}}>{c.roles?.length||0} Role{(c.roles?.length||0)===1?"":"s"} Open</h2>
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        {(c.roles||[]).map((r,i)=>
          <div key={i} className="card" style={{padding:"22px 26px"}}>
            <div className="flex-between" style={{marginBottom:10,alignItems:"flex-start",gap:16}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",gap:8,marginBottom:8,flexWrap:"wrap"}}>
                  <span className="badge tag-acc">{r.type}</span>
                  <span className="badge" style={{background:"var(--s2)",color:"var(--t2)"}}>{r.gender}</span>
                  <span className="badge" style={{background:"var(--s2)",color:"var(--t2)"}}>Age {r.ageRange}</span>
                  <span className="badge" style={{background:"var(--s2)",color:"var(--t2)"}}>{r.ethnicity}</span>
                </div>
                <h3 style={{fontSize:18,fontWeight:800,letterSpacing:"-0.3px",marginBottom:8,color:"var(--t1)"}}>{r.name}</h3>
                <p style={{color:"var(--t2)",fontSize:14,lineHeight:1.65}}>{r.desc}</p>
              </div>
              <div>
                {applied.has(i)?<span className="tag tag-grn" style={{fontSize:12,fontWeight:700,padding:"8px 14px"}}>✓ Applied</span>:<button className="btn-p btn-sm" onClick={()=>handleApply(r,i)}>Apply for Role</button>}
              </div>
            </div>
          </div>)}
      </div>
    </section>

    <section style={{padding:"28px 32px",background:"var(--s1)",border:"1px solid var(--bdr)",borderRadius:12,marginBottom:32,textAlign:"center"}}>
      <h3 style={{fontSize:18,fontWeight:700,marginBottom:6}}>Think you're right for multiple roles?</h3>
      <p style={{color:"var(--t2)",fontSize:13,marginBottom:14}}>You can submit for as many roles as you'd like. Each submission is reviewed individually by the casting director.</p>
      <button className="btn-s btn-sm" onClick={onBack}>← Back to All Castings</button>
    </section>

    {applyRole&&<div className="modal-overlay" onClick={()=>!submitting&&setApplyRole(null)}><div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:560}}>
      {applyOk?
        <div style={{textAlign:"center",padding:"24px 8px"}}>
          <div style={{width:64,height:64,borderRadius:"50%",background:"rgba(80,200,120,0.15)",color:"#27ae60",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,fontWeight:800,margin:"0 auto 16px"}}>✓</div>
          <h2 style={{marginBottom:6}}>Application Submitted</h2>
          <p style={{color:"var(--t2)",fontSize:14}}>You applied for <strong>{applyRole.name}</strong>. The casting director will see your submission in their inbox.</p>
        </div>:
        <>
          <h2>Submit for Role</h2>
          <div style={{background:"var(--s2)",borderRadius:10,padding:16,marginBottom:20}}>
            <h4 style={{fontSize:14,fontWeight:700}}>{applyRole.name}</h4>
            <p style={{color:"var(--t2)",fontSize:12,marginTop:2}}>{c.title} · {c.prod}</p>
          </div>
          {applyErr&&<div style={{background:"rgba(255,100,100,0.1)",border:"1px solid rgba(255,100,100,0.3)",color:"#c0392b",padding:"10px 14px",borderRadius:8,fontSize:13,marginBottom:12}}>{applyErr}</div>}
          <div className="form-group">
            <label className="label">Choose the photo to submit</label>
            {myPhotos.length===0?
              <div style={{background:"var(--s2)",border:"1px dashed var(--bdr)",borderRadius:10,padding:18,fontSize:13,color:"var(--t3)",textAlign:"center"}}>No photos yet. Upload a headshot from your profile first — it'll go to the casting director with your submission.</div>:
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(88px,1fr))",gap:8}}>
                {myPhotos.map((u,i)=>
                  <div key={i} onClick={()=>setSelectedPhoto(u)} style={{cursor:"pointer",position:"relative",aspectRatio:"4/5",borderRadius:8,overflow:"hidden",border:selectedPhoto===u?"3px solid var(--acc)":"3px solid transparent",transition:"all .15s"}}>
                    <img src={u} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                    {selectedPhoto===u&&<div style={{position:"absolute",top:4,right:4,background:"var(--acc)",color:"#fff",width:20,height:20,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800}}>✓</div>}
                  </div>)}
              </div>}
          </div>
          <div className="form-group"><label className="label">Cover Note (Optional)</label><textarea className="textarea" placeholder="Tell the casting director why you're right for this role..." value={coverNote} onChange={e=>setCoverNote(e.target.value)}></textarea></div>
          <p style={{fontSize:12,color:"var(--t3)",marginTop:-4,marginBottom:16}}>The casting director will see the photo you picked plus your full profile — reel, bio, credits — with this note.</p>
          <div style={{display:"flex",gap:12,marginTop:24}}><button className="btn-p" style={{flex:1}} onClick={submitApp} disabled={submitting}>{submitting?"Submitting…":"Submit Application"}</button><button className="btn-s" onClick={()=>setApplyRole(null)} disabled={submitting}>Cancel</button></div>
        </>
      }
    </div></div>}

    <Footer onNavigate={onNavigate}/></div>);
}

      <div className="section-label">Open Roles</div>

              <span className="badge tag-acc">{j.dept}</span>

// PAGE: TALENT PROFILE VIEW
// ═══════════════════════════════════════════
function TalentProfile({talent,onBack,onNavigate,session,myProfile}){
  // Parse credits: either already an array of {role,project,type,year} (demo data)
  // or a plain-text field with "Role · Project · Year" per line (DB data).
  const parseCredits=(c)=>{
    if(!c)return [];
    if(Array.isArray(c))return c;
    return String(c).split("\n").map(l=>l.trim()).filter(Boolean).map(line=>{
      const parts=line.split("·").map(p=>p.trim());
      return {role:parts[0]||"",project:parts[1]||"",type:"",year:parts[2]||""};
    });
  };
  const credits=parseCredits(talent.credits);
  // CD-side action state — mounted only when the viewer is a CD/admin and the talent has a real DB id
  const viewerIsCd=!!myProfile&&(myProfile.user_type==="cd"||myProfile.user_type==="admin"||myProfile.user_type==="super_admin");
  const talentDbId=typeof talent.id==="string"&&/^[0-9a-f]{8}-/i.test(String(talent.id))?talent.id:null;
  const [cdAction,setCdAction]=useState(null); // "save"|"invite"|"dm"|null
  const gallery=(talent._allPhotos&&talent._allPhotos.length)?talent._allPhotos:[talent.img,...(talent.additional_photos||[])].filter(Boolean);
  const videos=(talent.video_links||[]).filter(v=>v);
  // Render a video link — pulls out a reliable embed for YouTube/Vimeo, falls back to a link button.
  const renderVideo=(url,i)=>{
    let embed=null;
    const ytM=url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([A-Za-z0-9_-]{11})/);
    if(ytM){embed=`https://www.youtube.com/embed/${ytM[1]}`;}
    else{const vmM=url.match(/vimeo\.com\/(?:video\/)?(\d+)/);if(vmM){embed=`https://player.vimeo.com/video/${vmM[1]}`;}}
    return embed
      ?<div key={i} style={{position:"relative",paddingBottom:"56.25%",height:0,borderRadius:8,overflow:"hidden",background:"#000"}}><iframe src={embed} frameBorder="0" allowFullScreen style={{position:"absolute",top:0,left:0,width:"100%",height:"100%"}}/></div>
      :<a key={i} href={url} target="_blank" rel="noreferrer" className="btn-s btn-sm" style={{textDecoration:"none",display:"inline-block"}}>▶ Watch clip {i+1}</a>;
  };
  return(<div className="page">
    <button className="btn-s btn-sm mb-20" onClick={onBack}>← Back</button>

    {/* ── Submission note banner (only shown when CD is reviewing a specific submission) ── */}
    {talent._coverNote&&<div className="card" style={{padding:18,marginBottom:16,borderLeft:"4px solid var(--acc)",background:"var(--s1)"}}>
      <div className="section-label" style={{marginBottom:4}}>Cover note from {talent.name||"the applicant"}</div>
      <p style={{fontSize:14,lineHeight:1.6,fontStyle:"italic",color:"var(--t1)"}}>"{talent._coverNote}"</p>
      {talent._roleName&&<p style={{fontSize:12,color:"var(--t3)",marginTop:8}}>Submitted for role: <strong>{talent._roleName}</strong></p>}
    </div>}

    <div className="profile-hero"><div>
      <img src={talent.img||"https://placehold.co/400x500/e5e5e5/999?text=No+Headshot"} alt={talent.name} className="profile-photo"/>
      {talent._selectedPhoto&&talent._selectedPhoto!==talent.img&&<p style={{fontSize:11,color:"var(--t3)",marginTop:6,textAlign:"center"}}>↑ Photo the applicant chose for this submission</p>}
    </div>
      <div>
        <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}><span className="tag tag-acc">{talent.union||talent.union_status||"Non-Union"}</span>{talent.type&&<span className="tag">{talent.type}</span>}</div>
        <h1 style={{fontSize:38,fontWeight:800,letterSpacing:"-1.5px",marginBottom:4}}>{talent.name||talent.display_name||"—"}</h1>
        <p style={{color:"var(--t2)",fontSize:14,marginBottom:4}}>{talent.location||""}</p>
        {talent.agent&&<p style={{color:"var(--t3)",fontSize:13,marginBottom:16}}>Rep: {talent.agent}</p>}
        {talent.bio&&<p style={{color:"var(--t2)",fontSize:14,lineHeight:1.6,marginBottom:20}}>{talent.bio}</p>}
        <div className="profile-stats">{[["Height",talent.height],["Weight",talent.weight],["Hair",talent.hair],["Eyes",talent.eyes],["Age",talent.age],["Gender",talent.gender],["Ethnicity",talent.ethnicity]].filter(([,v])=>v).map(([l,v])=><div key={l} className="profile-stat"><div className="profile-stat-label">{l}</div><div className="profile-stat-value">{v}</div></div>)}</div>
        {talent.training&&<div className="mt-20"><div className="label">Training</div><p style={{fontSize:14}}>{talent.training}</p></div>}
        {(talent.skills||[]).length>0&&<div className="mt-20"><div className="label">Special Skills</div><div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:4}}>{talent.skills.map((s,i)=><span className="tag" key={i}>{s}</span>)}</div></div>}
        {(talent.instagram||talent.phone)&&<div className="mt-20" style={{display:"flex",gap:16,flexWrap:"wrap",fontSize:13}}>
          {talent.instagram&&<span style={{color:"var(--t2)"}}><strong>IG:</strong> {talent.instagram}</span>}
          {talent.phone&&<span style={{color:"var(--t2)"}}><strong>Phone:</strong> {talent.phone}</span>}
        </div>}
        {/* ── CD-only action panel: Save · Invite · DM. Hidden for talent-on-talent views, demo profiles
              (no real UUID), and self-views. */}
        {viewerIsCd&&talentDbId&&talentDbId!==session?.user?.id&&<div className="mt-20" style={{display:"flex",gap:8,flexWrap:"wrap",borderTop:"1px solid var(--bdr)",paddingTop:16}}>
          <button className="btn-p btn-sm" onClick={()=>setCdAction("save")}>★ Save to List</button>
          <button className="btn-s btn-sm" onClick={()=>setCdAction("invite")}>📩 Invite to Project</button>
          <button className="btn-s btn-sm" onClick={()=>setCdAction("dm")}>💬 Send Message</button>
        </div>}
      </div>
    </div>

    {/* ── Photo gallery ── */}
    {gallery.length>1&&<div className="card mt-20">
      <h3 style={{fontSize:18,fontWeight:700,marginBottom:12}}>Photos ({gallery.length})</h3>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:10}}>
        {gallery.map((u,i)=><img key={i} src={u} alt={`${talent.name} photo ${i+1}`} style={{width:"100%",aspectRatio:"3/4",objectFit:"cover",borderRadius:8,border:"1px solid var(--bdr)"}}/>)}
      </div>
    </div>}

    {/* ── Reel ── */}
    {talent.reel_url&&<div className="card mt-20">
      <h3 style={{fontSize:18,fontWeight:700,marginBottom:12}}>Demo Reel</h3>
      <video src={talent.reel_url} controls style={{width:"100%",borderRadius:8,background:"#000",maxHeight:560}}/>
    </div>}

    {/* ── Video links (YouTube / Vimeo etc.) ── */}
    {videos.length>0&&<div className="card mt-20">
      <h3 style={{fontSize:18,fontWeight:700,marginBottom:12}}>Video Clips ({videos.length})</h3>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:12}}>
        {videos.map(renderVideo)}
      </div>
    </div>}

    {/* ── Credits + resume ── */}
    {(credits.length>0||talent.resume_url)&&<div className="card mt-20">
      <div className="flex-between" style={{marginBottom:12,alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <h3 style={{fontSize:18,fontWeight:700}}>Credits</h3>
        {talent.resume_url&&<a href={talent.resume_url} target="_blank" rel="noreferrer" className="btn-p btn-sm" style={{textDecoration:"none"}}>📄 Download Resume</a>}
      </div>
      {credits.length>0
        ?<table className="credits-table"><thead><tr><th>Role</th><th>Project</th><th>Type</th><th>Year</th></tr></thead>
          <tbody>{credits.map((c,i)=><tr key={i}><td style={{fontWeight:600}}>{c.role}</td><td>{c.project}</td><td style={{color:"var(--t2)"}}>{c.type}</td><td style={{color:"var(--t2)"}}>{c.year}</td></tr>)}</tbody></table>
        :<p style={{fontSize:13,color:"var(--t3)"}}>Resume attached — the applicant hasn't added per-line credits yet.</p>}
    </div>}

    {/* ── CD action modals — only one open at a time ── */}
    {cdAction==="save"&&talentDbId&&<SaveToListModal cdId={session?.user?.id} talentId={talentDbId} talentName={talent.name||talent.display_name||"Talent"} onClose={()=>setCdAction(null)}/>}
    {cdAction==="invite"&&talentDbId&&<InviteToProjectModal cdId={session?.user?.id} talentId={talentDbId} talentName={talent.name||talent.display_name||"Talent"} onClose={()=>setCdAction(null)}/>}
    {cdAction==="dm"&&talentDbId&&<ComposeDMModal fromId={session?.user?.id} toId={talentDbId} toName={talent.name||talent.display_name||"Talent"} onClose={()=>setCdAction(null)}/>}

    <Footer onNavigate={onNavigate}/></div>);
}

// PAGE: SEARCH / BROWSE

function SearchPage({onViewProfile,userType,onNavigate,onViewCasting,isLoggedIn,onRequireAuth,castingsVersion=0,session,myProfile}){
  const [mode,setMode]=useState(userType==="cd"?"talent":"castings");
  const [q,setQ]=useState("");
  const [f,setF]=useState({gender:"",ethnicity:"",location:"",union:"",type:""});
  const [applyTo,setApplyTo]=useState(null);
  const [applied,setApplied]=useState(new Set());
  const [pg,setPg]=useState(1);
  const [dbCastings,setDbCastings]=useState([]);
  const [dbTalent,setDbTalent]=useState([]);
  const [refreshTick,setRefreshTick]=useState(0);
  const [loading,setLoading]=useState(true);          // initial fetch in flight
  const [fetchErr,setFetchErr]=useState("");          // surfaced castings fetch error
  const [lastFetchAt,setLastFetchAt]=useState(0);     // timestamp of last successful fetch
  useEffect(()=>{setPg(1);},[q,f.type,f.location,f.union,f.gender,f.ethnicity,mode]);

  // ─── Fetch castings — extracted into a stable callback so realtime, polling,
  //     focus, and the manual retry button all hit the same code path. The previous
  //     silent catch was the root cause of "castings disappear until refresh" — any
  //     transient network blip would clear results with no recovery. Now we keep the
  //     last good data on failure and surface the error to the user.
  const fetchCastings=useCallback(async()=>{
    try{
      const {data:cs,error}=await window.sb.from("castings")
        .select("*,roles(id,name,description,gender,age_range,ethnicity,pay)")
        .eq("status","open").eq("published",true)
        .order("created_at",{ascending:false});
      if(error)throw error;
      const mapped=(cs||[]).map(c=>({
        id:c.id,
        title:c.title,
        type:c.type||"Film",
        prod:c.prod||"",
        tagline:c.tagline||"",
        synopsis:c.synopsis||"",
        desc:c.synopsis||c.tagline||"",
        location:c.location||"",
        pay:c.pay||"",
        rate:c.pay||"",
        deadline:c.deadline||"",
        union:c.union_status||"",
        submissions:0,
        roles:(c.roles||[]).map(r=>({
          name:r.name,
          desc:r.description||"",
          type:"Supporting",
          gender:r.gender||"Any",
          ageRange:r.age_range||"",
          ethnicity:r.ethnicity||"Any"
        }))
      }));
      setDbCastings(mapped);
      setFetchErr("");
      setLastFetchAt(Date.now());
    }catch(e){
      console.error("[SearchPage] castings fetch failed:",e);
      setFetchErr(e.message||"Could not load castings.");
      // Intentionally do NOT clear dbCastings — preserve last good state.
    }
  },[]);

  const fetchTalent=useCallback(async()=>{
    try{
      const {data:ps,error}=await window.sb.from("profiles")
        .select("id,display_name,headshot_url,age,gender,ethnicity,location,union_status,skills,bio")
        .eq("user_type","talent").eq("visible",true).eq("suspended",false).eq("onboarded",true)
        .limit(200);
      if(error)throw error;
      const mapped=(ps||[]).filter(p=>p.headshot_url).map(p=>({
        id:p.id,
        name:p.display_name||"Talent",
        img:p.headshot_url,
        age:p.age||"",
        gender:p.gender||"",
        ethnicity:p.ethnicity||"",
        location:p.location||"",
        union:p.union_status||"Non-Union",
        height:"",
        skills:Array.isArray(p.skills)?p.skills:[],
        bio:p.bio||"",
        credits:[],
        training:"",
        _db:true
      }));
      setDbTalent(mapped);
    }catch(e){console.error("[SearchPage] talent fetch failed:",e);/* keep last good */}
  },[]);

  // Initial + reactive fetches: any of these triggers a refresh
  useEffect(()=>{
    let cancelled=false;
    setLoading(true);
    Promise.all([fetchCastings(),fetchTalent()]).finally(()=>{if(!cancelled)setLoading(false);});
    return()=>{cancelled=true;};
  },[refreshTick,castingsVersion,fetchCastings,fetchTalent]);

  // Refetch when tab becomes visible again — keeps castings list in sync after CD posts.
  // Plus a 60s polling backstop in case realtime gets disconnected.
  useEffect(()=>{
    const onFocus=()=>setRefreshTick(t=>t+1);
    window.addEventListener("focus",onFocus);
    document.addEventListener("visibilitychange",onFocus);
    const tid=setInterval(()=>{fetchCastings();fetchTalent();},60000);
    return()=>{
      window.removeEventListener("focus",onFocus);
      document.removeEventListener("visibilitychange",onFocus);
      clearInterval(tid);
    };
  },[fetchCastings,fetchTalent]);

  // Merge: real DB castings first (newest), then demo. Real talent first, then demo.
  const allCastings=[...dbCastings,...CASTINGS];
  const allTalent=[...dbTalent,...TALENT];
  const ft=allTalent.filter(t=>{if(q&&!t.name.toLowerCase().includes(q.toLowerCase())&&!t.skills.join(" ").toLowerCase().includes(q.toLowerCase()))return false;if(f.gender&&t.gender!==f.gender)return false;if(f.ethnicity&&!t.ethnicity.toLowerCase().includes(f.ethnicity.toLowerCase()))return false;if(f.location&&!t.location.toLowerCase().includes(f.location.toLowerCase()))return false;if(f.union&&t.union!==f.union)return false;return true;});
  const fc=allCastings.filter(c=>{if(q&&!c.title.toLowerCase().includes(q.toLowerCase())&&!(c.desc||"").toLowerCase().includes(q.toLowerCase()))return false;if(f.type&&c.type!==f.type)return false;if(f.location&&!c.location.toLowerCase().includes(f.location.toLowerCase()))return false;if(f.union&&!(c.union||"").includes(f.union))return false;return true;});
  return(<div className="page page-wide">
    <div className="section-label">Search</div>
    <div className="tabs"><button className={`tab ${mode==="castings"?"active":""}`} onClick={()=>setMode("castings")}>Open Castings</button><button className={`tab ${mode==="talent"?"active":""}`} onClick={()=>setMode("talent")}>Talent Directory</button></div>
    <div className="search-bar"><input className="input" placeholder={mode==="talent"?"Search by name, skill, keyword...":"Search castings..."} value={q} onChange={e=>setQ(e.target.value)}/><button className="btn-p">Search</button></div>
    {mode==="talent"?<>
      <div className="filter-row"><select className="select" value={f.gender} onChange={e=>setF(x=>({...x,gender:e.target.value}))}><option value="">All Genders</option><option>Male</option><option>Female</option><option>Non-Binary</option></select><select className="select" value={f.ethnicity} onChange={e=>setF(x=>({...x,ethnicity:e.target.value}))}><option value="">All Ethnicities</option><option value="Black">Black</option><option value="Latin">Latino/Latina</option><option value="Asian">Asian</option><option value="European">European</option></select><select className="select" value={f.location} onChange={e=>setF(x=>({...x,location:e.target.value}))}><option value="">All Locations</option><option value="New York">New York</option><option value="Los Angeles">Los Angeles</option><option value="Atlanta">Atlanta</option><option value="Chicago">Chicago</option><option value="Miami">Miami</option></select><select className="select" value={f.union} onChange={e=>setF(x=>({...x,union:e.target.value}))}><option value="">All Union Status</option><option>SAG-AFTRA</option><option>AEA</option><option>Non-Union</option></select></div>
      <p style={{color:"var(--t2)",fontSize:13,marginBottom:16}}>{ft.length} results</p>
      <div className="results-grid">{ft.map(t=><div key={t.id} className="talent-thumb" onClick={()=>onViewProfile(t)}><img src={t.img} alt={t.name}/><div className="talent-thumb-info"><h4>{t.name}</h4><p>{t.age} · {t.gender} · {t.location}</p><div style={{marginTop:6}}><span className="tag" style={{fontSize:10}}>{t.union||"Non-Union"}</span></div></div></div>)}</div>
    </>:<>
      <div className="filter-row"><select className="select" value={f.type} onChange={e=>setF(x=>({...x,type:e.target.value}))}><option value="">All Types</option><option>Film</option><option>TV</option><option>Theater</option><option>Commercial</option><option>Modeling</option></select><select className="select" value={f.location} onChange={e=>setF(x=>({...x,location:e.target.value}))}><option value="">All Locations</option><option value="New York">New York</option><option value="Los Angeles">Los Angeles</option><option value="Atlanta">Atlanta</option><option value="Miami">Miami</option></select><select className="select" value={f.union} onChange={e=>setF(x=>({...x,union:e.target.value}))}><option value="">All Union Status</option><option value="SAG-AFTRA">SAG-AFTRA</option><option value="AEA">AEA</option><option value="Non-Union">Non-Union</option></select></div>
      {fetchErr&&<div style={{background:"rgba(255,100,100,0.1)",border:"1px solid rgba(255,100,100,0.3)",color:"#c0392b",padding:"10px 14px",borderRadius:8,fontSize:13,marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
        <span>Couldn't refresh castings: {fetchErr}{dbCastings.length>0?" — showing last loaded list.":""}</span>
        <button className="btn-s btn-sm" onClick={()=>{setRefreshTick(t=>t+1);}}>Retry</button>
      </div>}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,gap:10,flexWrap:"wrap"}}>
        <p style={{color:"var(--t2)",fontSize:13,margin:0}}>{loading&&dbCastings.length===0?"Loading castings…":`Showing ${fc.length===0?0:(pg-1)*10+1}-${Math.min(pg*10,fc.length)} of ${fc.length} results`}{lastFetchAt?<span style={{color:"var(--t3)",marginLeft:10,fontSize:11}}>· updated {new Date(lastFetchAt).toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"})}</span>:null}</p>
        <button className="btn-s btn-sm" onClick={()=>setRefreshTick(t=>t+1)} disabled={loading}>{loading?"…":"↻ Refresh"}</button>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:16}}>{fc.slice((pg-1)*10,pg*10).map(c=>
        <div key={c.id} className="card" style={{padding:0,overflow:"hidden",cursor:"pointer"}} onClick={()=>onViewCasting&&onViewCasting(c)}>
          <div className="casting-card-row" style={{padding:"24px 28px",display:"grid",gridTemplateColumns:"1fr auto",gap:24,alignItems:"start"}}>
            <div>
              <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
                <span className="badge tag-acc">{c.type}</span>
                <span className="badge" style={{background:"var(--s2)",color:"var(--t2)"}}>{c.union}</span>
                <span className="badge" style={{background:"var(--s2)",color:"var(--t2)"}}>{c.roles?.length||1} {(c.roles?.length||1)===1?"role":"roles"}</span>
              </div>
              <h3 style={{fontSize:22,fontWeight:800,letterSpacing:"-0.5px",marginBottom:4,color:"var(--t1)"}}>{c.title}</h3>
              <p style={{color:"var(--t2)",fontSize:14,marginBottom:4}}>{c.tagline||c.prod}</p>
              <p style={{color:"var(--t3)",fontSize:12,marginBottom:14}}>{c.prod}</p>
              <p style={{color:"var(--t2)",fontSize:13,lineHeight:1.6,marginBottom:16,maxWidth:620}}>{c.synopsis?c.synopsis.replace(/\*/g,"").slice(0,200)+(c.synopsis.length>200?"…":""):c.desc}</p>
              <div style={{display:"flex",gap:20,flexWrap:"wrap",fontSize:12,color:"var(--t2)"}}>
                <span><strong style={{color:"var(--t1)"}}>Location</strong> · {c.location}</span>
                <span><strong style={{color:"var(--t1)"}}>Pay</strong> · {c.pay}</span>
                <span><strong style={{color:"var(--t1)"}}>Deadline</strong> · {c.deadline}</span>
              </div>
            </div>
            <div className="casting-card-row-side" style={{display:"flex",flexDirection:"column",gap:10,alignItems:"flex-end",minWidth:140}}>
              <button className="btn-p" onClick={e=>{e.stopPropagation();onViewCasting&&onViewCasting(c);}}>View Roles →</button>
              {applied.has(c.id)?<span className="tag tag-grn" style={{fontSize:11,fontWeight:700}}>✓ Applied</span>:null}
              <span style={{color:"var(--t3)",fontSize:11,marginTop:4}}>{c.submissions} submissions</span>
            </div>
          </div>
        </div>)}</div>
      {fc.length>10&&(()=>{const tp=Math.ceil(fc.length/10);const pages=[];for(let i=1;i<=tp;i++)pages.push(i);return(
        <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:6,marginTop:32,flexWrap:"wrap"}}>
          <button className="btn-s btn-sm" disabled={pg===1} onClick={()=>{setPg(p=>Math.max(1,p-1));window.scrollTo(0,0);}} style={{opacity:pg===1?0.4:1}}>← Prev</button>
          {pages.map(n=><button key={n} onClick={()=>{setPg(n);window.scrollTo(0,0);}} style={{minWidth:36,height:36,borderRadius:8,border:pg===n?"1px solid var(--acc)":"1px solid var(--bdr)",background:pg===n?"var(--acc)":"var(--s1)",color:pg===n?"#fff":"var(--t1)",fontWeight:600,fontSize:13,cursor:"pointer"}}>{n}</button>)}
          <button className="btn-s btn-sm" disabled={pg===tp} onClick={()=>{setPg(p=>Math.min(tp,p+1));window.scrollTo(0,0);}} style={{opacity:pg===tp?0.4:1}}>Next →</button>
        </div>);})()}
    </>}
    {applyTo&&<div className="modal-overlay" onClick={()=>setApplyTo(null)}><div className="modal" onClick={e=>e.stopPropagation()}><h2>Submit for Role</h2><div style={{background:"var(--s2)",borderRadius:10,padding:16,marginBottom:20}}><h4 style={{fontSize:14,fontWeight:700}}>{applyTo.title}</h4><p style={{color:"var(--t2)",fontSize:12,marginTop:2}}>{applyTo.prod} · {applyTo.location}</p></div><div className="form-group"><label className="label">Cover Note (Optional)</label><textarea className="textarea" placeholder="Tell the casting director why you're right for this role..."></textarea></div><div className="form-group"><label className="label">Which headshot?</label><div style={{display:"flex",gap:10,marginTop:8}}><div style={{width:70,height:90,borderRadius:8,background:"var(--s3)",border:"2px solid var(--acc)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"var(--t2)",textAlign:"center",padding:4}}>Primary</div><div style={{width:70,height:90,borderRadius:8,background:"var(--s3)",border:"1px solid var(--bdr)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"var(--t3)",textAlign:"center",padding:4,cursor:"pointer"}}>+ Add</div></div></div><div style={{display:"flex",gap:12,marginTop:24}}><button className="btn-p" style={{flex:1}} onClick={()=>{setApplied(p=>new Set([...p,applyTo.id]));setApplyTo(null);}}>Submit Application</button><button className="btn-s" onClick={()=>setApplyTo(null)}>Cancel</button></div></div></div>}
    <Footer onNavigate={onNavigate}/></div>);
}

// ═══════════════════════════════════════════
// PAGE: CD DASHBOARD — real data
// ═══════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════════
// CD REVIEW WORKFLOW — status-as-folder
// Statuses: pending | hold | selected | rejected
// Pending queue = swipe deck (left=reject, up=hold, right=select)
// Hold / Selected / Rejected = filtered list views with search + sort
// Undo reverts the most recent decision.
// ═══════════════════════════════════════════════════════════════════
function CDDashboard({onViewProfile,onNavigate,session,myProfile,castingsVersion=0,bumpCastings}){
  const [active,setActive]=useState(null);         // casting currently being reviewed
  const [activeRole,setActiveRole]=useState(null); // role within the casting
  const [roleCounts,setRoleCounts]=useState({});   // role_id -> total count
  const [rolePending,setRolePending]=useState({}); // role_id -> pending count
  const [submissions,setSubmissions]=useState([]); // all applications for activeRole (any status)
  const [si,setSi]=useState(0);                    // index inside pending list
  const [tab,setTab]=useState("castings");         // top-level: "castings" | "allSelected"
  const [folder,setFolder]=useState("pending");    // per-role: pending | hold | selected | rejected
  const [showNew,setShowNew]=useState(false);
  const [myCastings,setMyCastings]=useState([]);
  const [loading,setLoading]=useState(true);
  const [stats,setStats]=useState({total:0,pending:0,selected:0,hold:0});
  const [allSelected,setAllSelected]=useState([]); // cross-casting "everyone I selected"
  const [reloadTick,setReloadTick]=useState(0);
  const [msgApp,setMsgApp]=useState(null);
  // Saved-lists tab state — loaded on demand and refreshed when the CD adds/removes
  const [savedLists,setSavedLists]=useState([]);     // [{id,name,members:[{talent_id,profile}]}]
  const [savedListsLoading,setSavedListsLoading]=useState(false);
  const [activeList,setActiveList]=useState(null);   // expanded list view
  const [showNewListInline,setShowNewListInline]=useState(false);
  const [newListName,setNewListName]=useState("");
  const [savedListsErr,setSavedListsErr]=useState("");
  const [composeDmTo,setComposeDmTo]=useState(null); // {id,name} when CD is composing a DM from saved-lists tab
  const [search,setSearch]=useState("");
  const [sortBy,setSortBy]=useState("newest");     // newest | oldest | name
  const [lastUndo,setLastUndo]=useState(null);     // {appId, prevStatus, newStatus, name}
  const [savingErr,setSavingErr]=useState("");
  const decidingRef=useRef(false);

  const uid=session?.user?.id;

  // Builds the rich-profile object TalentProfile expects, from a DB `applications` row.
  const buildTalentView=(a)=>{
    const p=a?.profiles||{};
    const additional=Array.isArray(p.additional_photos)?p.additional_photos:[];
    const mainPhoto=a?.selected_photo_url||p.headshot_url||"";
    const seen=new Set();const allPhotos=[];
    [mainPhoto,p.headshot_url,...additional].forEach(u=>{if(u&&!seen.has(u)){seen.add(u);allPhotos.push(u);}});
    return {
      ...p,
      id:p.id||a?.talent_id,
      name:p.display_name||"Applicant",
      display_name:p.display_name||"Applicant",
      img:mainPhoto||"https://placehold.co/400x500/e5e5e5/999?text=No+Headshot",
      type:"Talent",
      union:p.union_status||"Non-Union",
      skills:Array.isArray(p.skills)?p.skills:[],
      additional_photos:additional,
      video_links:Array.isArray(p.video_links)?p.video_links:[],
      credits:p.credits||"",
      _allPhotos:allPhotos,
      _selectedPhoto:a?.selected_photo_url||null,
      _coverNote:a?.cover_note||"",
      _roleName:a?.roles?.name||""
    };
  };

  // ─── Load castings + aggregate stats (and cross-casting Selected list)
  //     Errors are now surfaced (was silent console.warn) and the load is wrapped in
  //     a callback so a 60s polling interval + focus refetch can keep the dashboard
  //     synced even if realtime drops. On failure, last good state is preserved.
  const [cdLoadErr,setCdLoadErr]=useState("");
  const loadCdCastings=useCallback(async()=>{
    if(!uid){setLoading(false);return;}
    setLoading(true);
    try{
      const {data:cs,error:csErr}=await window.sb.from("castings").select("*,roles(id,name)").eq("cd_id",uid).order("created_at",{ascending:false});
      if(csErr)throw csErr;
      const castings=cs||[];
      const ids=castings.map(c=>c.id);
      let counts={};let total=0;let pending=0;let selected=0;let hold=0;let sel=[];
      if(ids.length){
        const {data:apps,error:appErr}=await window.sb.from("applications")
          .select("id,casting_id,role_id,status,talent_id,cover_note,selected_photo_url,created_at,reviewed_at,profiles(*),roles(id,name)")
          .in("casting_id",ids);
        if(appErr)throw appErr;
        (apps||[]).forEach(a=>{
          counts[a.casting_id]=(counts[a.casting_id]||0)+1;
          total++;
          if(a.status==='pending')pending++;
          else if(a.status==='hold')hold++;
          else if(a.status==='selected'){selected++;sel.push(a);}
        });
      }
      setMyCastings(castings.map(c=>({...c,_count:counts[c.id]||0})));
      setStats({total,pending,selected,hold});
      setAllSelected(sel);
      setCdLoadErr("");
    }catch(e){
      console.error("[cd] dashboard load failed:",e);
      setCdLoadErr(e.message||"Could not load your castings.");
      // Preserve last good state — do NOT clear myCastings.
    }finally{setLoading(false);}
  },[uid]);

  useEffect(()=>{loadCdCastings();},[loadCdCastings,reloadTick,castingsVersion]);

  // Polling backstop + focus refetch — covers websocket disconnects so a posted
  // casting never silently vanishes from the CD's own dashboard.
  useEffect(()=>{
    if(!uid)return;
    const onFocus=()=>setReloadTick(t=>t+1);
    window.addEventListener("focus",onFocus);
    document.addEventListener("visibilitychange",onFocus);
    const tid=setInterval(()=>loadCdCastings(),60000);
    return()=>{
      window.removeEventListener("focus",onFocus);
      document.removeEventListener("visibilitychange",onFocus);
      clearInterval(tid);
    };
  },[uid,loadCdCastings]);

  // ─── Load saved talent lists + members. Runs whenever the CD opens that tab or
  //     after they add/remove a list / member.
  const loadSavedLists=useCallback(async()=>{
    if(!uid)return;
    setSavedListsLoading(true);setSavedListsErr("");
    try{
      const {data:lists,error}=await window.sb.from("talent_lists").select("id,name,created_at").eq("cd_id",uid).order("created_at",{ascending:false});
      if(error)throw error;
      const ids=(lists||[]).map(l=>l.id);
      let memberRows=[];
      if(ids.length){
        const {data:mm,error:mErr}=await window.sb.from("talent_list_members")
          .select("list_id,talent_id,added_at,profiles:talent_id(id,display_name,headshot_url,location,age,gender,union_status,user_type)")
          .in("list_id",ids)
          .order("added_at",{ascending:false});
        if(mErr)throw mErr;
        memberRows=mm||[];
      }
      const grouped=(lists||[]).map(l=>({...l,members:memberRows.filter(m=>m.list_id===l.id)}));
      setSavedLists(grouped);
      // If we were viewing a list that just got refreshed, sync it
      if(activeList){
        const fresh=grouped.find(l=>l.id===activeList.id);
        setActiveList(fresh||null);
      }
    }catch(e){setSavedListsErr(e.message||"Could not load lists.");}
    finally{setSavedListsLoading(false);}
  },[uid,activeList]);

  useEffect(()=>{if(tab==="savedLists")loadSavedLists();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  },[tab,uid,reloadTick]);

  const createList=async()=>{
    const name=newListName.trim();
    if(!name)return;
    setSavedListsErr("");
    try{
      const {data,error}=await window.sb.from("talent_lists").insert({cd_id:uid,name}).select().single();
      if(error)throw error;
      setSavedLists(prev=>[{...data,members:[]},...prev]);
      setNewListName("");setShowNewListInline(false);
    }catch(e){setSavedListsErr(e.message||"Could not create list.");}
  };

  const deleteList=async(listId)=>{
    if(!confirm("Delete this list? Members aren't deleted — only your saved-list grouping."))return;
    setSavedListsErr("");
    // Optimistic
    const prev=savedLists;
    setSavedLists(p=>p.filter(l=>l.id!==listId));
    if(activeList?.id===listId)setActiveList(null);
    try{
      const {error}=await window.sb.from("talent_lists").delete().eq("id",listId);
      if(error)throw error;
    }catch(e){
      setSavedLists(prev);
      setSavedListsErr(e.message||"Could not delete list.");
    }
  };

  const removeFromList=async(listId,talentId)=>{
    setSavedListsErr("");
    const prev=savedLists;
    setSavedLists(p=>p.map(l=>l.id===listId?{...l,members:l.members.filter(m=>m.talent_id!==talentId)}:l));
    if(activeList?.id===listId){
      setActiveList(a=>a?{...a,members:a.members.filter(m=>m.talent_id!==talentId)}:a);
    }
    try{
      const {error}=await window.sb.from("talent_list_members").delete().eq("list_id",listId).eq("talent_id",talentId);
      if(error)throw error;
    }catch(e){
      setSavedLists(prev);
      setSavedListsErr(e.message||"Could not remove member.");
    }
  };

  // ─── Open a casting — load per-role counts (total + pending)
  const openReview=async(casting)=>{
    setActive(casting);setActiveRole(null);setSi(0);
    const roleIds=(casting.roles||[]).map(r=>r.id);
    if(!roleIds.length){setRoleCounts({});setRolePending({});return;}
    const {data,error}=await window.sb.from("applications").select("role_id,status").eq("casting_id",casting.id);
    if(error)console.warn("[cd] openReview error:",error.message);
    const c={};const p={};
    (data||[]).forEach(a=>{
      c[a.role_id]=(c[a.role_id]||0)+1;
      if(a.status==='pending')p[a.role_id]=(p[a.role_id]||0)+1;
    });
    setRoleCounts(c);setRolePending(p);
  };

  // ─── Open a role — load all submissions, reset review state
  const openRole=async(role)=>{
    setActiveRole(role);setSi(0);setFolder("pending");setSearch("");setSortBy("newest");setLastUndo(null);setSavingErr("");
    const {data,error}=await window.sb.from("applications")
      .select("*,profiles(*),roles(id,name)").eq("role_id",role.id).order("created_at",{ascending:false});
    if(error)console.warn("[review] openRole error:",error.message);
    // Safety: if a profile row wasn't returned (RLS), leave a stub so the card still renders.
    const subs=(data||[]).map(a=>a.profiles?a:{...a,profiles:{id:a.talent_id,display_name:"Anonymous Applicant",headshot_url:null,skills:[],additional_photos:[],video_links:[]}});
    setSubmissions(subs);
  };

  // ─── Decide: reject / hold / select (optimistic with rollback)
  //     target is optional — defaults to the current pending card
  const decide=async(action,target)=>{
    if(decidingRef.current)return;
    const nextStatus=action==='reject'?'rejected':action==='hold'?'hold':action==='select'?'selected':null;
    if(!nextStatus)return;
    const app=target||pendingList[si];
    if(!app)return;
    const prevStatus=app.status;
    if(prevStatus===nextStatus)return;

    decidingRef.current=true;
    setSavingErr("");
    const ts=new Date().toISOString();
    // Optimistic local update
    setSubmissions(p=>p.map(a=>a.id===app.id?{...a,status:nextStatus,reviewed_at:ts}:a));
    setLastUndo({appId:app.id,prevStatus,newStatus:nextStatus,name:app.profiles?.display_name||"applicant"});
    console.log("[review] decide:",app.id,prevStatus,"→",nextStatus);

    const {error}=await window.sb.from("applications").update({status:nextStatus,reviewed_at:ts}).eq("id",app.id);
    decidingRef.current=false;

    if(error){
      console.warn("[review] update error:",error.message);
      // Rollback
      setSubmissions(p=>p.map(a=>a.id===app.id?{...a,status:prevStatus}:a));
      setLastUndo(null);
      setSavingErr("Could not save that decision. Please try again.");
      return;
    }
    setReloadTick(t=>t+1); // refresh stats
  };

  const undo=async()=>{
    const u=lastUndo;if(!u)return;
    setLastUndo(null);setSavingErr("");
    // Optimistic revert
    setSubmissions(p=>p.map(a=>a.id===u.appId?{...a,status:u.prevStatus}:a));
    console.log("[review] undo:",u.appId,u.newStatus,"→",u.prevStatus);
    const {error}=await window.sb.from("applications").update({status:u.prevStatus,reviewed_at:u.prevStatus==='pending'?null:new Date().toISOString()}).eq("id",u.appId);
    if(error){
      console.warn("[review] undo error:",error.message);
      setSubmissions(p=>p.map(a=>a.id===u.appId?{...a,status:u.newStatus}:a));
      setSavingErr("Undo failed. Please refresh and try again.");
      return;
    }
    setReloadTick(t=>t+1);
  };

  // Move a specific application between folders (e.g. from Hold → Selected)
  const moveTo=(appId,action)=>{
    const app=submissions.find(a=>a.id===appId);
    if(!app)return;
    decide(action,app);
  };

  // ─── Filter helpers (pending = swipe deck; others = list view)
  const pendingList=submissions.filter(s=>s.status==='pending');
  const byFolder=submissions.filter(s=>s.status===folder);
  const counts={
    pending:submissions.filter(s=>s.status==='pending').length,
    hold:submissions.filter(s=>s.status==='hold').length,
    selected:submissions.filter(s=>s.status==='selected').length,
    rejected:submissions.filter(s=>s.status==='rejected').length,
  };
  const searchFilter=(arr)=>{
    const q=search.trim().toLowerCase();
    if(!q)return arr;
    return arr.filter(a=>(a.profiles?.display_name||'').toLowerCase().includes(q)||(a.cover_note||'').toLowerCase().includes(q));
  };
  const sortApps=(arr)=>{
    const copy=[...arr];
    const d=x=>new Date(x.reviewed_at||x.created_at||0).getTime();
    if(sortBy==='newest')copy.sort((a,b)=>d(b)-d(a));
    else if(sortBy==='oldest')copy.sort((a,b)=>d(a)-d(b));
    else if(sortBy==='name')copy.sort((a,b)=>(a.profiles?.display_name||'').localeCompare(b.profiles?.display_name||''));
    return copy;
  };
  const folderList=sortApps(searchFilter(byFolder));

  // Clamp si if the pending list shrinks underneath us
  useEffect(()=>{if(si>0&&si>=pendingList.length&&pendingList.length>0)setSi(pendingList.length-1);},[pendingList.length,si]);

  // ─── Review card (swipe deck, pending only)
  const ReviewCard=()=>{
    const [dx,setDx]=useState(0);const [dy,setDy]=useState(0);const [dr,setDr]=useState(false);
    const sx=useRef(0);const sy=useRef(0);
    const app=pendingList[si];const nextApp=pendingList[si+1];
    if(!app)return null;
    const t=app.profiles||{};
    const nt=nextApp?.profiles||t;
    const img=app.selected_photo_url||t.headshot_url||"https://placehold.co/400x500/e5e5e5/999?text=No+Headshot";
    const nimg=nextApp?.selected_photo_url||nt.headshot_url||img;
    const horizDom=Math.abs(dx)>Math.abs(dy);
    const ac = horizDom ? (dx>60?"select":dx<-60?"reject":null) : (dy<-60?"hold":null);
    const end=()=>{
      setDr(false);
      if(Math.abs(dx)>100 && Math.abs(dx)>Math.abs(dy)){
        if(dx>0)decide('select');else decide('reject');
      } else if(dy<-90){
        decide('hold');
      } else {
        setDx(0);setDy(0);
      }
    };
    const credits=String(t.credits||"");
    const reelUrl=Array.isArray(t.video_links)?t.video_links.find(u=>u):null;
    return(<>
      <div className="sw-counter">{counts.pending} pending · reviewing {Math.min(si+1,pendingList.length)} of {pendingList.length} · Role: {app.roles?.name||activeRole?.name||"—"}</div>
      <div className="swipe-card-wrap">
        {nextApp&&<div className="s-card" style={{transform:"scale(.94) translateY(10px)",opacity:.4,zIndex:1}}>
          <img src={nimg} alt=""/><div className="s-card-info"><h3>{nt.display_name||"Applicant"}</h3></div>
        </div>}
        <div className="s-card"
          style={{transform:`translate(${dx}px, ${Math.min(dy,0)}px) rotate(${dx*.035}deg)`,transition:dr?"none":"transform .35s cubic-bezier(.34,1.56,.64,1)",zIndex:2,cursor:dr?"grabbing":"grab"}}
          onPointerDown={e=>{setDr(true);sx.current=e.clientX;sy.current=e.clientY;}}
          onPointerMove={e=>{if(dr){setDx(e.clientX-sx.current);setDy(e.clientY-sy.current);}}}
          onPointerUp={end} onPointerCancel={end}>
          <div className="sw-overlay" style={{color:"var(--red)",opacity:ac==="reject"?1:0}}>REJECT</div>
          <div className="sw-overlay" style={{color:"#c88900",opacity:ac==="hold"?1:0}}>HOLD</div>
          <div className="sw-overlay" style={{color:"var(--grn)",opacity:ac==="select"?1:0}}>SELECT ✓</div>
          <img src={img} alt={t.display_name} draggable="false"/>
          <div className="s-card-info">
            <h3>{t.display_name||"Applicant"}</h3>
            <div className="s-card-meta">{[t.age,t.gender,t.height,t.location].filter(Boolean).join(" · ")||"—"}</div>
            <div className="s-card-tags">
              {(t.skills||[]).slice(0,3).map((s,i)=><span key={i}>{s}</span>)}
              {t.union_status&&<span style={{background:"rgba(26,26,46,.08)",color:"var(--acc)"}}>{t.union_status}</span>}
            </div>
            {credits&&<p style={{marginTop:8,fontSize:12,color:"var(--t2)"}}>{credits.slice(0,140)}{credits.length>140?"…":""}</p>}
            {reelUrl&&<p style={{marginTop:6,fontSize:12}}><a href={reelUrl} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} style={{color:"var(--blu)",textDecoration:"underline"}}>🎬 Watch reel</a></p>}
            {app.cover_note&&<p style={{marginTop:8,fontSize:12,color:"var(--t2)",fontStyle:"italic"}}>"{String(app.cover_note).slice(0,160)}{String(app.cover_note).length>160?"…":""}"</p>}
          </div>
        </div>
      </div>
    </>);
  };

  // ─── Folder card (non-pending list item w/ move-between-folder buttons)
  const FolderCard=({a})=>{
    const t=a.profiles||{};
    const img=a.selected_photo_url||t.headshot_url||"https://placehold.co/400x500/e5e5e5/999?text=?";
    const statusTag=a.status==='selected'?'tag-grn':a.status==='hold'?'tag-acc':a.status==='rejected'?'tag-red':'';
    return(<div className="card" style={{padding:14,display:"flex",gap:12,alignItems:"stretch"}}>
      <img src={img} alt="" style={{width:80,height:100,objectFit:"cover",borderRadius:8,cursor:"pointer",flexShrink:0}} onClick={()=>onViewProfile(buildTalentView(a))}/>
      <div style={{flex:1,display:"flex",flexDirection:"column",gap:4,minWidth:0}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
          <div style={{minWidth:0,flex:1}}>
            <h4 style={{fontSize:15,fontWeight:800,cursor:"pointer",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}} onClick={()=>onViewProfile(buildTalentView(a))}>{t.display_name||"Applicant"}</h4>
            <p style={{fontSize:12,color:"var(--t2)"}}>{[t.age,t.gender,t.location,t.union_status].filter(Boolean).join(" · ")||"—"}</p>
          </div>
          <span className={"badge "+statusTag} style={{fontSize:10,textTransform:"uppercase",flexShrink:0}}>{a.status}</span>
        </div>
        {a.cover_note&&<p style={{fontSize:12,color:"var(--t3)",fontStyle:"italic",marginTop:2}}>"{String(a.cover_note).slice(0,120)}{String(a.cover_note).length>120?"…":""}"</p>}
        <div style={{display:"flex",gap:6,marginTop:"auto",flexWrap:"wrap"}}>
          {a.status!=='selected'&&<button className="btn-s btn-sm" style={{fontSize:11,padding:"6px 10px"}} onClick={()=>moveTo(a.id,'select')}>→ Select</button>}
          {a.status!=='hold'&&<button className="btn-s btn-sm" style={{fontSize:11,padding:"6px 10px"}} onClick={()=>moveTo(a.id,'hold')}>→ Hold</button>}
          {a.status!=='rejected'&&<button className="btn-s btn-sm" style={{fontSize:11,padding:"6px 10px"}} onClick={()=>moveTo(a.id,'reject')}>→ Reject</button>}
          {a.status==='selected'&&<button className="btn-p btn-sm" style={{fontSize:11,padding:"6px 10px",marginLeft:"auto"}} onClick={()=>setMsgApp(a)}>💬 Message</button>}
        </div>
      </div>
    </div>);
  };

  if(!uid)return(<div className="page page-wide"><p>Not logged in.</p></div>);
  if(loading)return(<div className="page page-wide"><p style={{color:"var(--t2)"}}>Loading your dashboard…</p></div>);

  return(<div className="page page-wide">
    <div className="flex-between mb-20">
      <div>
        <div className="section-label">Dashboard</div>
        <h2 className="section-title" style={{marginBottom:0}}>{myProfile?.display_name||"Casting Director"}</h2>
      </div>
      <button className="btn-p" onClick={()=>setShowNew(true)}>+ New Casting</button>
    </div>
    <div className="dash-stats">
      <div className="dash-stat"><div className="dash-stat-num">{myCastings.length}</div><div className="dash-stat-label">Active Castings</div></div>
      <div className="dash-stat"><div className="dash-stat-num">{stats.total}</div><div className="dash-stat-label">Total Submissions</div></div>
      <div className="dash-stat"><div className="dash-stat-num" style={{color:stats.pending>0?"var(--acc)":undefined}}>{stats.pending}</div><div className="dash-stat-label">Pending Review</div></div>
      <div className="dash-stat"><div className="dash-stat-num">{stats.selected}</div><div className="dash-stat-label">Selected</div></div>
    </div>

    {active&&activeRole?<>
      {/* ─── Per-role review: folder tabs + swipe deck (pending) or list (hold/selected/rejected) ─── */}
      <button className="btn-s btn-sm mb-20" onClick={()=>{setActiveRole(null);setSi(0);setReloadTick(t=>t+1);openReview(active);}}>← Back to Roles</button>
      <div style={{marginBottom:14}}>
        <h3 style={{fontSize:20,fontWeight:800}}>{active.title} · {activeRole.name}</h3>

      <div className="tabs" style={{marginBottom:16}}>
        <button className={`tab ${folder==="pending"?"active":""}`} onClick={()=>setFolder("pending")}>Pending <span style={{opacity:.6}}>({counts.pending})</span></button>
        <button className={`tab ${folder==="hold"?"active":""}`} onClick={()=>setFolder("hold")}>Hold <span style={{opacity:.6}}>({counts.hold})</span></button>
        <button className={`tab ${folder==="selected"?"active":""}`} onClick={()=>setFolder("selected")}>Selected <span style={{opacity:.6}}>({counts.selected})</span></button>
        <button className={`tab ${folder==="rejected"?"active":""}`} onClick={()=>setFolder("rejected")}>Rejected <span style={{opacity:.6}}>({counts.rejected})</span></button>

         counts.pending===0?

            <div className="swipe-area">
              <ReviewCard key={pendingList[si]?.id||si}/>
              <div className="swipe-btns">
                <button className="sw-btn pass" onClick={()=>decide('reject')} title="Reject (swipe left)">✕</button>
                <button className="sw-btn save" style={{background:"rgba(200,137,0,0.15)",color:"#c88900"}} onClick={()=>decide('hold')} title="Hold (swipe up)">⏸</button>
                <button className="sw-btn yes" onClick={()=>decide('select')} title="Select (swipe right)">✓</button>

                    <div className="cb-item-info" style={{flex:1}}><h4>{a.profiles?.display_name||"Applicant"}</h4><p>{[a.profiles?.age,a.profiles?.gender,a.profiles?.location].filter(Boolean).join(" · ")}</p></div>

                  <div style={{display:"flex",gap:6,marginTop:8}}>
                    <button className="btn-p btn-sm" style={{flex:1,fontSize:11,padding:"6px 10px"}} onClick={()=>setMsgApp(a)}>💬 Message</button>

            <option value="oldest">Oldest first</option>

    </>:<>
      <div className="tabs">
        <button className={`tab ${tab==="castings"?"active":""}`} onClick={()=>setTab("castings")}>My Castings</button>

        <span>Couldn't refresh dashboard: {cdLoadErr}{myCastings.length>0?" — showing last loaded list.":""}</span>
        <button className="btn-s btn-sm" onClick={()=>setReloadTick(t=>t+1)}>Retry</button>
      </div>}
      {tab==="castings"?
        myCastings.length===0?<div className="card" style={{textAlign:"center",padding:48}}>
          <p style={{color:"var(--t3)",marginBottom:16}}>{loading?"Loading your castings…":"You haven't posted any castings yet."}</p>

        </div>:
        <div className="card-flat">{myCastings.map(c=>
          <div key={c.id} className="casting-row" onClick={()=>openReview(c)}>
            <div className="casting-row-left"><h4>{c.title}</h4><p>{c.prod||"—"} · {c.location||"—"} · {(c.roles||[]).length} role{(c.roles||[]).length===1?"":"s"} · Deadline {c.deadline||"—"}</p></div>
            <div className="casting-row-right">
              <span className="badge tag-acc">{c.type||"Film"}</span>
              <div style={{textAlign:"right"}}><div className="sub-count">{c._count}</div><div style={{fontSize:10,color:"var(--t3)"}}>submissions</div></div>
              <span style={{color:"var(--acc)",fontSize:18}}>→</span>
            </div>
          </div>)}</div>:
        tab==="allSelected"?
          (allSelected.length===0?<div className="card" style={{textAlign:"center",padding:48}}><p style={{color:"var(--t3)"}}>No selected talent yet. Review your pending submissions to build your shortlist.</p></div>:
          <div className="results-grid">{allSelected.map((a,i)=>{const p=a.profiles||{};return(<div key={a.id||i} className="talent-thumb" onClick={()=>onViewProfile(buildTalentView(a))}><img src={a.selected_photo_url||p.headshot_url||"https://placehold.co/400x500/e5e5e5/999?text=?"} alt={p.display_name||""}/><div className="talent-thumb-info"><h4>{p.display_name||"Applicant"}</h4><p>{[p.age,p.location].filter(Boolean).join(" · ")}</p></div></div>);})}</div>):

        <>

              <p style={{color:"var(--t3)"}}>This list is empty. Open any talent profile and use "★ Save to List" to add them here.</p>
            </div>:<div className="results-grid">{activeList.members.map(m=>{
              const p=m.profiles||{};
              const tv={
                ...p,
                id:p.id||m.talent_id,
                name:p.display_name||"Talent",
                img:p.headshot_url||"https://placehold.co/400x500/e5e5e5/999?text=?",
                union:p.union_status||"Non-Union",
                _db:true
              };
              return(<div key={m.talent_id} className="talent-thumb" style={{position:"relative"}}>
                <img src={tv.img} alt={tv.name} onClick={()=>onViewProfile(tv)} style={{cursor:"pointer"}}/>
                <div className="talent-thumb-info">
                  <h4 onClick={()=>onViewProfile(tv)} style={{cursor:"pointer"}}>{tv.name}</h4>
                  <p>{[p.age,p.gender,p.location].filter(Boolean).join(" · ")||"—"}</p>
                  <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
                    <button className="btn-p btn-sm" style={{fontSize:11,padding:"6px 10px"}} onClick={()=>setComposeDmTo({id:m.talent_id,name:tv.name})}>💬 Message</button>
                    <button className="btn-s btn-sm" style={{fontSize:11,padding:"6px 10px",color:"#c0392b",borderColor:"rgba(255,100,100,0.35)"}} onClick={()=>removeFromList(activeList.id,m.talent_id)}>Remove</button>
                  </div>
                </div>
              </div>);
            })}</div>}
          </>:<>
            {/* Index: all lists */}
            <div className="flex-between" style={{marginBottom:14,flexWrap:"wrap",gap:12}}>
              <p style={{color:"var(--t2)",fontSize:13}}>Custom lists you build by saving talent from their profiles. Use lists to organize callbacks, recurring collaborators, or shortlists per project.</p>

              <div style={{flex:1,minWidth:220}}>
