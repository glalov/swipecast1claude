                <input className="input" autoFocus value={newListName} onChange={e=>setNewListName(e.target.value)} placeholder="e.g. Lead Talent — Spring 2026" onKeyDown={e=>{if(e.key==="Enter")createList();}}/>
              </div>
              <button className="btn-p btn-sm" onClick={createList} disabled={!newListName.trim()}>Create</button>
              <button className="btn-s btn-sm" onClick={()=>{setShowNewListInline(false);setNewListName("");}}>Cancel</button>
            </div>}
            {savedListsLoading?<p style={{color:"var(--t3)"}}>Loading your lists…</p>:savedLists.length===0?<div className="card" style={{padding:48,textAlign:"center"}}>
              <p style={{color:"var(--t3)",marginBottom:16}}>No saved lists yet.</p>
              <p style={{color:"var(--t3)",fontSize:13}}>Open any talent profile and click <strong>★ Save to List</strong> to start organizing.</p>
            </div>:<div className="card-flat">{savedLists.map(l=>
              <div key={l.id} className="casting-row" onClick={()=>setActiveList(l)} style={{cursor:"pointer"}}>
                <div className="casting-row-left">
                  <h4>{l.name}</h4>
                  <p>{l.members.length} talent · created {new Date(l.created_at).toLocaleDateString()}</p>
                </div>
                <div className="casting-row-right">
                  <div style={{display:"flex",gap:6,marginRight:12}}>
                    {l.members.slice(0,4).map((m,i)=><img key={i} src={m.profiles?.headshot_url||"https://placehold.co/40x40/e5e5e5/999?text=?"} alt="" style={{width:32,height:32,borderRadius:"50%",objectFit:"cover",border:"2px solid var(--s1)",marginLeft:i===0?0:-12}}/>)}
                  </div>
                  <span style={{color:"var(--acc)",fontSize:18}}>→</span>
                </div>
              </div>)}</div>}
          </>}
        </>}
    </>}

    {showNew&&<NewCastingModal onClose={()=>setShowNew(false)} onPosted={(inserted)=>{
        // Optimistic update: prepend the newly-inserted casting to myCastings so
        // it appears immediately, before the background refetch lands.
        if(inserted&&inserted.id){
          setMyCastings(prev=>{
            if(prev.some(c=>c.id===inserted.id))return prev; // idempotent
            return [{...inserted,_count:0,roles:inserted.roles||[]},...prev];
          });
        }
        setShowNew(false);
        setReloadTick(t=>t+1);              // my-castings refetch
        if(bumpCastings)bumpCastings();     // global: SearchPage + realtime consumers
      }} uid={uid}/>}
    {msgApp&&<MessageModal app={msgApp} fromId={uid} castingTitle={active?.title||""} onClose={()=>setMsgApp(null)} onSent={()=>setMsgApp(null)}/>}
    {composeDmTo&&<ComposeDMModal fromId={uid} toId={composeDmTo.id} toName={composeDmTo.name} onClose={()=>setComposeDmTo(null)}/>}

    <Footer onNavigate={onNavigate}/></div>);
}

// ─── Message + Audition modal (CD → actor)
function MessageModal({app,fromId,castingTitle,onClose,onSent}){
  const [body,setBody]=useState("");
  const [auditionAt,setAuditionAt]=useState(""); // datetime-local
  const [auditionNote,setAuditionNote]=useState("");
  const [err,setErr]=useState("");
  const [busy,setBusy]=useState(false);
  const [sent,setSent]=useState(false);
  const t=app.profiles;
  const send=async()=>{
    setErr("");
    if(!body.trim()&&!auditionAt){setErr("Write a message or schedule an audition.");return;}
    setBusy(true);
    try{
      // compose full message body — include audition info inline if scheduled
      let full=body.trim();
      if(auditionAt){
        const d=new Date(auditionAt);
        full=(full?full+"\n\n":"")+"📅 Audition scheduled: "+d.toLocaleString()+(auditionNote?"\n"+auditionNote:"");
      }
      if(full){
        const {error}=await window.sb.from("messages").insert({from_id:fromId,to_id:app.talent_id,application_id:app.id,body:full});
        if(error)throw error;
      }
      if(auditionAt){
        const {error:e2}=await window.sb.from("applications").update({audition_at:new Date(auditionAt).toISOString(),audition_note:auditionNote||null}).eq("id",app.id);
        if(e2)throw e2;
      }
      setSent(true);
      setTimeout(()=>onSent&&onSent(),900);
    }catch(e){setErr(e.message||"Could not send.");}
    finally{setBusy(false);}
  };
  return(<div className="modal-overlay" onClick={()=>!busy&&onClose()}><div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:540}}>
    {sent?<div className="success-msg"><div className="check">✓</div><h3>Message Sent</h3><p>{t.display_name} will see it in their inbox.</p></div>:<>
      <h2>Message {t.display_name}</h2>
      <div style={{background:"var(--s2)",borderRadius:10,padding:14,marginBottom:16,display:"flex",gap:10,alignItems:"center"}}>
        <img src={app.selected_photo_url||t.headshot_url||"https://placehold.co/60x75/e5e5e5/999?text=?"} style={{width:44,height:55,objectFit:"cover",borderRadius:6}}/>
        <div><h4 style={{fontSize:14,fontWeight:700}}>{t.display_name}</h4><p style={{color:"var(--t2)",fontSize:12}}>Re: {castingTitle} · {app.roles?.name||"—"}</p></div>
      </div>
      {err&&<div style={{background:"rgba(255,100,100,0.1)",border:"1px solid rgba(255,100,100,0.3)",color:"#c0392b",padding:"10px 14px",borderRadius:8,fontSize:13,marginBottom:12}}>{err}</div>}
      <div className="form-group"><label className="label">Message</label><textarea className="textarea" rows="4" placeholder="Hi! Loved your submission — would love to bring you in for a callback…" value={body} onChange={e=>setBody(e.target.value)}></textarea></div>
      <div style={{background:"var(--s1)",border:"1px solid var(--bdr)",borderRadius:10,padding:16,marginBottom:16}}>
        <div style={{fontSize:12,color:"var(--t3)",textTransform:"uppercase",letterSpacing:1.5,fontWeight:700,marginBottom:10}}>📅 Schedule Audition (Optional)</div>
        <div className="form-group" style={{marginBottom:10}}><label className="label">Date & Time</label><input className="input" type="datetime-local" value={auditionAt} onChange={e=>setAuditionAt(e.target.value)}/></div>
        <div className="form-group" style={{marginBottom:0}}><label className="label">Location / Details</label><input className="input" placeholder="e.g. 1420 Broadway, Studio 7 · bring sides" value={auditionNote} onChange={e=>setAuditionNote(e.target.value)}/></div>
      </div>
      <div style={{display:"flex",gap:12}}><button className="btn-p" style={{flex:1}} onClick={send} disabled={busy}>{busy?"Sending…":"Send Message"}</button><button className="btn-s" onClick={onClose} disabled={busy}>Cancel</button></div>
    </>}
  </div></div>);
}

// ─── Save talent to one of the CD's custom lists (or create a new list inline).
// Writes to talent_lists (if creating) and talent_list_members. Idempotent — adding the
// same talent to the same list twice is a no-op (unique PK on (list_id, talent_id)).
function SaveToListModal({cdId,talentId,talentName,onClose}){
  const [lists,setLists]=useState([]);          // CD's existing lists
  const [members,setMembers]=useState(new Set()); // list_ids that already contain this talent
  const [loading,setLoading]=useState(true);
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState("");
  const [creatingName,setCreatingName]=useState("");
  const [showCreate,setShowCreate]=useState(false);
  const [done,setDone]=useState(false);

  // Load CD's lists + which ones already include this talent
  useEffect(()=>{(async()=>{
    if(!cdId){setLoading(false);return;}
    try{
      const {data:ls}=await window.sb.from("talent_lists").select("id,name,created_at").eq("cd_id",cdId).order("created_at",{ascending:false});
      const ids=(ls||[]).map(l=>l.id);
      let m=new Set();
      if(ids.length){
        const {data:mm}=await window.sb.from("talent_list_members").select("list_id").eq("talent_id",talentId).in("list_id",ids);
        (mm||[]).forEach(r=>m.add(r.list_id));
      }
      setLists(ls||[]);
      setMembers(m);
    }catch(e){setErr(e.message||"Could not load your lists.");}
    finally{setLoading(false);}
  })();},[cdId,talentId]);

  const toggleList=async(listId)=>{
    if(busy)return;
    setBusy(true);setErr("");
    const inAlready=members.has(listId);
    // Optimistic
    setMembers(prev=>{const n=new Set(prev);if(inAlready)n.delete(listId);else n.add(listId);return n;});
    try{
      if(inAlready){
        const {error}=await window.sb.from("talent_list_members").delete().eq("list_id",listId).eq("talent_id",talentId);
        if(error)throw error;
      }else{
        const {error}=await window.sb.from("talent_list_members").insert({list_id:listId,talent_id:talentId});
        if(error)throw error;
      }
    }catch(e){
      // Roll back
      setMembers(prev=>{const n=new Set(prev);if(inAlready)n.add(listId);else n.delete(listId);return n;});
      setErr(e.message||"Could not update list.");
    }finally{setBusy(false);}
  };

  const createListAndAdd=async()=>{
    const name=creatingName.trim();
    if(!name){setErr("Give your list a name.");return;}
    setBusy(true);setErr("");
    try{
      const {data:list,error:lErr}=await window.sb.from("talent_lists").insert({cd_id:cdId,name}).select().single();
      if(lErr)throw lErr;
      const {error:mErr}=await window.sb.from("talent_list_members").insert({list_id:list.id,talent_id:talentId});
      if(mErr)throw mErr;
      setLists(prev=>[list,...prev]);
      setMembers(prev=>{const n=new Set(prev);n.add(list.id);return n;});
      setCreatingName("");setShowCreate(false);
      setDone(true);setTimeout(()=>setDone(false),1400);
    }catch(e){setErr(e.message||"Could not create list.");}
    finally{setBusy(false);}
  };

  return(<div className="modal-overlay" onClick={()=>!busy&&onClose()}><div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:480}}>
    <h2>Save {talentName}</h2>
    <p style={{color:"var(--t2)",fontSize:13,marginTop:-8,marginBottom:18}}>Add this talent to one of your saved lists, or create a new one. Tap a list to add or remove.</p>
    {err&&<div style={{background:"rgba(255,100,100,0.1)",border:"1px solid rgba(255,100,100,0.3)",color:"#c0392b",padding:"10px 14px",borderRadius:8,fontSize:13,marginBottom:12}}>{err}</div>}
    {done&&<div style={{background:"rgba(46,204,113,0.12)",border:"1px solid rgba(46,204,113,0.35)",color:"#1d7b44",padding:"10px 14px",borderRadius:8,fontSize:13,marginBottom:12}}>✓ Saved</div>}
    {loading?<p style={{color:"var(--t3)"}}>Loading your lists…</p>:<>
      {lists.length===0&&!showCreate&&<p style={{color:"var(--t3)",fontSize:13,marginBottom:14}}>You don't have any lists yet. Create your first one below.</p>}
      {lists.length>0&&<div style={{maxHeight:280,overflowY:"auto",border:"1px solid var(--bdr)",borderRadius:10,marginBottom:12}}>
        {lists.map(l=>{const inList=members.has(l.id);return(
          <button key={l.id} type="button" onClick={()=>toggleList(l.id)} disabled={busy} style={{display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%",padding:"12px 14px",background:inList?"rgba(46,204,113,0.08)":"transparent",border:"none",borderBottom:"1px solid var(--bdr)",cursor:"pointer",fontSize:14,fontWeight:inList?700:500,color:"var(--t1)",textAlign:"left"}}>
            <span>{l.name}</span>
            <span style={{fontSize:12,color:inList?"#1d7b44":"var(--t3)",fontWeight:700}}>{inList?"✓ In list":"+ Add"}</span>
          </button>
        );})}
      </div>}
      {showCreate?<div style={{background:"var(--s2)",borderRadius:10,padding:14,marginBottom:12}}>
        <label className="label">New list name</label>
        <input className="input" autoFocus value={creatingName} onChange={e=>setCreatingName(e.target.value)} placeholder="e.g. Lead Talent — Spring 2026" onKeyDown={e=>{if(e.key==="Enter")createListAndAdd();}}/>
        <div style={{display:"flex",gap:8,marginTop:10}}>
          <button className="btn-p btn-sm" onClick={createListAndAdd} disabled={busy}>{busy?"Creating…":"Create & Add"}</button>
          <button className="btn-s btn-sm" onClick={()=>{setShowCreate(false);setCreatingName("");setErr("");}} disabled={busy}>Cancel</button>
        </div>
      </div>:<button className="btn-s btn-sm" onClick={()=>setShowCreate(true)} disabled={busy}>+ New List</button>}
    </>}
    <div style={{display:"flex",gap:10,marginTop:18,justifyContent:"flex-end"}}>
      <button className="btn-p" onClick={onClose} disabled={busy}>Done</button>
    </div>
  </div></div>);
}

// ─── Invite a talent to apply for a specific role on one of the CD's open castings.
// Writes to project_invites with status='pending'. The talent sees the invite in their inbox.
function InviteToProjectModal({cdId,talentId,talentName,onClose}){
  const [castings,setCastings]=useState([]);
  const [pickedCasting,setPickedCasting]=useState(null);
  const [pickedRole,setPickedRole]=useState(null);
  const [note,setNote]=useState("");
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(true);
  const [sent,setSent]=useState(false);

  useEffect(()=>{(async()=>{
    if(!cdId){setLoading(false);return;}
    try{
      const {data}=await window.sb.from("castings").select("id,title,prod,location,roles(id,name)").eq("cd_id",cdId).eq("status","open").order("created_at",{ascending:false});
      setCastings(data||[]);
    }catch(e){setErr(e.message||"Could not load your castings.");}
    finally{setLoading(false);}
  })();},[cdId]);

  const send=async()=>{
    setErr("");
    if(!pickedCasting){setErr("Pick which casting you're inviting them to.");return;}
    setBusy(true);
    try{
      const payload={cd_id:cdId,talent_id:talentId,casting_id:pickedCasting.id,role_id:pickedRole?.id||null,note:note.trim()||null,status:"pending"};
      const {error}=await window.sb.from("project_invites").insert(payload);
      if(error)throw error;
      // Also drop a notification in the messages thread so the talent sees it in inbox immediately
      try{
        const body=`📩 You've been invited to ${pickedCasting.title}${pickedRole?` for the role of ${pickedRole.name}`:""}.${note.trim()?`\n\n"${note.trim()}"`:""}\n\nOpen your applications tab to accept or decline.`;
        await window.sb.from("messages").insert({from_id:cdId,to_id:talentId,application_id:null,body});
      }catch(_){/* non-fatal */}
      setSent(true);
      setTimeout(()=>onClose(),1100);
    }catch(e){setErr(e.message||"Could not send invite.");}
    finally{setBusy(false);}
  };

  return(<div className="modal-overlay" onClick={()=>!busy&&onClose()}><div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:560}}>
    {sent?<div className="success-msg"><div className="check">✓</div><h3>Invite Sent</h3><p>{talentName} will see your invite in their inbox.</p></div>:<>
      <h2>Invite {talentName}</h2>
      <p style={{color:"var(--t2)",fontSize:13,marginTop:-8,marginBottom:18}}>Pick a casting and (optionally) a role. The talent gets a project invite they can accept or decline from their inbox.</p>
      {err&&<div style={{background:"rgba(255,100,100,0.1)",border:"1px solid rgba(255,100,100,0.3)",color:"#c0392b",padding:"10px 14px",borderRadius:8,fontSize:13,marginBottom:12}}>{err}</div>}
      {loading?<p style={{color:"var(--t3)"}}>Loading your castings…</p>:castings.length===0?<>
        <div className="card" style={{padding:18,textAlign:"center",background:"var(--s2)"}}>
          <p style={{color:"var(--t3)",fontSize:13}}>You don't have any open castings yet. Post a casting first, then come back to invite this talent.</p>
        </div>
      </>:<>
        <div className="form-group">
          <label className="label">Casting *</label>
          <select className="select" style={{width:"100%"}} value={pickedCasting?.id||""} onChange={e=>{const c=castings.find(x=>x.id===e.target.value)||null;setPickedCasting(c);setPickedRole(null);}}>
            <option value="">— Pick one of your castings —</option>
            {castings.map(c=><option key={c.id} value={c.id}>{c.title}{c.prod?` · ${c.prod}`:""}</option>)}
          </select>
        </div>
        {pickedCasting&&(pickedCasting.roles||[]).length>0&&<div className="form-group">
          <label className="label">Role (optional)</label>
          <select className="select" style={{width:"100%"}} value={pickedRole?.id||""} onChange={e=>{const r=(pickedCasting.roles||[]).find(x=>x.id===e.target.value)||null;setPickedRole(r);}}>
            <option value="">— Any open role —</option>
            {(pickedCasting.roles||[]).map(r=><option key={r.id} value={r.id}>{r.name}</option>)}
          </select>
        </div>}
        <div className="form-group">
          <label className="label">Personal note (optional)</label>
          <textarea className="textarea" rows="4" placeholder={`Hi ${talentName.split(" ")[0]||"there"} — I think you'd be a great fit for this role. Take a look and let me know if you're interested.`} value={note} onChange={e=>setNote(e.target.value)}></textarea>
        </div>
        <div style={{display:"flex",gap:12,marginTop:8}}>
          <button className="btn-p" style={{flex:1}} onClick={send} disabled={busy||!pickedCasting}>{busy?"Sending…":"Send Invite"}</button>
          <button className="btn-s" onClick={onClose} disabled={busy}>Cancel</button>
        </div>
      </>}
    </>}
  </div></div>);
}

// ─── General-purpose direct message (not tied to an application). CD-side use mostly,
// but the same modal works for talent → CD too. Writes to public.messages with application_id=null.
function ComposeDMModal({fromId,toId,toName,onClose}){
  const [body,setBody]=useState("");
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState("");
  const [sent,setSent]=useState(false);
  const send=async()=>{
    setErr("");
    if(!body.trim()){setErr("Write something to send.");return;}
    if(!fromId||!toId){setErr("Missing sender or recipient.");return;}
    setBusy(true);
    try{
      const {error}=await window.sb.from("messages").insert({from_id:fromId,to_id:toId,application_id:null,body:body.trim()});
      if(error)throw error;
      setSent(true);
      setTimeout(()=>onClose(),900);
    }catch(e){setErr(e.message||"Could not send.");}
    finally{setBusy(false);}
  };
  return(<div className="modal-overlay" onClick={()=>!busy&&onClose()}><div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:520}}>
    {sent?<div className="success-msg"><div className="check">✓</div><h3>Message Sent</h3><p>{toName} will see it in their inbox.</p></div>:<>
      <h2>Message {toName}</h2>
      <p style={{color:"var(--t2)",fontSize:13,marginTop:-8,marginBottom:18}}>Direct message — no application or audition attached. Use this for quick check-ins or follow-ups.</p>
      {err&&<div style={{background:"rgba(255,100,100,0.1)",border:"1px solid rgba(255,100,100,0.3)",color:"#c0392b",padding:"10px 14px",borderRadius:8,fontSize:13,marginBottom:12}}>{err}</div>}
      <div className="form-group"><label className="label">Message</label><textarea className="textarea" rows="6" placeholder={`Hi ${toName.split(" ")[0]||"there"} — …`} value={body} onChange={e=>setBody(e.target.value)} autoFocus></textarea></div>
      <div style={{display:"flex",gap:12,marginTop:8}}>
        <button className="btn-p" style={{flex:1}} onClick={send} disabled={busy}>{busy?"Sending…":"Send Message"}</button>
        <button className="btn-s" onClick={onClose} disabled={busy}>Cancel</button>
      </div>
    </>}
  </div></div>);
}

// ─── Full thread view for a single inbox message.
// Shows sender info, exact date+time, casting context (if the message is tied to an
// application), the full message body, plus reply / delete / back actions.
// Auto-marks the message as read on mount so the unread badge updates instantly.
function MessageThreadModal({message,sessionUid,onClose,onRead,onDeleted,onReplied}){
  const [reply,setReply]=useState("");
  const [busy,setBusy]=useState(false);
  const [deleting,setDeleting]=useState(false);
  const [err,setErr]=useState("");
  const [sent,setSent]=useState(false);
  const [castingCtx,setCastingCtx]=useState(null); // {title, prod, location, role}
  const [thread,setThread]=useState([]);           // prior messages between same parties (best-effort)
  const readFiredRef=useRef(false);

  // 1) Mark unread → read on mount, exactly once. The parent already updates inbox state
  //    optimistically; this also writes through to the DB.
  useEffect(()=>{
    if(readFiredRef.current)return;
    readFiredRef.current=true;
    if(message&&!message.read_at&&typeof onRead==="function")onRead();
  },[message,onRead]);

  // 2) Lookup casting / role context if this message is tied to an application.
  useEffect(()=>{
    let cancelled=false;
    if(!message?.application_id){setCastingCtx(null);return;}
    (async()=>{
      try{
        const {data}=await window.sb.from("applications")
          .select("id,castings(id,title,prod,location,type),roles(name)")
          .eq("id",message.application_id).maybeSingle();
        if(!cancelled&&data)setCastingCtx({
          casting:data.castings||null,
          role:data.roles||null
        });
      }catch(_){/* silent — context is nice-to-have */}
    })();
    return()=>{cancelled=true;};
  },[message?.application_id]);

  // 3) Best-effort prior-thread fetch — pull a short history of messages between the
  //    same two parties so the user sees prior context, not just one orphan message.
  useEffect(()=>{
    let cancelled=false;
    if(!message||!sessionUid)return;
    const other=message.from_id===sessionUid?message.to_id:message.from_id;
    (async()=>{
      try{
        const {data}=await window.sb.from("messages")
          .select("id,from_id,to_id,body,created_at,read_at,application_id,profiles:from_id(display_name,company_name,headshot_url,user_type)")
          .or(`and(from_id.eq.${sessionUid},to_id.eq.${other}),and(from_id.eq.${other},to_id.eq.${sessionUid})`)
          .order("created_at",{ascending:true})
          .limit(50);
        if(!cancelled)setThread(data||[]);
      }catch(_){if(!cancelled)setThread([]);}
    })();
    return()=>{cancelled=true;};
  },[message?.id,sessionUid]);

  if(!message)return null;
  const sender=message.profiles||{};
  const senderName=sender.display_name||sender.company_name||"Unknown sender";
  const senderTypeLabel=(()=>{
    const t=(sender.user_type||"").toLowerCase();
    if(t==="cd")return "Casting Director";
    if(t==="talent")return "Actor / Talent";
    if(t==="admin"||t==="super_admin")return "SlateCue Admin";
    if(t==="producer")return "Producer";
    return "Member";
  })();
  const created=new Date(message.created_at);
  const dateStr=created.toLocaleDateString(undefined,{weekday:"long",year:"numeric",month:"long",day:"numeric"});
  const timeStr=created.toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"});

  const sendReply=async()=>{
    const body=reply.trim();
    if(!body||busy)return;
    setBusy(true);setErr("");
    try{
      // Reply goes BACK to the original sender. Carry application_id so the thread stays linked.
      const payload={
        from_id:sessionUid,
        to_id:message.from_id,
        application_id:message.application_id||null,
        body
      };
      const {data,error}=await window.sb.from("messages").insert(payload).select("id,from_id,to_id,body,created_at,read_at,application_id").single();
      if(error)throw error;
      setReply("");
      setSent(true);
      // Append to local thread so the user sees their reply immediately
      setThread(p=>[...p,{...data,profiles:{display_name:"You",user_type:"self"}}]);
      if(typeof onReplied==="function")onReplied(data);
      setTimeout(()=>setSent(false),1800);
    }catch(e){setErr(e.message||"Could not send reply.");}
    finally{setBusy(false);}
  };

  const deleteMsg=async()=>{
    if(deleting)return;
    if(!window.confirm("Delete this message? This cannot be undone."))return;
    setDeleting(true);setErr("");
    try{
      const {error}=await window.sb.from("messages").delete().eq("id",message.id);
      if(error)throw error;
      if(typeof onDeleted==="function")onDeleted(message.id);
      onClose();
    }catch(e){setErr(e.message||"Could not delete.");setDeleting(false);}
  };

  return(<div className="modal-overlay" onClick={()=>!busy&&!deleting&&onClose()}>
    <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:640,maxHeight:"90vh",overflowY:"auto"}}>
      {/* Header — back button + delete */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18,paddingBottom:14,borderBottom:"1px solid var(--bdr)"}}>
        <button className="btn-s btn-sm" onClick={onClose} disabled={busy||deleting}>← Back to inbox</button>
        <button onClick={deleteMsg} disabled={deleting||busy} style={{background:"transparent",border:"1px solid rgba(255,100,100,0.4)",color:"#c0392b",fontSize:12,fontWeight:600,padding:"7px 14px",borderRadius:8,cursor:"pointer"}}>{deleting?"Deleting…":"🗑 Delete"}</button>
      </div>

      {/* Sender header */}
      <div style={{display:"flex",gap:14,alignItems:"flex-start",marginBottom:18}}>
        <img src={sender.headshot_url||"https://placehold.co/56x56/e5e5e5/999?text=?"} alt="" style={{width:56,height:56,borderRadius:"50%",objectFit:"cover",flexShrink:0}}/>
        <div style={{minWidth:0,flex:1}}>
          <div style={{fontWeight:800,fontSize:17,letterSpacing:"-0.2px"}}>{senderName}</div>
          <div style={{fontSize:11,letterSpacing:1,textTransform:"uppercase",color:"var(--acc)",fontWeight:700,marginTop:2}}>{senderTypeLabel}</div>
          <div style={{fontSize:12,color:"var(--t3)",marginTop:6}}>{dateStr} · {timeStr}</div>
        </div>
      </div>

      {/* Casting context — only when message is tied to an application */}
      {castingCtx?.casting&&<div style={{background:"var(--s2)",border:"1px solid var(--bdr)",borderRadius:10,padding:"12px 14px",marginBottom:18}}>
        <div style={{fontSize:10,letterSpacing:1.2,textTransform:"uppercase",color:"var(--t3)",fontWeight:700,marginBottom:4}}>Related casting</div>
        <div style={{fontSize:14,fontWeight:700,color:"var(--t1)"}}>{castingCtx.casting.title||"Casting"}{castingCtx.role?.name?<span style={{color:"var(--t2)",fontWeight:500}}> · {castingCtx.role.name}</span>:null}</div>
        <div style={{fontSize:12,color:"var(--t3)",marginTop:2}}>{[castingCtx.casting.prod,castingCtx.casting.location,castingCtx.casting.type].filter(Boolean).join(" · ")}</div>
      </div>}

      {/* Message body — pre-wrap so newlines render */}
      <div style={{background:"var(--s1)",borderRadius:10,padding:"14px 16px",marginBottom:18,whiteSpace:"pre-wrap",lineHeight:1.6,fontSize:14,color:"var(--t1)",border:"1px solid var(--bdr)"}}>{message.body}</div>

      {/* Prior thread (if any) — kept compact, scroll within the modal if long */}
      {thread.length>1&&<div style={{marginBottom:20}}>
        <div style={{fontSize:10,letterSpacing:1.2,textTransform:"uppercase",color:"var(--t3)",fontWeight:700,marginBottom:8}}>Conversation history</div>
        <div style={{display:"flex",flexDirection:"column",gap:10,maxHeight:240,overflowY:"auto",paddingRight:4}}>
          {thread.filter(t=>t.id!==message.id).map(t=>{
            const mine=t.from_id===sessionUid;
            const fromLabel=mine?"You":(t.profiles?.display_name||t.profiles?.company_name||"Them");
            return(<div key={t.id} style={{alignSelf:mine?"flex-end":"flex-start",maxWidth:"85%",background:mine?"var(--acc)":"var(--s2)",color:mine?"#fff":"var(--t1)",padding:"10px 13px",borderRadius:12,fontSize:13,lineHeight:1.5,whiteSpace:"pre-wrap"}}>
              <div style={{fontSize:10,fontWeight:700,letterSpacing:0.5,opacity:0.75,marginBottom:4}}>{fromLabel} · {new Date(t.created_at).toLocaleString(undefined,{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"})}</div>
              <div>{t.body}</div>
            </div>);
          })}
        </div>
      </div>}

      {/* Reply box */}
      <div style={{borderTop:"1px solid var(--bdr)",paddingTop:18}}>
        <label className="label">Reply to {senderName.split(" ")[0]||senderName}</label>
        <textarea className="textarea" rows="4" placeholder={`Write your reply…`} value={reply} onChange={e=>setReply(e.target.value)} disabled={busy||deleting}/>
        {err&&<div style={{background:"rgba(255,100,100,0.1)",border:"1px solid rgba(255,100,100,0.3)",color:"#c0392b",padding:"10px 14px",borderRadius:8,fontSize:13,marginTop:10}}>{err}</div>}
        {sent&&<div style={{background:"rgba(46,204,113,0.12)",border:"1px solid rgba(46,204,113,0.35)",color:"#1d7b44",padding:"10px 14px",borderRadius:8,fontSize:13,marginTop:10,fontWeight:600}}>✓ Reply sent</div>}
        <div style={{display:"flex",gap:10,marginTop:12}}>
          <button className="btn-p" onClick={sendReply} disabled={busy||deleting||!reply.trim()} style={{flex:1}}>{busy?"Sending…":"Send Reply"}</button>
          <button className="btn-s" onClick={onClose} disabled={busy||deleting}>Close</button>
        </div>
      </div>
    </div>
  </div>);
}

// ─── New Casting creation modal — writes to castings + roles tables
// ─── Headshot / photo cropper — zoom + pan + crop to fixed aspect before upload.
// Emits a JPEG blob via onConfirm(blob). Self-contained — no external libs.
function ImageCropModal({file,aspect=0.8,label="Crop Image",onClose,onConfirm}){
  const [imgUrl,setImgUrl]=useState("");
  const [imgEl,setImgEl]=useState(null);
  const [loaded,setLoaded]=useState(false);
  const [zoom,setZoom]=useState(1);
  const [pan,setPan]=useState({x:0,y:0});
  const [busy,setBusy]=useState(false);
  const containerRef=useRef(null);
  const dragRef=useRef(null);

  useEffect(()=>{
    if(!file)return;
    const url=URL.createObjectURL(file);
    setImgUrl(url);
    const im=new window.Image();
    im.onload=()=>{setImgEl(im);setLoaded(true);};
    im.onerror=()=>{setLoaded(true);};
    im.src=url;
    return()=>{try{URL.revokeObjectURL(url);}catch(_){}};
  },[file]);

  const onPointerDown=(e)=>{
    e.preventDefault();
    dragRef.current={startX:e.clientX,startY:e.clientY,panX:pan.x,panY:pan.y};
    try{e.currentTarget.setPointerCapture(e.pointerId);}catch(_){}
  };
  const onPointerMove=(e)=>{
    if(!dragRef.current)return;
    const dx=e.clientX-dragRef.current.startX;
    const dy=e.clientY-dragRef.current.startY;
    setPan({x:dragRef.current.panX+dx,y:dragRef.current.panY+dy});
  };
  const onPointerUp=(e)=>{
    dragRef.current=null;
    try{e.currentTarget.releasePointerCapture(e.pointerId);}catch(_){}
  };

  const confirm=()=>{
    if(!imgEl||!containerRef.current||busy)return;
    setBusy(true);
    try{
      const rect=containerRef.current.getBoundingClientRect();
      const BW=rect.width,BH=rect.height;
      const imgAspect=imgEl.naturalWidth/imgEl.naturalHeight;
      const boxAspect=BW/BH;
      let baseW,baseH;
      if(imgAspect>boxAspect){baseW=BW;baseH=BW/imgAspect;}
      else{baseH=BH;baseW=BH*imgAspect;}
      const dispW=baseW*zoom,dispH=baseH*zoom;
      const dispX=(BW-dispW)/2+pan.x;
      const dispY=(BH-dispH)/2+pan.y;
      const scale=imgEl.naturalWidth/dispW;
      const srcX=-dispX*scale,srcY=-dispY*scale;
      const srcW=BW*scale,srcH=BH*scale;
      // Clamp source rect to image bounds — otherwise canvas paints transparent edges
      const cx=Math.max(0,Math.min(srcX,imgEl.naturalWidth));
      const cy=Math.max(0,Math.min(srcY,imgEl.naturalHeight));
      const cw=Math.min(srcW,imgEl.naturalWidth-cx);
      const ch=Math.min(srcH,imgEl.naturalHeight-cy);
      const offsetDX=(cx-srcX)/srcW;
      const offsetDY=(cy-srcY)/srcH;
      const OUT_W=1200;
      const OUT_H=Math.round(OUT_W/(BW/BH));
      const canvas=document.createElement("canvas");
      canvas.width=OUT_W;canvas.height=OUT_H;
      const ctx=canvas.getContext("2d");
      ctx.fillStyle="#000";ctx.fillRect(0,0,OUT_W,OUT_H);
      const destX=offsetDX*OUT_W;
      const destY=offsetDY*OUT_H;
      const destW=(cw/srcW)*OUT_W;
      const destH=(ch/srcH)*OUT_H;
      ctx.drawImage(imgEl,cx,cy,cw,ch,destX,destY,destW,destH);
      canvas.toBlob((blob)=>{
        setBusy(false);
        if(blob)onConfirm(blob);
        else onClose();
      },"image/jpeg",0.92);
    }catch(e){setBusy(false);console.warn("[crop] error",e);onClose();}
  };

  return(<div className="modal-overlay" onClick={()=>!busy&&onClose()}>
    <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:540,padding:22}}>
      <h3 style={{fontSize:17,fontWeight:700,marginBottom:4}}>{label}</h3>
      <p style={{color:"var(--t2)",fontSize:12,marginBottom:14}}>Drag the image to reposition. Use the slider to zoom. The visible frame is exactly what casting directors will see.</p>
      {!loaded&&<p style={{color:"var(--t3)",fontSize:13,padding:"40px 0",textAlign:"center"}}>Loading image…</p>}
      {loaded&&imgEl&&<>
        <div ref={containerRef}
          onPointerDown={onPointerDown}
          onPointerMove={onPointerMove}
          onPointerUp={onPointerUp}
          onPointerCancel={onPointerUp}
          style={{position:"relative",width:"100%",paddingBottom:`${100/aspect}%`,background:"#000",overflow:"hidden",borderRadius:10,border:"2px dashed var(--acc)",cursor:dragRef.current?"grabbing":"grab",userSelect:"none",touchAction:"none"}}>
          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <img src={imgUrl} alt="Preview" draggable={false} style={{
              maxWidth:"100%",maxHeight:"100%",
              transform:`translate(${pan.x}px, ${pan.y}px) scale(${zoom})`,
              transformOrigin:"center center",
              pointerEvents:"none",
              userSelect:"none"
            }}/>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12,marginTop:16}}>
          <span style={{fontSize:12,color:"var(--t2)",width:44}}>Zoom</span>
          <input type="range" min="1" max="4" step="0.02" value={zoom} onChange={e=>setZoom(parseFloat(e.target.value))} style={{flex:1}}/>
          <button type="button" className="btn-s btn-sm" onClick={()=>{setZoom(1);setPan({x:0,y:0});}}>Reset</button>
        </div>
        <div style={{display:"flex",gap:10,marginTop:18}}>
          <button className="btn-p" style={{flex:1}} onClick={confirm} disabled={busy}>{busy?"Saving…":"Save Crop & Upload"}</button>
          <button className="btn-s" onClick={onClose} disabled={busy}>Cancel</button>
        </div>
      </>}
    </div>
  </div>);
}

function NewCastingModal({onClose,onPosted,uid}){
  const [step,setStep]=useState(1); // 1 = form, 2 = success
  const [err,setErr]=useState("");
  const [busy,setBusy]=useState(false);
  const [f,setF]=useState({title:"",prod:"",type:"Film",location:"",pay:"",union:"SAG-AFTRA",deadline:"",tagline:"",synopsis:""});
  const [roles,setRoles]=useState([{name:"",description:"",gender:"Any",age_range:"",ethnicity:"Any"}]);
  const [inserted,setInserted]=useState(null); // holds the Supabase-returned row so onPosted can optimistically add it
  const setField=(k,v)=>setF(p=>({...p,[k]:v}));
  const setRole=(i,k,v)=>setRoles(p=>p.map((r,idx)=>idx===i?{...r,[k]:v}:r));
  const addRole=()=>setRoles(p=>[...p,{name:"",description:"",gender:"Any",age_range:"",ethnicity:"Any"}]);
  const removeRole=(i)=>setRoles(p=>p.filter((_,idx)=>idx!==i));
  // Common pay presets shown as one-tap chips beside the pay field
  const PAY_PRESETS=["$100/day","$150/day","$200/day","$20/hour","$50/hour","Unpaid","Deferred","Negotiable","SAG Scale"];
  const submit=async()=>{
    setErr("");
    if(!f.title.trim()){setErr("Title required.");return;}
    if(!roles.length||!roles[0].name.trim()){setErr("At least one role with a name is required.");return;}
    setBusy(true);
    try{
      const payload={cd_id:uid,title:f.title.trim(),type:f.type,prod:f.prod||null,tagline:f.tagline||null,synopsis:f.synopsis||null,location:f.location||null,pay:f.pay||null,union_status:f.union,deadline:f.deadline||null,status:"open",published:true};
      const {data:casting,error:cErr}=await window.sb.from("castings").insert(payload).select().single();
      if(cErr)throw cErr;
      const rolePayload=roles.filter(r=>r.name.trim()).map(r=>({casting_id:casting.id,name:r.name.trim(),description:r.description||null,gender:r.gender||null,age_range:r.age_range||null,ethnicity:r.ethnicity||null}));
      let insertedRoles=[];
      if(rolePayload.length){
        const {data:rdata,error:rErr}=await window.sb.from("roles").insert(rolePayload).select();
        if(rErr)throw rErr;
        insertedRoles=rdata||[];
      }
      // Stash the full row so step 2's "Back to Dashboard" can hand it up for optimistic insertion.
      setInserted({...casting,roles:insertedRoles});
      setStep(2);
    }catch(e){setErr(e.message||"Something went wrong.");}finally{setBusy(false);}
  };
  return(<div className="modal-overlay" onClick={()=>!busy&&onClose()}><div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:700,maxHeight:"90vh",overflowY:"auto"}}>
    {step===2?<div className="success-msg">
      <div className="check">✓</div>
      <h3>Casting Posted</h3>
      <p>Your casting is now live and visible to every actor on SlateCue. They'll get notified and start submitting immediately.</p>
      <button className="btn-p mt-20" onClick={()=>onPosted(inserted)}>Back to Dashboard</button>
    </div>:<>
      <h2>Post New Casting</h2>
      <p style={{color:"var(--t2)",fontSize:13,marginTop:-8,marginBottom:20}}>$20 per casting post. Goes live immediately.</p>
      {err&&<div style={{background:"rgba(255,100,100,0.1)",border:"1px solid rgba(255,100,100,0.3)",color:"#c0392b",padding:"10px 14px",borderRadius:8,fontSize:13,marginBottom:16}}>{err}</div>}
      <div className="form-group"><label className="label">Project Title *</label><input className="input" value={f.title} onChange={e=>setField("title",e.target.value)} placeholder="e.g. Lead Role — Untitled Horror Feature"/></div>
      <div className="form-row">
        <div><label className="label">Production Company</label><input className="input" value={f.prod} onChange={e=>setField("prod",e.target.value)} placeholder="Company name"/></div>
        <div><label className="label">Project Type</label><select className="select" style={{width:"100%"}} value={f.type} onChange={e=>setField("type",e.target.value)}><option>Film</option><option>TV</option><option>Theater</option><option>Commercial</option><option>Modeling</option></select></div>
      </div>
      <div className="form-row">
        <div><label className="label">Location</label><input className="input" value={f.location} onChange={e=>setField("location",e.target.value)} placeholder="City, State"/></div>
        <div><label className="label">Pay / Rate</label><input className="input" value={f.pay} onChange={e=>setField("pay",e.target.value)} placeholder="e.g. $150/day, $20/hour, Negotiable"/><div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:8}}>{PAY_PRESETS.map(p=><button type="button" key={p} onClick={()=>setField("pay",p)} style={{fontSize:11,padding:"4px 10px",borderRadius:999,border:"1px solid var(--bdr)",background:f.pay===p?"var(--acc)":"var(--s2)",color:f.pay===p?"#fff":"var(--t2)",cursor:"pointer",fontWeight:500}}>{p}</button>)}</div></div>
      </div>
      <div className="form-row">
        <div><label className="label">Union Status</label><select className="select" style={{width:"100%"}} value={f.union} onChange={e=>setField("union",e.target.value)}><option>SAG-AFTRA</option><option>AEA</option><option>Non-Union</option><option>SAG-AFTRA / Non-Union</option></select></div>
        <div><label className="label">Deadline</label><input className="input" type="date" value={f.deadline} onChange={e=>setField("deadline",e.target.value)}/></div>
      </div>
      <div className="form-group"><label className="label">Tagline (short)</label><input className="input" value={f.tagline} onChange={e=>setField("tagline",e.target.value)} placeholder="One-line hook"/></div>
      <div className="form-group"><label className="label">Project Summary</label><textarea className="textarea" value={f.synopsis} onChange={e=>setField("synopsis",e.target.value)} placeholder="Describe the project — genre, tone, what the production is about..."></textarea></div>

      <div style={{borderTop:"1px solid var(--bdr)",paddingTop:20,marginTop:20}}>
        <div className="flex-between" style={{marginBottom:12}}><h3 style={{fontSize:16,fontWeight:700}}>Roles</h3><button className="btn-s btn-sm" onClick={addRole} type="button">+ Add Role</button></div>
        {roles.map((r,i)=><div key={i} style={{background:"var(--s2)",borderRadius:10,padding:16,marginBottom:12}}>
          <div className="flex-between" style={{marginBottom:10}}><strong style={{fontSize:13}}>Role {i+1}</strong>{roles.length>1&&<button onClick={()=>removeRole(i)} style={{background:"none",border:"none",color:"var(--t3)",cursor:"pointer",fontSize:12}}>✕ Remove</button>}</div>
          <div className="form-group" style={{marginBottom:10}}><label className="label">Role Name *</label><input className="input" value={r.name} onChange={e=>setRole(i,"name",e.target.value)} placeholder="e.g. Sarah — Lead"/></div>
          <div className="form-row">
            <div><label className="label">Gender</label><select className="select" style={{width:"100%"}} value={r.gender} onChange={e=>setRole(i,"gender",e.target.value)}><option>Any</option><option>Male</option><option>Female</option><option>Non-Binary</option></select></div>
            <div><label className="label">Age Range</label><input className="input" value={r.age_range} onChange={e=>setRole(i,"age_range",e.target.value)} placeholder="e.g. 25-35"/></div>
          </div>
          <div className="form-group" style={{marginTop:10,marginBottom:0}}><label className="label">Ethnicity</label><input className="input" value={r.ethnicity} onChange={e=>setRole(i,"ethnicity",e.target.value)} placeholder="e.g. Any, Black, Latin, Asian"/></div>
          <div className="form-group" style={{marginTop:10,marginBottom:0}}><label className="label">Role Description</label><textarea className="textarea" value={r.description} onChange={e=>setRole(i,"description",e.target.value)} placeholder="Describe the role, personality, key scenes..."></textarea></div>
        </div>)}
      </div>

      <div style={{display:"flex",gap:12,marginTop:24}}>
        <button className="btn-p" style={{flex:1}} onClick={submit} disabled={busy}>{busy?"Posting…":"Post Casting"}</button>
        <button className="btn-s" onClick={onClose} disabled={busy}>Cancel</button>
      </div>
    </>}
  </div></div>);
}

// ─── Helpers for video embeds
const getVideoEmbed=(url)=>{
  if(!url||!url.trim())return null;
  const yt=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/);
  if(yt)return`https://www.youtube.com/embed/${yt[1]}`;
  const vm=url.match(/vimeo\.com\/(\d+)/);
  if(vm)return`https://player.vimeo.com/video/${vm[1]}`;
  return null;
};

// PAGE: MY PROFILE — Backstage-style with gallery + videos
// ═══════════════════════════════════════════
function MyProfilePage({session,profile,onReload,onNavigate}){
  const [tab,setTab]=useState("profile");
  const [saving,setSaving]=useState(false);
  const [msg,setMsg]=useState("");
  const [err,setErr]=useState("");
  const [uploading,setUploading]=useState(false);
  const [myApps,setMyApps]=useState([]);
  const [inbox,setInbox]=useState([]);       // received messages
  const [invites,setInvites]=useState([]);   // received project_invites (talent only)

  // Cropper state: {file, target: "headshot"|"additional", aspect, label}
  const [cropState,setCropState]=useState(null);
  const [videos,setVideos]=useState(["","","","",""]);  // 5 video link slots
  const [openMsg,setOpenMsg]=useState(null);   // currently-opened inbox thread
  const [inboxErr,setInboxErr]=useState("");   // surfaced fetch error
  const [inboxLoading,setInboxLoading]=useState(false);
  const [f,setF]=useState(()=>({
    display_name:profile?.display_name||"",bio:profile?.bio||"",location:profile?.location||"",
    age:profile?.age||"",gender:profile?.gender||"",ethnicity:profile?.ethnicity||"",
    height:profile?.height||"",weight:profile?.weight||"",hair:profile?.hair||"",eyes:profile?.eyes||"",

    talent_types:Array.isArray(profile?.talent_types)?profile.talent_types:[]
  }));
  useEffect(()=>{if(profile){
    setF(x=>({...x,display_name:profile.display_name||"",bio:profile.bio||"",location:profile.location||"",
      age:profile.age||"",gender:profile.gender||"",ethnicity:profile.ethnicity||"",
      height:profile.height||"",weight:profile.weight||"",hair:profile.hair||"",eyes:profile.eyes||"",
      union_status:profile.union_status||"Non-Union",agent:profile.agent||"",training:profile.training||"",
      skills:(profile.skills||[]).join(", "),instagram:profile.instagram||"",phone:profile.phone||"",
      company_name:profile.company_name||"",company_role:profile.company_role||"",website:profile.website||"",
      credits:profile.credits||"",
      body_type:profile.body_type||"",age_range:profile.age_range||"",
      talent_types:Array.isArray(profile.talent_types)?profile.talent_types:[]
    }));
    const ap=profile.additional_photos||[];setPhotos(ap);
    const vl=profile.video_links||[];
    const slots=["","","","",""];vl.forEach((v,i)=>{if(i<5)slots[i]=v;});setVideos(slots);
  }},[profile]);
  // ─── Fetch inbox — extracted so it can be re-run after reply, delete, or polling tick.
  //     Errors are surfaced to the UI instead of being silently swallowed (was the
  //     "messages disappeared" bug). Existing data is preserved on a transient failure.
  const fetchInbox=useCallback(async()=>{
    if(!session?.user)return;
    setInboxLoading(true);
    try{
      const {data,error}=await window.sb.from("messages")
        .select("id,from_id,to_id,body,created_at,read_at,application_id,profiles:from_id(display_name,headshot_url,company_name,user_type)")
        .eq("to_id",session.user.id)
        .order("created_at",{ascending:false})
        .limit(200);
      if(error)throw error;
      setInbox(data||[]);
      setInboxErr("");
    }catch(e){
      console.error("[inbox] load failed:",e);
      setInboxErr(e.message||"Could not load inbox.");
    }finally{setInboxLoading(false);}
  },[session?.user?.id]);

  useEffect(()=>{(async()=>{
    if(!session?.user)return;
    if(profile?.user_type==="talent"){
      const {data}=await window.sb.from("applications").select("id,status,created_at,cover_note,selected_photo_url,audition_at,audition_note,casting_id,role_id,castings(title,prod,type,location),roles(name)").eq("talent_id",session.user.id).order("created_at",{ascending:false});
      setMyApps(data||[]);
      // Project invites the talent has received from CDs (any status — show pending first)
      try{
        const {data:invs}=await window.sb.from("project_invites")
          .select("id,status,note,created_at,casting_id,role_id,cd_id,castings(title,prod,location,type),roles(name),profiles:cd_id(display_name,company_name,headshot_url)")
          .eq("talent_id",session.user.id)
          .order("created_at",{ascending:false});
        setInvites(invs||[]);
      }catch(_){setInvites([]);}
    }
    // inbox — messages received (for both talent + CD)
    fetchInbox();
  })();},[session,profile,fetchInbox]);

  // ─── Realtime + polling backstop for the inbox. Realtime catches new sends + deletes
  //     instantly; the 45s poll covers cases where the websocket is stale. Both update the
  //     same state, so the unread badge always reflects truth without a manual refresh.
  useEffect(()=>{
    if(!session?.user?.id)return;
    let cancelled=false;
    let ch=null;
    try{
      ch=window.sb.channel(`inbox-${session.user.id}`)
        .on("postgres_changes",{event:"*",schema:"public",table:"messages",filter:`to_id=eq.${session.user.id}`},()=>{if(!cancelled)fetchInbox();})
        .on("postgres_changes",{event:"*",schema:"public",table:"messages",filter:`from_id=eq.${session.user.id}`},()=>{if(!cancelled)fetchInbox();})
        .subscribe();
    }catch(_){/* realtime optional */}
    const tid=setInterval(()=>{if(!cancelled)fetchInbox();},45000);
    const onFocus=()=>{if(!cancelled)fetchInbox();};
    window.addEventListener("focus",onFocus);
    document.addEventListener("visibilitychange",onFocus);
    return()=>{
      cancelled=true;
      clearInterval(tid);
      window.removeEventListener("focus",onFocus);
      document.removeEventListener("visibilitychange",onFocus);
      if(ch){try{window.sb.removeChannel(ch);}catch(_){}}
    };
  },[session?.user?.id,fetchInbox]);
  // Talent action — accept or decline a project invite
  const respondInvite=async(inv,nextStatus)=>{
    if(inviteBusy[inv.id])return;
    setInviteBusy(p=>({...p,[inv.id]:true}));
    // Optimistic flip
    setInvites(p=>p.map(x=>x.id===inv.id?{...x,status:nextStatus}:x));
    try{
      const {error}=await window.sb.from("project_invites").update({status:nextStatus,updated_at:new Date().toISOString()}).eq("id",inv.id);
      if(error)throw error;
      // If accepted, also drop a courtesy message back to the CD
      if(nextStatus==="accepted"){
        try{
          await window.sb.from("messages").insert({from_id:session.user.id,to_id:inv.cd_id,application_id:null,body:`✓ I've accepted your invite to ${inv.castings?.title||"the project"}${inv.roles?.name?` (${inv.roles.name})`:""}. Looking forward to it — let me know the next steps.`});
        }catch(_){}
      }
    }catch(e){
      // Roll back
      setInvites(p=>p.map(x=>x.id===inv.id?{...x,status:inv.status}:x));
      alert("Could not update invite: "+(e.message||"unknown error"));
    }finally{
      setInviteBusy(p=>{const n={...p};delete n[inv.id];return n;});
    }
  };
  const markRead=async(id)=>{
    await window.sb.from("messages").update({read_at:new Date().toISOString()}).eq("id",id);
    setInbox(p=>p.map(m=>m.id===id?{...m,read_at:new Date().toISOString()}:m));
  };
  const up=(k,v)=>setF(x=>({...x,[k]:v}));
  // 30-second hard timeout so UI never stays "Saving…" forever if network hangs
  const withTimeout=(promise,ms=30000,label="Request")=>Promise.race([promise,new Promise((_,rej)=>setTimeout(()=>rej(new Error(`${label} timed out. Check your connection and try again.`)),ms))]);
  const showErr=(m)=>{setErr(m);window.scrollTo({top:0,behavior:"smooth"});};
  const save=async()=>{
    setErr("");setMsg("");setSaving(true);
    try{
      const vl=videos.filter(v=>v.trim());
      const patch={
        display_name:f.display_name.trim()||null,bio:f.bio||null,location:f.location||null,
        age:f.age?parseInt(f.age):null,gender:f.gender||null,ethnicity:f.ethnicity||null,
        height:f.height||null,weight:f.weight||null,hair:f.hair||null,eyes:f.eyes||null,
        union_status:f.union_status||null,agent:f.agent||null,training:f.training||null,
        skills:f.skills?f.skills.split(",").map(s=>s.trim()).filter(Boolean):[],
        instagram:f.instagram||null,phone:f.phone||null,
        company_name:f.company_name||null,company_role:f.company_role||null,website:f.website||null,
        credits:f.credits||null,video_links:vl,
        body_type:f.body_type||null,age_range:f.age_range||null,
        talent_types:Array.isArray(f.talent_types)?f.talent_types:[]
      };
      const {error}=await withTimeout(window.sb.from("profiles").update(patch).eq("id",session.user.id),30000,"Save");
      if(error)throw error;
      setMsg("Profile saved.");window.scrollTo({top:0,behavior:"smooth"});onReload&&onReload();setTimeout(()=>setMsg(""),3000);
    }catch(e){showErr(e.message||"Could not save.");}finally{setSaving(false);}
  };
  const uploadFile=async(file,bucket,field)=>{
    if(!file)return;setUploading(true);setErr("");
    try{
      // Blob from cropper has no .name — default to .jpg
      const ext=(file.name&&file.name.split(".").pop()||"jpg").toLowerCase();
      const path=`${session.user.id}/${Date.now()}.${ext}`;
      const {error:upErr}=await withTimeout(window.sb.storage.from(bucket).upload(path,file,{cacheControl:"3600",upsert:false,contentType:file.type||"image/jpeg"}),60000,"Upload");
      if(upErr)throw upErr;
      const {data:pub}=window.sb.storage.from(bucket).getPublicUrl(path);
      const patch={};patch[field]=pub.publicUrl;
      await withTimeout(window.sb.from("profiles").update(patch).eq("id",session.user.id),30000,"Save");
      onReload&&onReload();setMsg(field==="headshot_url"?"Headshot uploaded.":"Photo uploaded.");setTimeout(()=>setMsg(""),3000);
    }catch(e){showErr(e.message||"Upload failed. Make sure storage buckets are set up.");}finally{setUploading(false);}

  // Actors stay on the talent profile view. This lets admins fill in company_name etc.
  // so their casting posts carry proper attribution without needing a separate account.
  const isCD=["cd","admin","super_admin"].includes(profile.user_type);
  const allPhotos=[profile.headshot_url,...photos].filter(Boolean);
  return(<div className="page page-wide">
    {msg&&<div style={{background:"rgba(46,204,113,0.12)",border:"1px solid rgba(46,204,113,0.3)",color:"#1d7b44",padding:"10px 14px",borderRadius:8,fontSize:13,marginBottom:16}}>{msg}</div>}
    {err&&<div style={{background:"rgba(255,100,100,0.1)",border:"1px solid rgba(255,100,100,0.3)",color:"#c0392b",padding:"10px 14px",borderRadius:8,fontSize:13,marginBottom:16}}>{err}</div>}

    {/* ── HERO (Backstage style) ── */}
    <div style={{display:"grid",gridTemplateColumns:"200px 1fr",gap:28,alignItems:"flex-start",marginBottom:28,padding:"28px",background:"var(--s1)",border:"1px solid var(--bdr)",borderRadius:16}}>
      <div>
        {profile.headshot_url
          ?<img src={profile.headshot_url} style={{width:"100%",aspectRatio:"3/4",objectFit:"cover",borderRadius:10}}/>
          :<div style={{width:"100%",aspectRatio:"3/4",background:"var(--s2)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",color:"var(--t3)",fontSize:12,textAlign:"center",padding:12}}>No headshot yet</div>}
        <label className="btn-s" style={{width:"100%",display:"block",textAlign:"center",cursor:"pointer",marginTop:8,fontSize:11}}>{uploading?"Uploading…":"Change Headshot"}<input type="file" accept="image/*" style={{display:"none"}} onChange={e=>{const file=e.target.files?.[0];if(file)setCropState({file,target:"headshot",aspect:0.8,label:"Crop Your Headshot"});e.target.value="";}}/></label>
      </div>
      <div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}>
          <span className="badge tag-acc">{profile.union_status||"Non-Union"}</span>
          {isCD&&<span className="badge" style={{background:"var(--s2)",color:"var(--t2)"}}>{profile.company_role||"Casting Director"}</span>}
        </div>
        <h1 style={{fontWeight:800,fontSize:32,letterSpacing:-1,marginBottom:4}}>{profile.display_name||"Your Name"}</h1>
        <p style={{color:"var(--t2)",fontSize:14,marginBottom:12}}>{profile.location||"Location not set"}{profile.agent?` · Rep: ${profile.agent}`:""}</p>
        {!isCD&&<div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"8px 20px",marginBottom:16}}>
          {[["Gender",profile.gender],["Age",profile.age],["Height",profile.height],["Weight",profile.weight],["Hair",profile.hair],["Eyes",profile.eyes],["Ethnicity",profile.ethnicity]].filter(([,v])=>v).map(([k,v])=>
            <div key={k}><div style={{fontSize:10,color:"var(--t3)",textTransform:"uppercase",letterSpacing:1}}>{k}</div><div style={{fontSize:13,fontWeight:600,color:"var(--t1)"}}>{v}</div></div>
          )}
        </div>}
        {isCD&&<div style={{marginBottom:12}}>
          <div style={{fontSize:13,color:"var(--t2)"}}>{profile.company_name||""}{profile.website?<> · <a href={profile.website} target="_blank" rel="noreferrer" style={{color:"var(--acc)"}}>{profile.website}</a></>:""}</div>
        </div>}
        <div style={{fontSize:11,color:"var(--t3)"}}>Member since {new Date(profile.created_at).toLocaleDateString()} · {session?.user?.email}</div>
      </div>
    </div>

    {/* ── TABS ── */}
    <div className="tabs" style={{marginBottom:24}}>
      <button className={`tab ${tab==="profile"?"active":""}`} onClick={()=>setTab("profile")}>Edit Profile</button>
      {!isCD&&<button className={`tab ${tab==="photos"?"active":""}`} onClick={()=>setTab("photos")}>Photos ({allPhotos.length}/10)</button>}
      {!isCD&&<button className={`tab ${tab==="videos"?"active":""}`} onClick={()=>setTab("videos")}>Video Links ({(profile.video_links||[]).filter(v=>v).length}/5)</button>}
      {!isCD&&<button className={`tab ${tab==="applications"?"active":""}`} onClick={()=>setTab("applications")}>My Applications ({myApps.length})</button>}
      <button className={`tab ${tab==="messages"?"active":""}`} onClick={()=>setTab("messages")}>Inbox {(inbox.filter(m=>!m.read_at).length+invites.filter(i=>i.status==="pending").length)>0?<span className="tag tag-acc" style={{marginLeft:6,fontSize:10}}>{inbox.filter(m=>!m.read_at).length+invites.filter(i=>i.status==="pending").length}</span>:null}</button>
    </div>

    {/* ── PROFILE TAB ── */}
    {tab==="profile"&&<>
      <div className="card" style={{padding:24,marginBottom:16}}>
        <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>Basic Info</h3>
        <div className="form-group"><label className="label">Display Name</label><input className="input" value={f.display_name} onChange={e=>up("display_name",e.target.value)}/></div>
        <div className="form-row"><div className="form-group"><label className="label">Location</label><input className="input" placeholder="City, State" value={f.location} onChange={e=>up("location",e.target.value)}/></div><div className="form-group"><label className="label">Instagram</label><input className="input" placeholder="@handle" value={f.instagram} onChange={e=>up("instagram",e.target.value)}/></div></div>
        <div className="form-row"><div className="form-group"><label className="label">Phone (private)</label><input className="input" placeholder="Optional" value={f.phone} onChange={e=>up("phone",e.target.value)}/></div></div>
        <div className="form-group"><label className="label">Bio / Overview</label><textarea className="textarea" style={{minHeight:130}} value={f.bio} onChange={e=>up("bio",e.target.value)} placeholder={isCD?"About you and your casting work…":"Your experience, strengths, what makes you unique…"}></textarea></div>
      </div>
      {!isCD&&<>
        <div className="card" style={{padding:24,marginBottom:16}}>
          <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>Physical Stats</h3>
          <div className="form-row"><div className="form-group"><label className="label">Gender</label><select className="select" style={{width:"100%"}} value={f.gender} onChange={e=>up("gender",e.target.value)}><option value="">—</option><option>Female</option><option>Male</option><option>Non-Binary</option><option>Other</option></select></div><div className="form-group"><label className="label">Age</label><input className="input" type="number" min="1" max="120" value={f.age} onChange={e=>up("age",e.target.value)}/></div></div>
          <div className="form-row"><div className="form-group"><label className="label">Height</label><select className="select" style={{width:"100%"}} value={f.height} onChange={e=>up("height",e.target.value)}><option value="">Select</option>{HEIGHTS.map(h=><option key={h} value={h}>{h}</option>)}</select></div><div className="form-group"><label className="label">Weight</label><select className="select" style={{width:"100%"}} value={f.weight} onChange={e=>up("weight",e.target.value)}><option value="">Select</option>{WEIGHTS.map(w=><option key={w} value={w}>{w}</option>)}</select></div></div>
          <div className="form-row"><div className="form-group"><label className="label">Hair Color</label><select className="select" style={{width:"100%"}} value={f.hair} onChange={e=>up("hair",e.target.value)}><option value="">Select</option>{HAIR_COLORS.map(h=><option key={h} value={h}>{h}</option>)}</select></div><div className="form-group"><label className="label">Eye Color</label><select className="select" style={{width:"100%"}} value={f.eyes} onChange={e=>up("eyes",e.target.value)}><option value="">Select</option>{EYE_COLORS.map(ec=><option key={ec} value={ec}>{ec}</option>)}</select></div></div>
          <div className="form-row"><div className="form-group"><label className="label">Ethnicity</label><select className="select" style={{width:"100%"}} value={f.ethnicity} onChange={e=>up("ethnicity",e.target.value)}><option value="">Select</option>{ETHNICITIES.map(et=><option key={et} value={et}>{et}</option>)}</select></div><div className="form-group"><label className="label">Union Status</label><select className="select" style={{width:"100%"}} value={f.union_status} onChange={e=>up("union_status",e.target.value)}><option>Non-Union</option><option>SAG-AFTRA</option><option>AEA</option><option>SAG-AFTRA / AEA</option><option>ACTRA</option></select></div></div>
          <div className="form-row"><div className="form-group"><label className="label">Body Type</label><select className="select" style={{width:"100%"}} value={f.body_type||""} onChange={e=>up("body_type",e.target.value)}><option value="">Select</option><option>Slim</option><option>Athletic / Toned</option><option>Average</option><option>Muscular</option><option>Curvy</option><option>Plus-size</option><option>Heavyset</option><option>Petite</option><option>Tall / Lean</option></select></div><div className="form-group"><label className="label">Playable Age Range</label><select className="select" style={{width:"100%"}} value={f.age_range||""} onChange={e=>up("age_range",e.target.value)}><option value="">Select</option><option>0-5</option><option>6-12</option><option>13-17</option><option>18-24</option><option>25-34</option><option>35-44</option><option>45-54</option><option>55-64</option><option>65+</option></select></div></div>
          <div className="form-group"><label className="label">Talent Types (select all that apply)</label><div style={{display:"flex",gap:16,flexWrap:"wrap",marginTop:6}}>{["Film","TV","Theater","Commercial","Modeling","Voiceover"].map(t=>{const arr=Array.isArray(f.talent_types)?f.talent_types:(f.talent_types?[f.talent_types]:[]);const on=arr.includes(t);return(<label key={t} className="checkbox-row"><input type="checkbox" checked={on} onChange={()=>up("talent_types",on?arr.filter(x=>x!==t):[...arr,t])}/>{t}</label>);})}</div></div>
        </div>
        <div className="card" style={{padding:24,marginBottom:16}}>
          <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>Training & Skills</h3>
          <div className="form-group"><label className="label">Training / Education</label><input className="input" placeholder="e.g. BFA Acting, NYU Tisch · Meisner Technique" value={f.training} onChange={e=>up("training",e.target.value)}/></div>
          <div className="form-group"><label className="label">Special Skills (comma separated)</label><input className="input" placeholder="Stage Combat, Fluent Spanish, Horseback Riding, Guitar…" value={f.skills} onChange={e=>up("skills",e.target.value)}/></div>
          <div className="form-group"><label className="label">Representation</label><input className="input" placeholder="Agency, manager, or 'Seeking Representation'" value={f.agent} onChange={e=>up("agent",e.target.value)}/></div>
        </div>
        <div className="card" style={{padding:24,marginBottom:16}}>
          <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>Credits (one per line: Role · Project · Year)</h3>
          <textarea className="textarea" style={{minHeight:160,fontFamily:"monospace",fontSize:13}} value={f.credits} onChange={e=>up("credits",e.target.value)} placeholder={"Elena · Burning Season (Feature) · 2025\nLady Macbeth · Macbeth (Off-Broadway) · 2024\nDetective Ross · Crime Scene (TV) · 2023"}/>
          <div style={{marginTop:20,paddingTop:20,borderTop:"1px solid var(--bdr)"}}>
            <label className="label">Resume / CV (PDF, DOC, or DOCX — max 10 MB)</label>
            <p style={{fontSize:12,color:"var(--t3)",marginTop:-4,marginBottom:10}}>Casting directors can download this directly from your profile and from every submission you send.</p>
            {profile.resume_url?(
              <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                <a href={profile.resume_url} target="_blank" rel="noreferrer" className="btn-s btn-sm" style={{textDecoration:"none"}}>📄 View current resume</a>
                <label className="btn-s btn-sm" style={{cursor:"pointer"}}>{uploading?"Uploading…":"Replace"}<input type="file" accept=".pdf,.doc,.docx,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document" style={{display:"none"}} onChange={e=>uploadResume(e.target.files?.[0])}/></label>
                <button className="btn-s btn-sm" onClick={removeResume}>Remove</button>
              </div>
            ):(
              <label className="btn-p btn-sm" style={{cursor:"pointer",display:"inline-block"}}>{uploading?"Uploading…":"📄 Upload Resume"}<input type="file" accept=".pdf,.doc,.docx,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document" style={{display:"none"}} onChange={e=>uploadResume(e.target.files?.[0])}/></label>
            )}
          </div>
        </div>
      </>}
      {isCD&&<>
        <div className="card" style={{padding:24,marginBottom:16}}>
          <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>Company Details</h3>
          <div className="form-row"><div className="form-group"><label className="label">Company / Production</label><input className="input" value={f.company_name} onChange={e=>up("company_name",e.target.value)}/></div><div className="form-group"><label className="label">Title</label><input className="input" value={f.company_role} onChange={e=>up("company_role",e.target.value)}/></div></div>
          <div className="form-group"><label className="label">Website / IMDb</label><input className="input" placeholder="https://" value={f.website} onChange={e=>up("website",e.target.value)}/></div>
          <div className="form-group"><label className="label">Credits / Notable Projects (one per line)</label><textarea className="textarea" style={{minHeight:100}} value={f.credits} onChange={e=>up("credits",e.target.value)}/></div>
        </div>
      </>}
      <button className="btn-p" onClick={save} disabled={saving} style={{padding:"14px 32px"}}>{saving?"Saving…":"Save Profile"}</button>
    </>}

    {/* ── PHOTOS TAB ── */}
    {tab==="photos"&&!isCD&&<>
      <div className="card" style={{padding:24,marginBottom:16}}>
        <div className="flex-between" style={{marginBottom:16}}>
          <div><h3 style={{fontSize:15,fontWeight:700,marginBottom:2}}>Photo Gallery</h3><p style={{fontSize:12,color:"var(--t3)"}}>{allPhotos.length} of 10 photos · Your headshot is always first</p></div>
          {allPhotos.length<10&&<label className="btn-p btn-sm" style={{cursor:"pointer"}}>{uploading?"Uploading…":"+ Add Photo"}<input type="file" accept="image/*" style={{display:"none"}} onChange={e=>{const file=e.target.files?.[0];if(file)setCropState({file,target:"additional",aspect:0.75,label:"Crop Photo"});e.target.value="";}}/></label>}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:12}}>
          {profile.headshot_url&&<div style={{position:"relative",borderRadius:8,overflow:"hidden",border:"2px solid var(--acc)"}}>
            <img src={profile.headshot_url} style={{width:"100%",aspectRatio:"3/4",objectFit:"cover",display:"block"}}/>
            <div style={{position:"absolute",bottom:0,left:0,right:0,background:"rgba(0,0,0,0.6)",color:"#fff",fontSize:10,fontWeight:700,padding:"4px 8px",textAlign:"center",letterSpacing:1}}>MAIN</div>
          </div>}
          {photos.map((url,i)=><div key={i} style={{position:"relative",borderRadius:8,overflow:"hidden",border:"1px solid var(--bdr)"}}>
            <img src={url} style={{width:"100%",aspectRatio:"3/4",objectFit:"cover",display:"block"}}/>
            <button onClick={()=>removePhoto(url)} style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,0.6)",border:"none",color:"#fff",borderRadius:"50%",width:22,height:22,cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
          </div>)}
          {allPhotos.length<10&&Array.from({length:Math.min(2,10-allPhotos.length)}).map((_,i)=><label key={`empty-${i}`} style={{aspectRatio:"3/4",background:"var(--s2)",borderRadius:8,border:"1px dashed var(--bdr)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexDirection:"column",gap:6,color:"var(--t3)",fontSize:12}}>+ Add<input type="file" accept="image/*" style={{display:"none"}} onChange={e=>{const file=e.target.files?.[0];if(file)setCropState({file,target:"additional",aspect:0.75,label:"Crop Photo"});e.target.value="";}}/></label>)}
        </div>
      </div>
      <p style={{fontSize:12,color:"var(--t3)"}}>These photos are visible to casting directors. When you apply to a role, you choose which photo to submit.</p>
    </>}

    {/* ── VIDEOS TAB ── */}
    {tab==="videos"&&!isCD&&<div className="card" style={{padding:24}}>
      <h3 style={{fontSize:15,fontWeight:700,marginBottom:4}}>Video Reel Links</h3>
      <p style={{fontSize:12,color:"var(--t3)",marginBottom:20}}>Paste up to 5 YouTube or Vimeo links. They'll appear as embedded players on your profile.</p>
      {videos.map((v,i)=><div key={i} style={{marginBottom:16}}>
        <label className="label">Link {i+1}</label>
        <input className="input" placeholder="https://www.youtube.com/watch?v=... or https://vimeo.com/..." value={v} onChange={e=>setVideos(p=>{const n=[...p];n[i]=e.target.value;return n;})}/>
        {getVideoEmbed(v)&&<iframe src={getVideoEmbed(v)} style={{width:"100%",height:220,borderRadius:8,border:"none",marginTop:8}} allowFullScreen/>}
      </div>)}
      <button className="btn-p" onClick={save} disabled={saving}>{saving?"Saving…":"Save Video Links"}</button>
    </div>}

    {/* ── APPLICATIONS TAB ── */}
    {tab==="applications"&&!isCD&&<div className="card" style={{padding:24}}>
      <h3 style={{fontSize:15,fontWeight:700,marginBottom:16}}>My Applications ({myApps.length})</h3>
      {myApps.length===0?<p style={{color:"var(--t3)",fontSize:14}}>Nothing yet. Browse castings and apply — your submissions show up here.</p>:
      myApps.map(a=><div key={a.id} style={{padding:"14px 0",borderBottom:"1px solid var(--bdr)",display:"grid",gridTemplateColumns:"auto 1fr auto",gap:12,alignItems:"center"}}>
        {a.selected_photo_url&&<img src={a.selected_photo_url} style={{width:44,height:56,objectFit:"cover",borderRadius:6}}/>}
        <div>
          <div style={{fontWeight:600,fontSize:14}}>{a.castings?.title||"—"}</div>
          <div style={{fontSize:12,color:"var(--t3)"}}>
            {a.roles?.name?`Role: ${a.roles.name} · `:""}
            {a.castings?.prod} · {a.castings?.location} · {new Date(a.created_at).toLocaleDateString()}
          </div>
          {a.cover_note&&<div style={{fontSize:12,color:"var(--t2)",marginTop:2,fontStyle:"italic"}}>"{a.cover_note.slice(0,80)}{a.cover_note.length>80?"…":""}"</div>}
          {a.audition_at&&<div style={{fontSize:12,color:"#1d7b44",marginTop:4,fontWeight:600}}>📅 Audition: {new Date(a.audition_at).toLocaleString()}{a.audition_note?` · ${a.audition_note}`:""}</div>}
        </div>
        <span className="tag" style={{background:a.status==="selected"?"rgba(46,204,113,0.15)":a.status==="rejected"?"rgba(255,100,100,0.1)":a.status==="hold"?"rgba(200,137,0,0.15)":"var(--s2)",color:a.status==="selected"?"#1d7b44":a.status==="rejected"?"#c0392b":a.status==="hold"?"#c88900":"var(--t2)",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{a.status==="pending"?"UNDER REVIEW":a.status==="selected"?"SHORTLISTED":a.status==="hold"?"ON HOLD":a.status==="rejected"?"NOT SELECTED":String(a.status||"").toUpperCase()}</span>
      </div>)}
    </div>}

    {/* ── MESSAGES TAB ── */}
    {tab==="messages"&&<>
    {/* Project invites — only for talent. Pending invites first, then resolved ones for history. */}
    {!isCD&&invites.length>0&&<div className="card" style={{padding:24,marginBottom:16}}>
      <h3 style={{fontSize:15,fontWeight:700,marginBottom:4}}>Project Invites ({invites.filter(i=>i.status==="pending").length} pending)</h3>
      <p style={{fontSize:12,color:"var(--t3)",marginBottom:16}}>Casting directors who want you for a specific role. Accept to express interest, or decline if it's not a fit.</p>
      {[...invites].sort((a,b)=>(a.status==="pending"?-1:1)-(b.status==="pending"?-1:1)).map(inv=>{
        const cd=inv.profiles||{};
        const cName=cd.display_name||cd.company_name||"Casting Director";
        const c=inv.castings||{};
        const r=inv.roles||{};
        const statusTag=inv.status==="accepted"?{bg:"rgba(46,204,113,0.15)",fg:"#1d7b44",label:"ACCEPTED"}:inv.status==="declined"?{bg:"rgba(255,100,100,0.1)",fg:"#c0392b",label:"DECLINED"}:{bg:"rgba(26,26,46,0.08)",fg:"var(--acc)",label:"NEW INVITE"};
        return(<div key={inv.id} style={{padding:"16px 0",borderBottom:"1px solid var(--bdr)",display:"grid",gridTemplateColumns:"auto 1fr auto",gap:14,alignItems:"flex-start"}}>
          <img src={cd.headshot_url||"https://placehold.co/52x52/e5e5e5/999?text=?"} alt="" style={{width:52,height:52,borderRadius:"50%",objectFit:"cover"}}/>
          <div style={{minWidth:0}}>
            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginBottom:4}}>
              <strong style={{fontSize:14}}>{cName}</strong>
              <span className="tag" style={{background:statusTag.bg,color:statusTag.fg,fontSize:10,fontWeight:700}}>{statusTag.label}</span>
            </div>
            <div style={{fontSize:13,color:"var(--t1)",fontWeight:600}}>{c.title||"Casting"}{r.name?<> · <span style={{color:"var(--t2)",fontWeight:500}}>{r.name}</span></>:""}</div>
            <div style={{fontSize:12,color:"var(--t3)",marginTop:2}}>{[c.prod,c.location,c.type].filter(Boolean).join(" · ")}</div>
            {inv.note&&<p style={{fontSize:13,color:"var(--t2)",marginTop:8,fontStyle:"italic",lineHeight:1.5}}>"{inv.note}"</p>}
            {inv.status==="pending"&&<div style={{display:"flex",gap:8,marginTop:10}}>
              <button className="btn-p btn-sm" disabled={!!inviteBusy[inv.id]} onClick={()=>respondInvite(inv,"accepted")}>{inviteBusy[inv.id]?"…":"✓ Accept"}</button>
              <button className="btn-s btn-sm" disabled={!!inviteBusy[inv.id]} onClick={()=>respondInvite(inv,"declined")}>{inviteBusy[inv.id]?"…":"Decline"}</button>
            </div>}
          </div>
          <span style={{fontSize:11,color:"var(--t3)",whiteSpace:"nowrap"}}>{new Date(inv.created_at).toLocaleDateString()}</span>
        </div>);
      })}
    </div>}
    <div className="card" style={{padding:24}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4,gap:12,flexWrap:"wrap"}}>
        <h3 style={{fontSize:15,fontWeight:700}}>Messages ({inbox.length}{inbox.filter(m=>!m.read_at).length>0?` · ${inbox.filter(m=>!m.read_at).length} unread`:""})</h3>
        <button className="btn-s btn-sm" onClick={fetchInbox} disabled={inboxLoading}>{inboxLoading?"Refreshing…":"↻ Refresh"}</button>
      </div>
      <p style={{fontSize:12,color:"var(--t3)",marginBottom:16}}>{isCD?"Replies from talent and direct messages.":"Messages and audition invites from casting directors and producers."} Click any message to open the full thread, reply, or delete.</p>
      {inboxErr&&<div style={{background:"rgba(255,100,100,0.1)",border:"1px solid rgba(255,100,100,0.3)",color:"#c0392b",padding:"10px 14px",borderRadius:8,fontSize:13,marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
        <span>Couldn't load messages: {inboxErr}</span>
        <button className="btn-s btn-sm" onClick={fetchInbox}>Retry</button>
      </div>}
      {inbox.length===0?<p style={{color:"var(--t3)",fontSize:14}}>{inboxLoading?"Loading…":"No messages yet."}</p>:
      inbox.map(m=><div key={m.id} onClick={()=>setOpenMsg(m)} style={{padding:"14px 0",borderBottom:"1px solid var(--bdr)",display:"grid",gridTemplateColumns:"auto 1fr auto",gap:12,alignItems:"flex-start",cursor:"pointer",opacity:m.read_at?0.78:1,transition:"background 0.15s"}} onMouseEnter={e=>e.currentTarget.style.background="var(--s2)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
        <img src={m.profiles?.headshot_url||"https://placehold.co/44x44/e5e5e5/999?text=?"} style={{width:44,height:44,objectFit:"cover",borderRadius:"50%"}}/>
        <div style={{minWidth:0}}>
          <div style={{fontWeight:700,fontSize:14,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <span>{m.profiles?.display_name||m.profiles?.company_name||"Sender"}</span>
            {m.profiles?.user_type==="cd"&&<span className="tag" style={{fontSize:9,background:"var(--s2)",color:"var(--t2)"}}>CD</span>}
            {m.profiles?.user_type==="talent"&&<span className="tag" style={{fontSize:9,background:"var(--s2)",color:"var(--t2)"}}>Talent</span>}
            {(m.profiles?.user_type==="admin"||m.profiles?.user_type==="super_admin")&&<span className="tag" style={{fontSize:9,background:"var(--s2)",color:"var(--t2)"}}>Admin</span>}
            {!m.read_at&&<span className="tag tag-acc" style={{fontSize:9}}>NEW</span>}
          </div>
          <div style={{fontSize:13,color:"var(--t1)",whiteSpace:"pre-wrap",marginTop:4,lineHeight:1.5,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{m.body}</div>
        </div>
        <span style={{fontSize:11,color:"var(--t3)",whiteSpace:"nowrap"}}>{new Date(m.created_at).toLocaleDateString()}</span>
      </div>)}
    </div></>}

    {cropState&&<ImageCropModal
      file={cropState.file}
      aspect={cropState.aspect}
      label={cropState.label}
      onClose={()=>setCropState(null)}
      onConfirm={async(blob)=>{
        const target=cropState.target;
        setCropState(null);
        if(target==="headshot"){await uploadFile(blob,"headshots","headshot_url");}
        else if(target==="additional"){await uploadAdditionalPhoto(blob);}
      }}
    />}
    {/* ── Inbox thread modal — opens whenever a row is clicked. Marks read on mount,
           supports reply, hard-delete, and shows full date+time + casting context. ── */}
    {openMsg&&<MessageThreadModal
      message={openMsg}
      sessionUid={session.user.id}
      onClose={()=>setOpenMsg(null)}
      onRead={()=>{
        // Optimistic: flip the row's read_at locally so the unread badge ticks down instantly.
        setInbox(p=>p.map(x=>x.id===openMsg.id?{...x,read_at:new Date().toISOString()}:x));
        markRead(openMsg.id);
      }}
      onDeleted={(id)=>{
        setInbox(p=>p.filter(x=>x.id!==id));
        // Also re-sync from server in case the delete cascaded anything
        setTimeout(fetchInbox,300);
      }}
      onReplied={()=>{/* no-op — realtime subscription will pick up our outbound row if needed */}}
    />}
    <Footer onNavigate={onNavigate}/></div>);
}
