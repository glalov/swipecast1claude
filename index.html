      <StatTile num={stats.banned} label="Banned" danger={stats.banned>0}/>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12,marginBottom:28}}>

      <StatTile num={stats.open_castings} label="Open"/>
      <StatTile num={stats.featured_castings} label="Featured"/>
      <StatTile num={stats.applications} label="Applications"/>
      <StatTile num={stats.pending} label="Pending review"/>

// ─── Users: search + filter + role/suspend/ban/verify/feature/delete
function AdminUsers({isSuperAdmin,session}){
  const [users,setUsers]=useState([]);
  const [q,setQ]=useState("");
  const [typeFilter,setTypeFilter]=useState("all");
  const [loading,setLoading]=useState(true);
  const [msg,setMsg]=useState("");
  const [reasonPrompt,setReasonPrompt]=useState(null); // {user, kind}
  const reload=useCallback(async()=>{
    setLoading(true);
    const {data,error}=await window.sb.from("profiles").select("*").order("created_at",{ascending:false}).limit(1000);
    if(error)setMsg("Load failed: "+error.message);
    setUsers(data||[]);setLoading(false);
  },[]);
  useEffect(()=>{reload();},[reload]);
  const callRpc=async(fn,args,successLabel)=>{
    setMsg("");
    const {error}=await window.sb.rpc(fn,args);
    if(error){setMsg(fn+" failed: "+error.message);return false;}
    setMsg(successLabel);await reload();return true;
  };
  const setRole=async(u,newRole)=>{
    if(u.id===session?.user?.id&&newRole!==u.user_type){
      if(!confirm("You are changing YOUR OWN role. This can lock you out of admin. Continue?"))return;
    }
    await callRpc("admin_set_user_role",{p_target:u.id,p_role:newRole},`Role changed to ${newRole}.`);
  };
  const toggleVerified=(u)=>callRpc("admin_set_user_verified",{p_target:u.id,p_verified:!u.verified},u.verified?"Unverified.":"Verified.");
  const toggleFeatured=(u)=>callRpc("admin_set_user_featured",{p_target:u.id,p_featured:!u.featured},u.featured?"Unfeatured.":"Featured.");
  const toggleSuspended=(u)=>{
    if(!u.suspended){setReasonPrompt({user:u,kind:"suspend"});return;}
    callRpc("admin_set_user_suspended",{p_target:u.id,p_suspended:false,p_reason:null},"Unsuspended.");
  };
  const toggleBanned=(u)=>{
    if(!u.banned){setReasonPrompt({user:u,kind:"ban"});return;}
    callRpc("admin_set_user_banned",{p_target:u.id,p_target_banned:false,p_reason:null},"Unbanned.");
  };
  const doDelete=async(u)=>{
    if(!confirm(`Permanently DELETE profile ${u.email}?\n\nThis removes their profile row, reviews, applications, and any castings they posted. Cannot be undone.`))return;
    if(u.id===session?.user?.id){alert("You cannot delete your own profile.");return;}
    await callRpc("admin_delete_profile",{p_target:u.id},"Profile deleted.");
  };
  const filtered=users.filter(u=>{
    if(typeFilter!=="all"&&u.user_type!==typeFilter)return false;
    if(!q)return true;
    const needle=q.toLowerCase();
    return [u.display_name,u.email,u.location,u.company_name].some(x=>x&&x.toLowerCase().includes(needle));
  });
  return(<>
    <h1 style={{fontWeight:800,fontSize:28,letterSpacing:-0.5,marginBottom:4}}>Users</h1>
    <p style={{color:"var(--t2)",fontSize:13,marginBottom:16}}>{filtered.length} of {users.length} users{typeFilter==="all"?"":` · ${typeFilter}`}</p>
    {msg&&<div style={{background:"var(--s2)",borderRadius:8,padding:"10px 14px",fontSize:13,marginBottom:14}}>{msg}</div>}
    <div style={{display:"grid",gridTemplateColumns:"1fr 200px",gap:10,marginBottom:14}}>
      <input className="input" placeholder="Search by name, email, location, company…" value={q} onChange={e=>setQ(e.target.value)}/>
      <select className="select" value={typeFilter} onChange={e=>setTypeFilter(e.target.value)}>
        <option value="all">All roles</option>
        <option value="talent">Actors</option>
        <option value="cd">Casting directors</option>
        <option value="admin">Admins</option>
        <option value="super_admin">Super admins</option>
      </select>
    </div>
    {loading?<p style={{color:"var(--t3)"}}>Loading…</p>:
      <div className="card" style={{padding:0,overflow:"hidden"}}>
        {filtered.map(u=><UserRow key={u.id} u={u} isSuperAdmin={isSuperAdmin} self={u.id===session?.user?.id} onSetRole={setRole} onToggleVerified={toggleVerified} onToggleFeatured={toggleFeatured} onToggleSuspended={toggleSuspended} onToggleBanned={toggleBanned} onDelete={doDelete}/>)}
        {filtered.length===0&&<div style={{padding:40,textAlign:"center",color:"var(--t3)"}}>No users match.</div>}
      </div>
    }
    {reasonPrompt&&<ReasonModal title={reasonPrompt.kind==="suspend"?"Suspend user":"Ban user"} cta={reasonPrompt.kind==="suspend"?"Suspend":"Ban"} onCancel={()=>setReasonPrompt(null)} onSubmit={async(reason)=>{
      const u=reasonPrompt.user,kind=reasonPrompt.kind;
      setReasonPrompt(null);
      if(kind==="suspend")await callRpc("admin_set_user_suspended",{p_target:u.id,p_suspended:true,p_reason:reason||null},"Suspended.");
      else await callRpc("admin_set_user_banned",{p_target:u.id,p_target_banned:true,p_reason:reason||null},"Banned.");
    }}/>}
  </>);
}
function UserRow({u,isSuperAdmin,self,onSetRole,onToggleVerified,onToggleFeatured,onToggleSuspended,onToggleBanned,onDelete}){
  const canEditRole=isSuperAdmin||(u.user_type!=="super_admin"&&u.user_type!=="admin");
  const canDelete=isSuperAdmin&&!self&&u.user_type!=="super_admin";
  const statusBadges=[];
  if(u.banned)statusBadges.push(<span key="b" style={{color:"#fff",background:"#c0392b",fontSize:10,fontWeight:700,padding:"2px 6px",borderRadius:4,marginLeft:6}}>BANNED</span>);
  if(u.suspended)statusBadges.push(<span key="s" style={{color:"#c0392b",fontSize:10,fontWeight:700,marginLeft:6}}>SUSPENDED</span>);
  if(u.verified)statusBadges.push(<span key="v" style={{color:"#1d7b44",fontSize:10,fontWeight:700,marginLeft:6}}>✓ VERIFIED</span>);
  if(u.featured)statusBadges.push(<span key="f" style={{color:"var(--acc)",fontSize:10,fontWeight:700,marginLeft:6}}>★ FEATURED</span>);
  return(<div style={{padding:"14px 18px",borderBottom:"1px solid var(--bdr)",display:"grid",gridTemplateColumns:"1fr auto",gap:12,alignItems:"center",opacity:u.banned?0.45:u.suspended?0.7:1}}>
    <div>
      <div style={{fontWeight:600,fontSize:14}}>{u.display_name||"—"} {self&&<span style={{color:"var(--acc)",fontSize:10,fontWeight:700,marginLeft:6}}>(YOU)</span>}{statusBadges}</div>
      <div style={{fontSize:12,color:"var(--t3)",marginTop:2}}>{u.email} {u.location?`· ${u.location}`:""} {u.company_name?`· ${u.company_name}`:""}</div>
      {(u.suspended_reason||u.banned_reason)&&<div style={{fontSize:11,color:"#c0392b",marginTop:2,fontStyle:"italic"}}>Reason: {u.banned_reason||u.suspended_reason}</div>}
    </div>
    <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"flex-end"}}>
      <select className="select" style={{fontSize:12,padding:"6px 8px",height:"auto"}} disabled={!canEditRole} value={u.user_type} onChange={e=>onSetRole(u,e.target.value)}>
        <option value="talent">actor</option>
        <option value="cd">CD</option>
        <option value="admin">admin</option>
        {isSuperAdmin&&<option value="super_admin">super_admin</option>}
      </select>
      <button className="btn-s btn-sm" onClick={()=>onToggleVerified(u)}>{u.verified?"Unverify":"Verify"}</button>
      <button className="btn-s btn-sm" onClick={()=>onToggleFeatured(u)}>{u.featured?"Unfeature":"Feature"}</button>
      <button className="btn-s btn-sm" onClick={()=>onToggleSuspended(u)}>{u.suspended?"Unsuspend":"Suspend"}</button>
      <button className="btn-s btn-sm" style={{color:"#c0392b",borderColor:"#e8c6c6"}} onClick={()=>onToggleBanned(u)}>{u.banned?"Unban":"Ban"}</button>
      {canDelete&&<button className="btn-s btn-sm" style={{color:"#fff",background:"#c0392b",borderColor:"#c0392b"}} onClick={()=>onDelete(u)}>Delete</button>}
    </div>
  </div>);
}
function ReasonModal({title,cta,onCancel,onSubmit}){
  const [reason,setReason]=useState("");
  const [busy,setBusy]=useState(false);
  return(<div className="modal-overlay" onClick={()=>!busy&&onCancel()}><div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:440}}>
    <h2 style={{marginBottom:10}}>{title}</h2>
    <p style={{color:"var(--t2)",fontSize:13,marginBottom:16}}>Record a short reason (stored in audit log and shown on the user's profile).</p>
    <textarea className="textarea" placeholder="e.g. Repeated spam submissions" value={reason} onChange={e=>setReason(e.target.value)}/>
    <div style={{display:"flex",gap:10,marginTop:16}}>
      <button className="btn-p" style={{flex:1}} disabled={busy} onClick={async()=>{setBusy(true);await onSubmit(reason.trim());}}>{busy?"…":cta}</button>
      <button className="btn-s" onClick={onCancel} disabled={busy}>Cancel</button>
    </div>
  </div></div>);
}

// ─── Castings: feature/close/reopen/edit/delete, still uses existing EditCastingModal
function AdminCastings(){

  const [q,setQ]=useState("");
  const [loading,setLoading]=useState(true);
  const [msg,setMsg]=useState("");
  const [viewCasting,setViewCasting]=useState(null);
  const [editCasting,setEditCasting]=useState(null);

    setLoading(true);

    if(error)setMsg("Load failed: "+error.message);
    setCastings(data||[]);setLoading(false);
  },[]);
  useEffect(()=>{reload();},[reload]);

    const {error}=await window.sb.rpc("admin_set_casting_featured",{p_casting:c.id,p_featured:!c.featured});
    if(error){setMsg("Failed: "+error.message);return;}
    setMsg(c.featured?"Unfeatured.":"Featured.");reload();
  };

    if(error){setMsg("Failed: "+error.message);return;}
    setMsg("Casting "+newStatus+".");reload();
  };
  const doDelete=async(c)=>{
    if(!confirm(`DELETE casting "${c.title}"?\n\nThis permanently removes the casting, all roles, and all submissions. Cannot be undone.`))return;

    if(error){setMsg("Delete failed: "+error.message);return;}
    setMsg("Casting deleted.");reload();
  };

        {filtered.map(c=><div key={c.id} style={{padding:"14px 18px",borderBottom:"1px solid var(--bdr)",display:"grid",gridTemplateColumns:"1fr auto",gap:12,alignItems:"center",opacity:c.status==="closed"?0.55:1}}>

// ─── Applications: filter by status, inspect, override status, delete
function AdminApplications(){
  const [apps,setApps]=useState([]);
  const [q,setQ]=useState("");
  const [statusFilter,setStatusFilter]=useState("all");
  const [loading,setLoading]=useState(true);
  const [msg,setMsg]=useState("");
  const reload=useCallback(async()=>{
    setLoading(true);
    const {data,error}=await window.sb.from("applications").select("*,talent:talent_id(display_name,email),casting:casting_id(title,prod),role:role_id(name)").order("created_at",{ascending:false}).limit(1000);
    if(error)setMsg("Load failed: "+error.message);
    setApps(data||[]);setLoading(false);
  },[]);
  useEffect(()=>{reload();},[reload]);
  const setStatus=async(a,newStatus)=>{
    const {error}=await window.sb.rpc("admin_set_application_status",{p_application:a.id,p_status:newStatus});
    if(error){setMsg("Failed: "+error.message);return;}
    setMsg("Status → "+newStatus);reload();
  };
  const doDelete=async(a)=>{
    if(!confirm(`DELETE this application from ${a.talent?.email||"user"}?`))return;
    const {error}=await window.sb.rpc("admin_delete_application",{p_application:a.id});
    if(error){setMsg("Delete failed: "+error.message);return;}
    setMsg("Application deleted.");reload();
  };
  const filtered=apps.filter(a=>{
    if(statusFilter!=="all"&&a.status!==statusFilter)return false;
    if(!q)return true;
    const needle=q.toLowerCase();
    return [a.talent?.display_name,a.talent?.email,a.casting?.title,a.role?.name].some(x=>x&&x.toLowerCase().includes(needle));
  });
  return(<>
    <h1 style={{fontWeight:800,fontSize:28,letterSpacing:-0.5,marginBottom:4}}>Applications</h1>
    <p style={{color:"var(--t2)",fontSize:13,marginBottom:16}}>{filtered.length} of {apps.length} applications</p>
    {msg&&<div style={{background:"var(--s2)",borderRadius:8,padding:"10px 14px",fontSize:13,marginBottom:14}}>{msg}</div>}
    <div style={{display:"grid",gridTemplateColumns:"1fr 200px",gap:10,marginBottom:14}}>
      <input className="input" placeholder="Search by actor, casting, role…" value={q} onChange={e=>setQ(e.target.value)}/>
      <select className="select" value={statusFilter} onChange={e=>setStatusFilter(e.target.value)}>
        <option value="all">All statuses</option>
        <option value="pending">Pending</option>
        <option value="hold">On hold</option>
        <option value="selected">Selected</option>
        <option value="rejected">Rejected</option>
      </select>
    </div>
    {loading?<p style={{color:"var(--t3)"}}>Loading…</p>:
      <div className="card" style={{padding:0,overflow:"hidden"}}>
        {filtered.map(a=><div key={a.id} style={{padding:"14px 18px",borderBottom:"1px solid var(--bdr)",display:"grid",gridTemplateColumns:"1fr auto",gap:12,alignItems:"center"}}>
          <div>
            <div style={{fontWeight:600,fontSize:14}}>{a.talent?.display_name||a.talent?.email||"—"} → {a.casting?.title||"—"} {a.role?.name?<span style={{color:"var(--t3)",fontWeight:400}}>· {a.role.name}</span>:""}</div>
            <div style={{fontSize:12,color:"var(--t3)",marginTop:2}}>{a.talent?.email} · status: <strong style={{color:"var(--t1)"}}>{a.status}</strong> · {new Date(a.created_at).toLocaleString()}</div>
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"flex-end"}}>
            <select className="select" style={{fontSize:12,padding:"6px 8px",height:"auto"}} value={a.status} onChange={e=>setStatus(a,e.target.value)}>
              <option value="pending">Pending</option>
              <option value="hold">Hold</option>
              <option value="selected">Selected</option>
              <option value="rejected">Rejected</option>
            </select>
            <button className="btn-s btn-sm" style={{color:"#fff",background:"#c0392b",borderColor:"#c0392b"}} onClick={()=>doDelete(a)}>Delete</button>
          </div>
        </div>)}
        {filtered.length===0&&<div style={{padding:40,textAlign:"center",color:"var(--t3)"}}>No applications match.</div>}
      </div>
    }
  </>);
}

// ─── Audit log: paginated read-only feed
function AdminAudit(){
  const [rows,setRows]=useState([]);
  const [page,setPage]=useState(0);
  const [loading,setLoading]=useState(true);
  const [hasMore,setHasMore]=useState(true);
  const PAGE_SIZE=50;
  const load=useCallback(async(p)=>{
    setLoading(true);
    const from=p*PAGE_SIZE,to=from+PAGE_SIZE-1;
    const {data,error}=await window.sb.from("audit_logs").select("*").order("id",{ascending:false}).range(from,to);
    if(!error){
      setRows(data||[]);
      setHasMore((data||[]).length===PAGE_SIZE);
    }
    setLoading(false);
  },[]);
  useEffect(()=>{load(page);},[load,page]);
  return(<>
    <h1 style={{fontWeight:800,fontSize:28,letterSpacing:-0.5,marginBottom:4}}>Audit log</h1>
    <p style={{color:"var(--t2)",fontSize:13,marginBottom:16}}>Every admin action is recorded here. Read-only.</p>
    {loading?<p style={{color:"var(--t3)"}}>Loading…</p>:
      <div className="card" style={{padding:0,overflow:"hidden"}}>
        {rows.map(r=><div key={r.id} style={{padding:"12px 16px",borderBottom:"1px solid var(--bdr)",fontSize:12,display:"grid",gridTemplateColumns:"1fr auto",gap:12,alignItems:"start"}}>
          <div>
            <div><strong>{r.actor_email||"(system)"}</strong> <span style={{color:"var(--acc)",fontWeight:600}}>{r.action}</span> {r.target_table?<span style={{color:"var(--t3)"}}>on <code>{r.target_table}</code></span>:""} {r.target_id?<span style={{color:"var(--t3)"}}>· <code>{String(r.target_id).slice(0,8)}…</code></span>:""}</div>
            {r.note&&<div style={{color:"var(--t3)",marginTop:3,fontStyle:"italic"}}>{r.note}</div>}
            {(r.old_value||r.new_value)&&<details style={{marginTop:6,fontSize:11,color:"var(--t3)"}}><summary style={{cursor:"pointer"}}>diff</summary>
              {r.old_value&&<pre style={{background:"var(--s2)",padding:8,borderRadius:6,marginTop:4,overflow:"auto",maxHeight:160}}>OLD: {JSON.stringify(r.old_value,null,2)}</pre>}
              {r.new_value&&<pre style={{background:"var(--s2)",padding:8,borderRadius:6,marginTop:4,overflow:"auto",maxHeight:160}}>NEW: {JSON.stringify(r.new_value,null,2)}</pre>}
            </details>}
          </div>
          <div style={{color:"var(--t3)",whiteSpace:"nowrap"}}>{new Date(r.created_at).toLocaleString()}</div>
        </div>)}
        {rows.length===0&&<div style={{padding:40,textAlign:"center",color:"var(--t3)"}}>No entries on this page.</div>}
      </div>
    }
    <div style={{display:"flex",gap:10,marginTop:14,alignItems:"center"}}>
      <button className="btn-s btn-sm" disabled={page===0} onClick={()=>setPage(p=>Math.max(0,p-1))}>← Prev</button>
      <span style={{fontSize:12,color:"var(--t3)"}}>Page {page+1}</span>
      <button className="btn-s btn-sm" disabled={!hasMore} onClick={()=>setPage(p=>p+1)}>Next →</button>
    </div>
  </>);
}

// ─── Admin edit-casting modal (fixes spelling, tweaks fields, edits roles)
function EditCastingModal({casting,onClose,onSaved}){
  const [err,setErr]=useState("");
  const [busy,setBusy]=useState(false);
  const [f,setF]=useState({
    title:casting.title||"",prod:casting.prod||"",type:casting.type||"Film",
    location:casting.location||"",pay:casting.pay||"",union_status:casting.union_status||"Non-Union",
    deadline:casting.deadline||"",tagline:casting.tagline||"",synopsis:casting.synopsis||""
  });
  const [roles,setRoles]=useState(()=>(casting.roles||[]).map(r=>({id:r.id,name:r.name||"",description:r.description||"",gender:r.gender||"Any",age_range:r.age_range||"",ethnicity:r.ethnicity||"Any"})));
  const setField=(k,v)=>setF(p=>({...p,[k]:v}));
  const setRole=(i,k,v)=>setRoles(p=>p.map((r,idx)=>idx===i?{...r,[k]:v}:r));
  const addRole=()=>setRoles(p=>[...p,{id:null,name:"",description:"",gender:"Any",age_range:"",ethnicity:"Any"}]);
  const removeRole=(i)=>setRoles(p=>p.filter((_,idx)=>idx!==i));
  const save=async()=>{
    setErr("");
    if(!f.title.trim()){setErr("Title is required.");return;}
    setBusy(true);
    try{
      const patch={title:f.title.trim(),prod:f.prod||null,type:f.type,location:f.location||null,pay:f.pay||null,union_status:f.union_status||null,deadline:f.deadline||null,tagline:f.tagline||null,synopsis:f.synopsis||null};
      const {error:cErr}=await window.sb.from("castings").update(patch).eq("id",casting.id);
      if(cErr)throw cErr;
      // Diff roles: update existing, insert new, delete removed
      const originalRoleIds=new Set((casting.roles||[]).map(r=>r.id));
      const keptRoleIds=new Set(roles.filter(r=>r.id).map(r=>r.id));
      const toDelete=[...originalRoleIds].filter(id=>!keptRoleIds.has(id));
      if(toDelete.length){
        const {error:dErr}=await window.sb.from("roles").delete().in("id",toDelete);
        if(dErr)throw dErr;
      }
      for(const r of roles){
        if(!r.name.trim())continue;
        const rp={name:r.name.trim(),description:r.description||null,gender:r.gender||null,age_range:r.age_range||null,ethnicity:r.ethnicity||null};
        if(r.id){
          const {error:uErr}=await window.sb.from("roles").update(rp).eq("id",r.id);
          if(uErr)throw uErr;
        }else{
          const {error:iErr}=await window.sb.from("roles").insert({...rp,casting_id:casting.id});
          if(iErr)throw iErr;
        }
      }
      onSaved();
    }catch(e){setErr(e.message||"Save failed.");}finally{setBusy(false);}
  };
  return(<div className="modal-overlay" onClick={()=>!busy&&onClose()}><div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:700,maxHeight:"90vh",overflowY:"auto"}}>
    <h2>Edit Casting (admin)</h2>
    <p style={{color:"var(--t2)",fontSize:13,marginTop:-8,marginBottom:20}}>Fix typos, update details, add/remove roles. The CD will see your changes next time they visit.</p>
    {err&&<div style={{background:"rgba(255,100,100,0.1)",border:"1px solid rgba(255,100,100,0.3)",color:"#c0392b",padding:"10px 14px",borderRadius:8,fontSize:13,marginBottom:16}}>{err}</div>}
    <div className="form-group"><label className="label">Project Title *</label><input className="input" value={f.title} onChange={e=>setField("title",e.target.value)}/></div>
    <div className="form-row">
      <div><label className="label">Production Company</label><input className="input" value={f.prod} onChange={e=>setField("prod",e.target.value)}/></div>
      <div><label className="label">Project Type</label><select className="select" style={{width:"100%"}} value={f.type} onChange={e=>setField("type",e.target.value)}><option>Film</option><option>TV</option><option>Theater</option><option>Commercial</option><option>Modeling</option></select></div>
    </div>
    <div className="form-row">
      <div><label className="label">Location</label><input className="input" value={f.location} onChange={e=>setField("location",e.target.value)}/></div>
      <div><label className="label">Pay / Rate</label><input className="input" value={f.pay} onChange={e=>setField("pay",e.target.value)}/></div>
    </div>
    <div className="form-row">
      <div><label className="label">Union Status</label><select className="select" style={{width:"100%"}} value={f.union_status} onChange={e=>setField("union_status",e.target.value)}><option>SAG-AFTRA</option><option>AEA</option><option>Non-Union</option><option>SAG-AFTRA / Non-Union</option></select></div>
      <div><label className="label">Deadline</label><input className="input" type="date" value={f.deadline||""} onChange={e=>setField("deadline",e.target.value)}/></div>
    </div>
    <div className="form-group"><label className="label">Tagline</label><input className="input" value={f.tagline} onChange={e=>setField("tagline",e.target.value)}/></div>
    <div className="form-group"><label className="label">Synopsis</label><textarea className="textarea" value={f.synopsis} onChange={e=>setField("synopsis",e.target.value)}></textarea></div>

    <div style={{borderTop:"1px solid var(--bdr)",paddingTop:20,marginTop:12}}>
      <div className="flex-between" style={{marginBottom:12}}><h3 style={{fontSize:16,fontWeight:700}}>Roles</h3><button className="btn-s btn-sm" onClick={addRole} type="button">+ Add Role</button></div>
      {roles.map((r,i)=><div key={r.id||`new-${i}`} style={{background:"var(--s2)",borderRadius:10,padding:16,marginBottom:12}}>
        <div className="flex-between" style={{marginBottom:10}}><strong style={{fontSize:13}}>Role {i+1} {r.id?"":<span style={{color:"var(--acc)",fontSize:11}}>(new)</span>}</strong><button onClick={()=>removeRole(i)} style={{background:"none",border:"none",color:"#c0392b",cursor:"pointer",fontSize:12}}>✕ Remove</button></div>
        <div className="form-group" style={{marginBottom:10}}><label className="label">Role Name *</label><input className="input" value={r.name} onChange={e=>setRole(i,"name",e.target.value)}/></div>
        <div className="form-row">
          <div><label className="label">Gender</label><select className="select" style={{width:"100%"}} value={r.gender} onChange={e=>setRole(i,"gender",e.target.value)}><option>Any</option><option>Male</option><option>Female</option><option>Non-Binary</option></select></div>
          <div><label className="label">Age Range</label><input className="input" value={r.age_range} onChange={e=>setRole(i,"age_range",e.target.value)}/></div>
        </div>
        <div className="form-group" style={{marginTop:10,marginBottom:0}}><label className="label">Ethnicity</label><input className="input" value={r.ethnicity} onChange={e=>setRole(i,"ethnicity",e.target.value)}/></div>
        <div className="form-group" style={{marginTop:10,marginBottom:0}}><label className="label">Role Description</label><textarea className="textarea" value={r.description} onChange={e=>setRole(i,"description",e.target.value)}/></div>
      </div>)}
    </div>

    <div style={{display:"flex",gap:12,marginTop:24,paddingTop:16,borderTop:"1px solid var(--bdr)"}}>
      <button className="btn-p" style={{flex:1}} onClick={save} disabled={busy}>{busy?"Saving…":"Save Changes"}</button>
      <button className="btn-s" onClick={onClose} disabled={busy}>Cancel</button>
    </div>
  </div></div>);
}

// MAIN APP — ROUTER
// ═══════════════════════════════════════════
function App(){
  const [page,setPage]=useState("home");
  const [userType,setUserType]=useState("talent");
  const [viewingProfile,setViewingProfile]=useState(null);
  const [viewingCasting,setViewingCasting]=useState(null);
  const [prevPage,setPrevPage]=useState("home");
  const [session,setSession]=useState(null);
  const [myProfile,setMyProfile]=useState(null);
  const [authReady,setAuthReady]=useState(false);
  const [pendingApply,setPendingApply]=useState(null);
  // ───────────────────────────────────────────────────────────────
  // Shared refresh signal for cross-page data (castings, talent, etc.)
  // Any page that wants to know "something important changed, re-fetch"
  // depends on castingsVersion in its useEffect. Any mutation that should
  // trigger refetches (new casting, edit, delete, realtime event) calls
  // bumpCastings(). Fixes the long-standing "new castings don't appear
  // until manual refresh" bug.
  // ───────────────────────────────────────────────────────────────
  const [castingsVersion,setCastingsVersion]=useState(0);
  const bumpCastings=useCallback(()=>setCastingsVersion(v=>v+1),[]);
  const isLoggedIn=!!session;
  // Admin derived from the PROFILE row (authoritative, server-enforced via RLS + RPCs).
  // SC_CONFIG.ADMIN_EMAIL is kept only as a *fallback* so the owner can still reach
  // the panel even if the profile row hasn't loaded yet. DB will reject any write
  // from a non-admin regardless of what the frontend believes.
  const adminEmail=(window.SC_CONFIG?.ADMIN_EMAIL||"").toLowerCase();
  const emailMatchesOwner=!!(session?.user?.email&&session.user.email.toLowerCase()===adminEmail);
  const isSuperAdmin=myProfile?.user_type==="super_admin"||(emailMatchesOwner&&!myProfile);
  const isAdmin=["admin","super_admin"].includes(myProfile?.user_type)||isSuperAdmin||(emailMatchesOwner&&!myProfile);

  const loadProfile=useCallback(async(uid)=>{
    if(!uid){setMyProfile(null);return null;}
    try{
      const {data,error}=await window.sb.from("profiles").select("*").eq("id",uid).maybeSingle();
      if(error){console.warn("[auth] loadProfile error:",error.message);setMyProfile(null);return null;}
      setMyProfile(data||null);return data||null;
    }catch(e){console.warn("[auth] loadProfile threw:",e?.message||e);setMyProfile(null);return null;}
  },[]);

  useEffect(()=>{
    // URL-fragment detection for password-recovery link (before Supabase consumes it)
    const hash=window.location.hash||"";
    const qs=window.location.search||"";
    if(hash.includes("type=recovery")||qs.includes("type=recovery")){
      setPage("reset-password");
    }
    // Seed browser history with the current page so back-button works
    try{
      if(!window.history.state||!window.history.state.swipecast){
        window.history.replaceState({swipecast:true,page:"home"},"","");
      }
    }catch(e){}
    // Back-button handler — pop to previous swipecast page, or home
    const onPop=(e)=>{
      const st=e.state;
      window.scrollTo(0,0);
      if(st&&st.swipecast){
        setPage(st.page||"home");
        if(st.page!=="profile")setViewingProfile(null);
        if(st.page!=="casting-detail")setViewingCasting(null);
      }else{
        setPage("home");setViewingProfile(null);setViewingCasting(null);
      }
    };
    window.addEventListener("popstate",onPop);
    // SINGLE source of truth for session state: onAuthStateChange.
    // Supabase fires INITIAL_SESSION immediately with the persisted session, so we do
    // NOT call getSession() separately — that created a lock race with the listener
    // (manifested as "Lock 'sb-...-auth-token' was released because another request stole it").
    const {data:sub}=window.sb.auth.onAuthStateChange(async(e,s)=>{
      console.log("[auth] event:",e,s?.user?.email||"(no session)");
      setSession(s||null);
      if(e==="PASSWORD_RECOVERY"){
        // Don't run loadProfile here — the recovery session is in-flight and any
        // concurrent DB call races Supabase's own lock. Just route to the reset page.
        window.scrollTo(0,0);setPage("reset-password");setAuthReady(true);return;
      }
      if(e==="SIGNED_IN"||e==="INITIAL_SESSION"||e==="USER_UPDATED"){
        if(s?.user){await loadProfile(s.user.id);}
        else{setMyProfile(null);}
      }else if(e==="SIGNED_OUT"){
        setMyProfile(null);
      }
      // TOKEN_REFRESHED intentionally ignored — no profile re-fetch on hourly refresh.
      setAuthReady(true);
    });
    return()=>{window.removeEventListener("popstate",onPop);sub?.subscription?.unsubscribe?.();};
  },[loadProfile]);

  // ───────────────────────────────────────────────────────────────
  // Supabase realtime: whenever the castings table changes, bump the
  // shared version so any open view re-fetches. Safety net — the
  // explicit bumpCastings() call from NewCastingModal handles the
  // same-user case; this covers admin edits, other CDs, and any
  // write that doesn't run through our modal. If realtime is not
  // enabled on the table, the subscribe just never fires — harmless.
  // ───────────────────────────────────────────────────────────────
  useEffect(()=>{
    if(!window.sb?.channel)return;
    let ch;
    try{
      ch=window.sb.channel("castings-realtime")
        .on("postgres_changes",{event:"*",schema:"public",table:"castings"},()=>{
          setCastingsVersion(v=>v+1);
        })
        .on("postgres_changes",{event:"*",schema:"public",table:"roles"},()=>{
          setCastingsVersion(v=>v+1);
        })
        .subscribe();
    }catch(e){/* realtime not available — silent */}
    return()=>{if(ch){try{window.sb.removeChannel(ch);}catch(_){}}};
  },[]);

  const pushHist=(p)=>{try{window.history.pushState({swipecast:true,page:p},"","");}catch(e){}};
  const navigate=useCallback((p)=>{
    window.scrollTo(0,0);
    let target=p;
    if(p==="search-talent"){setUserType("talent");setPage("search");target="search";}
    else if(p==="search-cd"){setUserType("cd");setPage("search");target="search";}
    else if(p==="search"){setUserType("talent");setPage("search");}
    else if(p==="dashboard"){setUserType("cd");setPage("dashboard");}
    else setPage(p);
    // Clear detail state on any nav that isn't a drilldown
    if(p!=="profile"&&p!=="casting-detail"&&p!=="auth-gate"){setViewingProfile(null);setViewingCasting(null);}
    pushHist(target);
  },[]);
  const viewProfile=(t)=>{setPrevPage(page);setViewingProfile(t);setPage("profile");pushHist("profile");};
  const requireAuth=(casting,role)=>{setPendingApply({casting,role});window.scrollTo(0,0);setPage("auth-gate");pushHist("auth-gate");};
  const completeAuth=()=>{if(pendingApply){const c=pendingApply.casting;setViewingCasting(c);window.scrollTo(0,0);setPage("casting-detail");pushHist("casting-detail");}else{setPage("home");pushHist("home");}};
  const onLoggedIn=async(user)=>{
    // onAuthStateChange SIGNED_IN will populate myProfile in parallel — do NOT call
    // loadProfile here too (that created a double-fetch race). Fetch a minimal row
    // just to decide routing.
    try{
      const {data,error}=await window.sb.from("profiles").select("user_type,email").eq("id",user.id).maybeSingle();
      if(error)console.warn("[auth] route fetch error:",error.message);
      const email=(data?.email||user.email||"").toLowerCase();
      const fallbackOwner=email&&email===(window.SC_CONFIG?.ADMIN_EMAIL||"").toLowerCase();
      const isAd=data?.user_type==="admin"||data?.user_type==="super_admin"||fallbackOwner;
      if(isAd)navigate("admin");
      else if(data?.user_type==="cd")navigate("dashboard");
      else if(pendingApply)completeAuth();
      else navigate("my-profile");
    }catch(e){
      console.warn("[auth] route decision failed, defaulting to my-profile:",e?.message||e);
      navigate("my-profile");
    }
  };
  const signOut=async()=>{
    // Optimistic local sign-out so UI unfreezes instantly even if network is slow.
    setMyProfile(null);
    setSession(null);
    navigate("home");
    try{
      await Promise.race([
        window.sb.auth.signOut(),
        new Promise((_,rej)=>setTimeout(()=>rej(new Error("signOut timeout")),6000))
      ]);
    }catch(e){console.warn("[auth] signOut:",e?.message||e); /* state already cleared above */}
  };

  const [menuOpen,setMenuOpen]=useState(false);
  const navThen=useCallback((p)=>{setMenuOpen(false);navigate(p);},[navigate]);
  const doSignOut=useCallback(()=>{setMenuOpen(false);signOut();},[signOut]);

  return(
    <div className="app"><style>{css}</style>
      <nav className="nav">
        <div className="logo" onClick={()=>navThen("home")}><div className="logo-i">↔</div>SlateCue</div>
        <div className="nav-links">
          <span className={page==="home"?"act":""} onClick={()=>navigate("home")}>Home</span>
          <span className={page==="search"?"act":""} onClick={()=>navigate("search")}>Browse Castings</span>
          <span className={page==="classes"?"act":""} onClick={()=>navigate("classes")}>Classes</span>
          <span className={page==="pricing"?"act":""} onClick={()=>navigate("pricing")}>Pricing</span>
          <span className={page==="blog"?"act":""} onClick={()=>navigate("blog")}>Blog</span>
        </div>
        <div className="nav-actions" style={{display:"flex",gap:10,alignItems:"center"}}>
          {!authReady?null:isLoggedIn?<>
            {isAdmin&&<button className="btn-s btn-sm" onClick={()=>navigate("admin")} style={{borderColor:"var(--acc)",color:"var(--acc)"}}>Admin</button>}
            {/* CD Dashboard is available to anyone with CD-capable user_type — admin/super_admin inherit CD posting+review. */}
            {["cd","admin","super_admin"].includes(myProfile?.user_type)?<button className="btn-s btn-sm" onClick={()=>navigate("dashboard")}>Dashboard</button>:null}
            <button className="btn-s btn-sm" onClick={()=>navigate("my-profile")}>{myProfile?.display_name?.split(" ")[0]||"Profile"}</button>
            <button className="btn-p btn-sm" onClick={signOut}>Sign out</button>
          </>:<>
            <button className="btn-s btn-sm" onClick={()=>navigate("register-talent")}>Join</button>
            <button className="btn-s btn-sm" onClick={()=>navigate("register-cd")}>Post a Job</button>
            <button className="btn-p btn-sm" onClick={()=>navigate("login")}>Sign in</button>
          </>}
        </div>
        <button className="nav-burger" aria-label="Menu" onClick={()=>setMenuOpen(o=>!o)} style={{display:"none",background:"none",border:"1px solid var(--bdr)",borderRadius:8,width:40,height:40,cursor:"pointer",alignItems:"center",justifyContent:"center",padding:0}}>
          <span style={{display:"block",width:18,height:2,background:"var(--t1)",boxShadow:"0 -5px 0 var(--t1), 0 5px 0 var(--t1)"}}></span>
        </button>
      </nav>
      {menuOpen&&<div className="mobile-menu" onClick={()=>setMenuOpen(false)}>
        <div className="mobile-menu-inner" onClick={e=>e.stopPropagation()}>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            <button className="mm-link" onClick={()=>navThen("home")}>Home</button>
            <button className="mm-link" onClick={()=>navThen("search")}>Browse Castings</button>
            <button className="mm-link" onClick={()=>navThen("classes")}>Classes</button>
            <button className="mm-link" onClick={()=>navThen("pricing")}>Pricing</button>
            <button className="mm-link" onClick={()=>navThen("blog")}>Blog</button>
            <button className="mm-link" onClick={()=>navThen("resources")}>Resources</button>
            <button className="mm-link" onClick={()=>navThen("success-stories")}>Success Stories</button>
            <button className="mm-link" onClick={()=>navThen("about")}>About</button>
            <button className="mm-link" onClick={()=>navThen("contact")}>Contact</button>
          </div>
          <div style={{borderTop:"1px solid var(--bdr)",marginTop:12,paddingTop:12,display:"flex",flexDirection:"column",gap:8}}>
            {!authReady?null:isLoggedIn?<>
              {isAdmin&&<button className="btn-s btn-sm" onClick={()=>navThen("admin")} style={{borderColor:"var(--acc)",color:"var(--acc)"}}>Admin</button>}
              {["cd","admin","super_admin"].includes(myProfile?.user_type)?<button className="btn-s btn-sm" onClick={()=>navThen("dashboard")}>Dashboard</button>:null}
              <button className="btn-s btn-sm" onClick={()=>navThen("my-profile")}>{myProfile?.display_name?.split(" ")[0]||"Profile"}</button>
              <button className="btn-p btn-sm" onClick={doSignOut}>Sign out</button>
            </>:<>
              <button className="btn-s btn-sm" onClick={()=>navThen("register-talent")}>Join as Talent</button>
              <button className="btn-s btn-sm" onClick={()=>navThen("register-cd")}>Post a Job</button>
              <button className="btn-p btn-sm" onClick={()=>navThen("login")}>Sign in</button>
            </>}
          </div>
        </div>
      </div>}
      {page==="home"&&<Landing onNavigate={navigate}/>}
      {page==="search"&&<SearchPage onViewProfile={viewProfile} userType={userType} onNavigate={navigate} isLoggedIn={isLoggedIn} onRequireAuth={requireAuth} castingsVersion={castingsVersion} session={session} myProfile={myProfile} onViewCasting={(c)=>{setPrevPage("search");setViewingCasting(c);window.scrollTo(0,0);setPage("casting-detail");}}/>}
      {page==="casting-detail"&&viewingCasting&&<CastingDetailPage key={viewingCasting.id} casting={viewingCasting} isLoggedIn={isLoggedIn} onRequireAuth={requireAuth} onBack={()=>{setPage("search");setViewingCasting(null);window.scrollTo(0,0);}} onNavigate={navigate}/>}
      {page==="auth-gate"&&<AuthGate pending={pendingApply} onComplete={completeAuth} onNavigate={navigate} onCancel={()=>{setPendingApply(null);setPage(viewingCasting?"casting-detail":"search");}}/>}
      {page==="dashboard"&&<CDDashboard onViewProfile={viewProfile} onNavigate={navigate} session={session} myProfile={myProfile} castingsVersion={castingsVersion} bumpCastings={bumpCastings}/>}
      {page==="profile"&&viewingProfile&&<TalentProfile talent={viewingProfile} onBack={()=>{setPage(prevPage);setViewingProfile(null);}} onNavigate={navigate} session={session} myProfile={myProfile}/>}
      {page==="my-profile"&&isLoggedIn&&<MyProfilePage session={session} profile={myProfile} onReload={()=>loadProfile(session?.user?.id)} onNavigate={navigate}/>}
      {page==="admin"&&isLoggedIn&&isAdmin&&<AdminPage session={session} profile={myProfile} isSuperAdmin={isSuperAdmin} onNavigate={navigate}/>}
      {page==="register-talent"&&<RegisterTalent onNavigate={navigate}/>}
      {page==="register-cd"&&<RegisterCD onNavigate={navigate}/>}
      {page==="login"&&<LoginPage onNavigate={navigate} onLoggedIn={onLoggedIn}/>}
      {page==="reset-password"&&<ResetPasswordPage onNavigate={navigate} session={session}/>}
      {page==="about"&&<AboutPage onNavigate={navigate}/>}
      {page==="blog"&&<BlogPage onNavigate={navigate}/>}
      {page==="classes"&&<ClassesPage onNavigate={navigate}/>}
      {page==="contact"&&<ContactPage onNavigate={navigate}/>}
      {page==="resources"&&<ResourcesPage onNavigate={navigate}/>}
      {page==="success-stories"&&<SuccessStoriesPage onNavigate={navigate}/>}
      {page==="pricing"&&<PricingPage onNavigate={navigate}/>}
      {page==="studios"&&<StudiosPage onNavigate={navigate}/>}
      {page==="api-info"&&<ApiPage onNavigate={navigate}/>}
      {page==="terms"&&<TermsPage onNavigate={navigate}/>}
      {page==="privacy"&&<PrivacyPage onNavigate={navigate}/>}
      {page==="careers"&&<CareersPage onNavigate={navigate}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  </script>
</body>
</html>
