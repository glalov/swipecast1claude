<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CastSlate — Tagline Logos (colored, pulsing)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,600;8..60,700;8..60,900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#F7F4EE;--bdr:#E5DFD2;--t1:#1A1A2E;--t2:#5A5A72;--t3:#8E8EA0;--teal:#4F8A8B;--amber:#E8902A;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--t1);-webkit-font-smoothing:antialiased;padding:40px 0 80px;}
  .wrap{max-width:1000px;margin:0 auto;padding:0 28px;}
  .eyebrow{font-family:'DM Sans',sans-serif;font-weight:700;font-size:11.5px;letter-spacing:1.8px;text-transform:uppercase;color:var(--teal);display:inline-flex;align-items:center;gap:8px;margin:0 0 10px;}
  .eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--amber);box-shadow:0 0 10px var(--amber);}
  .note{font-size:13px;color:var(--t3);margin:0 0 8px;}

  .stage{padding:60px 24px;text-align:center;}
  .lead{font-family:'DM Sans',sans-serif;font-weight:700;font-size:13px;letter-spacing:2.4px;text-transform:uppercase;color:var(--t3);margin:0 0 16px;}
  .names{font-family:'Source Serif 4',serif;font-weight:900;font-size:clamp(40px,7vw,74px);letter-spacing:-1px;line-height:1.05;margin:0;}
  .names .a24{color:#0A0A0A;animation:glowdark 3s ease-in-out infinite;}
  .names .neon{color:#FF2D6F;text-shadow:0 0 22px rgba(255,45,111,.45);animation:glow 2.8s ease-in-out infinite;}
  .names .netflix{color:#E50914;text-shadow:0 0 22px rgba(229,9,20,.45);animation:glow 2.8s ease-in-out infinite .7s;}
  .names .sep{color:var(--t3);font-weight:400;}
  .trail{display:block;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;letter-spacing:.5px;color:var(--t2);margin-top:16px;}
  @keyframes glow{0%,100%{filter:brightness(1);text-shadow:0 0 16px rgba(0,0,0,0);}50%{filter:brightness(1.18);}}
  @keyframes glowdark{0%,100%{opacity:1;}50%{opacity:.82;}}
  @media(prefers-reduced-motion:reduce){.names span{animation:none!important;}}
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow"><span class="dot"></span>Tagline — colored logos, pulsing, no card</p>
  <p class="note">On the cream background, brand colors gently pulsing like lit signage.</p>

  <div class="stage">
    <p class="lead">From indie films to</p>
    <p class="names"><span class="a24">A24</span> <span class="sep">·</span> <span class="neon">Neon</span> <span class="sep">·</span> <span class="netflix">Netflix</span></p>
    <span class="trail">— level projects</span>
  </div>
</div>
</body>
</html>
