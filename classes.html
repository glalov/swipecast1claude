  <script>
    /* ── Runtime error infrastructure ────────────────────────────────────────
       The crash screen means "the app did NOT start" — NOT merely "an error
       fired." A single stray error (browser extension, injected assistant
       script, a cross-origin "Script error.", a benign ResizeObserver loop)
       must never blank an app that was about to render fine. So error handlers
       only LOG; a polling verify-mount check is the ONLY thing that shows the
       crash screen, and only when React genuinely rendered nothing in time.
       Errors AFTER React mounts are caught per-section by ErrorBoundary.
    ──────────────────────────────────────────────────────────────────────── */
    window.__CS_LOADING_STARTED = Date.now();
    window.__CS_REACT_MOUNTED   = false;
    window.__SC_ERR             = [];
    window.__CS_PRE_COMPILED    = true;

    window.__CS_HIDE_LOADING = function(){
      var el = document.getElementById('cs-loading');
      if(el){ el.classList.add('hide'); setTimeout(function(){el.style.display='none';},350); }
    };

    var showDebug = (window.location.search||'').indexOf('debug')!==-1;

    function csShowCrash(msg){
      var ld=document.getElementById('cs-loading'); if(ld) ld.style.display='none';
      var er=document.getElementById('cs-error');   if(er) er.style.display='flex';
      if(showDebug && msg){
        var d=document.getElementById('cs-err-detail');
        if(d){d.style.display='block';d.textContent=msg;}
      }
    }

    /* Noise we never count as a real failure (browser/extension chatter). */
    function csIsBenign(msg){ return /ResizeObserver loop|^Script error\.?$/i.test(msg||''); }

    /* Log uncaught errors for diagnostics only — do NOT show the crash screen
       here. The verify-mount poll below decides whether the app truly failed. */
    window.addEventListener('error', function(e){
      var msg = (e.message||'unknown') + '\n' + (e.filename||'?') + ':' + (e.lineno||0);
      if(!csIsBenign(e.message)) window.__SC_ERR.push({type:'error', msg:msg, ts:new Date().toISOString()});
      console.error('[CS error]', msg);
    });
    window.addEventListener('unhandledrejection', function(e){
      var msg = (e.reason && e.reason.message) ? e.reason.message : String(e.reason||'unknown rejection');
      window.__SC_ERR.push({type:'rejection', msg:msg, ts:new Date().toISOString()});
      console.error('[CS unhandled rejection]', msg);
    });

    /* Verify-mount — the ONLY path to the crash screen. Poll until React mounts
       (flag set by App's first effect, or #root has painted children). Show the
       crash UI only if nothing rendered within the grace window — a genuine
       startup failure, never a stray error on an otherwise-healthy load.
       30s grace is generous for slow mobile networks; a fast boot clears it
       within a couple hundred ms. */
    (function(){
      var DEADLINE = Date.now() + 30000;
      (function poll(){
        if(window.__CS_REACT_MOUNTED) return;
        var root=document.getElementById('root');
        if(root && root.childElementCount>0){ window.__CS_REACT_MOUNTED=true; return; }
        if(Date.now()>=DEADLINE){
          var elapsed=Math.round((Date.now()-window.__CS_LOADING_STARTED)/1000);
          var errList=window.__SC_ERR.map(function(e){return e.msg;}).join('\n');
          csShowCrash('App did not start within '+elapsed+'s.\n'+(errList||'No JS errors captured — likely a network issue.'));
          return;
        }
        setTimeout(poll, 400);
      })();
    })();
  </script>
