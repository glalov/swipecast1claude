<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CastSlate — Actor Headshots Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F7F4EE; --s3:#E8E0D0; --bdr:#E5DFD2;
    --t1:#1A1A2E; --t2:#5A5A72; --t3:#8E8EA0;
    --teal:#4F8A8B; --teal-dk:#37696A; --amber:#E8902A; --grn:#1B873E;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);font-family:'Inter',sans-serif;color:var(--t1);
    -webkit-font-smoothing:antialiased;padding:48px 0 80px;}
  .wrap{max-width:1240px;margin:0 auto;padding:0 28px;}
  .eyebrow{font-family:'DM Sans',sans-serif;font-weight:700;font-size:11.5px;letter-spacing:1.8px;
    text-transform:uppercase;color:var(--teal);display:inline-flex;align-items:center;gap:8px;margin:0 0 14px;}
  .eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--amber);box-shadow:0 0 10px var(--amber);}
  h1{font-family:'DM Sans',sans-serif;font-weight:800;font-size:clamp(30px,4vw,46px);letter-spacing:-1.2px;
    line-height:1.08;margin:0 0 12px;}
  .lede{font-size:16px;color:var(--t2);line-height:1.6;max-width:560px;margin:0 0 40px;}

  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:22px;}
  @media(max-width:1100px){.grid{grid-template-columns:repeat(3,1fr);}}
  @media(max-width:720px){.grid{grid-template-columns:repeat(2,1fr);}}
  @media(max-width:460px){.grid{grid-template-columns:1fr;}}

  .card{background:#fff;border:1px solid var(--bdr);border-radius:18px;overflow:hidden;
    box-shadow:0 18px 40px -30px rgba(26,26,46,.4),0 2px 6px rgba(26,26,46,.04);
    transition:transform .18s ease,box-shadow .18s ease;cursor:pointer;}
  .card:hover{transform:translateY(-5px);box-shadow:0 30px 56px -28px rgba(26,26,46,.5);}
  .photo{position:relative;aspect-ratio:4/5;overflow:hidden;background:var(--s3);}
  .photo img{width:100%;height:100%;object-fit:cover;display:block;}
  .badge{position:absolute;top:10px;left:10px;background:rgba(26,26,46,.78);color:#fff;
    font-family:'DM Sans',sans-serif;font-weight:700;font-size:10px;letter-spacing:.6px;
    padding:5px 9px;border-radius:7px;backdrop-filter:blur(4px);}
  .badge.pro{background:linear-gradient(135deg,var(--amber),#C8761B);color:#1A1A2E;}
  .body{padding:14px 15px 16px;}
  .name{font-family:'DM Sans',sans-serif;font-weight:700;font-size:16px;letter-spacing:-.3px;margin:0 0 4px;}
  .meta{font-size:12px;color:var(--t3);line-height:1.5;}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px;}
  .tag{font-size:10.5px;font-weight:600;color:var(--teal-dk);background:rgba(79,138,139,.1);
    padding:4px 8px;border-radius:6px;}
</style>
</head>
<body>
  <div class="wrap">
    <p class="eyebrow"><span class="dot"></span>Featured Talent</p>
    <h1>Real actors. Real headshots.</h1>
    <p class="lede">Every profile is a real person reviewed one at a time — no thumbnail grids, no AI faces. Here's a sample roster.</p>

    <div class="grid" id="grid"></div>
  </div>

<script>
  var actors = [
    {id:614810, name:"Owen Fletcher",   meta:"28 · Los Angeles · SAG-AFTRA", tags:["Drama","Film"],        pro:true},
    {id:1239291,name:"Sofia Reyes",     meta:"24 · New York · SAG-AFTRA",    tags:["Comedy","TV"],          pro:true},
    {id:91227,  name:"Lucas Hartman",   meta:"26 · Atlanta · Non-Union",     tags:["Action","Commercial"],  pro:false},
    {id:733872, name:"Elena Marsh",     meta:"31 · Chicago · SAG-AFTRA",     tags:["Theater","Drama"],      pro:true},
    {id:1681010,name:"Malik Jensen",    meta:"22 · Brooklyn · Non-Union",    tags:["Indie","Music Video"],  pro:false},
    {id:415829, name:"Mei Tanaka",      meta:"25 · Los Angeles · SAG-AFTRA", tags:["Fashion","Commercial"], pro:true},
    {id:532220, name:"Adrian Cole",     meta:"34 · Miami · SAG-AFTRA",       tags:["Corporate","Film"],     pro:true},
    {id:762020, name:"Hannah Whitfield",meta:"23 · Austin · Non-Union",      tags:["Period","Theater"],     pro:false},
    {id:936119, name:"Jordan Ellis",    meta:"27 · Atlanta · SAG-AFTRA",     tags:["Comedy","Commercial"],  pro:true},
    {id:220453, name:"Daniel Brooks",   meta:"29 · Portland · Non-Union",    tags:["Drama","Indie"],        pro:false}
  ];
  var grid = document.getElementById('grid');
  actors.forEach(function(a){
    var url = "https://images.pexels.com/photos/"+a.id+"/pexels-photo-"+a.id+".jpeg?auto=compress&cs=tinysrgb&w=600&h=750&fit=crop";
    var tags = a.tags.map(function(t){return '<span class="tag">'+t+'</span>';}).join('');
    var badge = a.pro ? '<span class="badge pro">ACTOR PLUS</span>' : '<span class="badge">FREE</span>';
    grid.insertAdjacentHTML('beforeend',
      '<div class="card">'+
        '<div class="photo">'+badge+'<img src="'+url+'" alt="'+a.name+'" loading="lazy"/></div>'+
        '<div class="body">'+
          '<p class="name">'+a.name+'</p>'+
          '<div class="meta">'+a.meta+'</div>'+
          '<div class="tags">'+tags+'</div>'+
        '</div>'+
      '</div>');
  });
</script>
</body>
</html>
