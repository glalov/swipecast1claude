<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CastSlate — Hero Serif v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&family=Newsreader:opsz,wght@6..72,600;6..72,700&family=Lora:wght@600;700&family=Spectral:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F7F4EE; --bdr:#E5DFD2;
    --t1:#1A1A2E; --t2:#5A5A72; --t3:#8E8EA0;
    --teal:#4F8A8B; --teal-dk:#37696A; --amber:#E8902A; --amber-dk:#C8761B; --grn:#1B873E;
    --serif:'Source Serif 4',serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);font-family:'Inter',sans-serif;color:var(--t1);-webkit-font-smoothing:antialiased;}

  .ctrl{position:sticky;top:0;z-index:20;background:#1A1A2E;color:#fff;padding:12px 24px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;font-size:13px;}
  .ctrl b{font-family:'DM Sans',sans-serif;font-weight:700;}
  .ctrl .seg{display:flex;gap:4px;background:rgba(255,255,255,.1);padding:4px;border-radius:10px;}
  .ctrl button{font-family:'Inter';font-size:12.5px;font-weight:600;border:none;cursor:pointer;background:transparent;color:rgba(255,255,255,.7);padding:7px 13px;border-radius:7px;transition:.15s;}
  .ctrl button.on{background:#fff;color:#1A1A2E;}
  .ctrl .hint{color:rgba(255,255,255,.55);font-size:12px;}

  .nav{background:#fff;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:70px;}
  .brand{display:flex;align-items:center;gap:9px;font-family:'DM Sans',sans-serif;font-weight:800;font-size:20px;letter-spacing:-.5px;}
  .brand .logo{width:32px;height:32px;border-radius:8px;background:var(--t1);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;}
  .nav-links{display:flex;gap:4px;}
  .nav-links span{color:#0A0A0A;font-size:13px;font-weight:500;padding:8px 12px;border-radius:9px;}
  .nav-links .mm{color:var(--amber-dk);font-weight:600;background:rgba(232,144,42,.10);}
  .nav-actions{display:flex;gap:9px;align-items:center;}
  .btn-join{background:var(--teal);color:#fff;border:none;border-radius:10px;padding:9px 16px;font-weight:700;font-size:13px;font-family:'DM Sans',sans-serif;}
  .btn-ghost{background:#fff;border:1px solid var(--bdr);border-radius:10px;padding:9px 16px;font-weight:600;font-size:13px;color:var(--t1);}
  @media(max-width:900px){.nav-links{display:none;}}

  .opt{border-bottom:1px dashed var(--bdr);}
  .opt:last-child{border-bottom:none;}
  .tag{max-width:1180px;margin:0 auto;padding:26px 40px 0;display:flex;align-items:baseline;gap:12px;}
  .tag .n{font-family:'DM Sans',sans-serif;font-weight:800;font-size:12px;color:#fff;background:var(--teal);width:24px;height:24px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;}
  .tag .nm{font-family:'DM Sans',sans-serif;font-weight:700;font-size:14px;color:var(--t2);}

  .hero{max-width:1180px;margin:0 auto;padding:18px 40px 48px;display:grid;grid-template-columns:1.1fr .9fr;gap:52px;align-items:center;}
  @media(max-width:900px){.hero{grid-template-columns:1fr;gap:30px;}}

  .badge{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--bdr);background:#fff;border-radius:100px;padding:7px 14px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:10.5px;letter-spacing:.8px;color:var(--t2);margin-bottom:22px;}
  .badge .dot{width:7px;height:7px;border-radius:50%;background:var(--grn);box-shadow:0 0 8px var(--grn);}
  h1{font-family:var(--serif);font-weight:700;font-size:clamp(38px,4.8vw,60px);line-height:1.04;letter-spacing:-1px;margin:0 0 20px;color:var(--t1);}
  .sub{font-size:clamp(15px,1.5vw,18px);line-height:1.6;color:var(--t2);max-width:470px;margin:0 0 26px;}
  .cta-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
  .btn-p{background:var(--t1);color:#fff;border:none;border-radius:12px;padding:15px 26px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:15px;cursor:pointer;}
  .btn-s{background:#fff;border:1px solid var(--bdr);border-radius:12px;padding:15px 24px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:15px;color:var(--t1);}
  .checks{display:flex;gap:22px;flex-wrap:wrap;font-size:12.5px;color:var(--t3);}
  .checks span{display:flex;align-items:center;gap:6px;}.checks b{color:var(--grn);}
  .shot{aspect-ratio:4/5;border-radius:22px;overflow:hidden;background:#ddd;box-shadow:0 30px 70px -34px rgba(26,26,46,.5);max-width:380px;margin-left:auto;}
  .shot img{width:100%;height:100%;object-fit:cover;object-position:center 20%;display:block;}
</style>
</head>
<body>
  <div class="ctrl">
    <b>Serif font:</b>
    <div class="seg" id="fontseg">
      <button data-f="'Source Serif 4',serif" class="on">Source Serif</button>
      <button data-f="'Newsreader',serif">Newsreader</button>
      <button data-f="'Lora',serif">Lora</button>
      <button data-f="'Spectral',serif">Spectral</button>
    </div>
    <span class="hint">All solid black, no italics. Source Serif is the closest to Backstage's Tiempos.</span>
  </div>

  <div class="nav">
    <div class="brand"><span class="logo">⇄</span>CastSlate</div>
    <div class="nav-links"><span>Home</span><span>Browse Castings</span><span>Classes</span><span>TapeLink</span><span class="mm">Manager Mode</span><span>Blog</span></div>
    <div class="nav-actions"><button class="btn-join">Join ▾</button><button class="btn-ghost">Post a Job</button><button class="btn-ghost">Sign in</button></div>
  </div>

  <div id="opts"></div>

<script>
  var opts = [
    {
      nm:'Value-forward',
      h:'Modern casting that gives every actor a real look.',
      sub:'A visual-first platform where indie filmmakers and undiscovered talent meet — browsed one profile at a time, never lost in a grid.'
    },
    {
      nm:'Connection angle',
      h:'Where independent storytellers and undiscovered talent find each other.',
      sub:'Browse, get seen, and connect directly. Actors join free and submit free — no crowded grids, no gatekeepers.'
    },
    {
      nm:'Cadence (Backstage-style)',
      h:'Get discovered. Get seen. Get cast — one profile at a time.',
      sub:'The modern casting platform for indie filmmakers, student directors, and the actors who deserve to be seen.'
    }
  ];
  var imgs = [
    'https://images.pexels.com/photos/614810/pexels-photo-614810.jpeg?auto=compress&cs=tinysrgb&w=600&h=750&fit=crop',
    'https://images.pexels.com/photos/762020/pexels-photo-762020.jpeg?auto=compress&cs=tinysrgb&w=600&h=750&fit=crop',
    'https://images.pexels.com/photos/1681010/pexels-photo-1681010.jpeg?auto=compress&cs=tinysrgb&w=600&h=750&fit=crop'
  ];
  var box=document.getElementById('opts');
  opts.forEach(function(o,i){
    box.insertAdjacentHTML('beforeend',
      '<div class="opt">'+
        '<div class="tag"><span class="n">'+(i+1)+'</span><span class="nm">'+o.nm+'</span></div>'+
        '<div class="hero">'+
          '<div>'+
            '<span class="badge"><span class="dot"></span>LIVE NOW · TRUSTED BY WORKING ACTORS &amp; CASTING DIRECTORS</span>'+
            '<h1>'+o.h+'</h1>'+
            '<p class="sub">'+o.sub+'</p>'+
            '<div class="cta-row"><button class="btn-p">Create My Free Profile →</button><button class="btn-s">I\'m a Casting Director</button></div>'+
            '<div class="checks"><span><b>✓</b> Free actor account — Premium at $9.99/mo</span><span><b>✓</b> No credit card to sign up</span></div>'+
          '</div>'+
          '<div><div class="shot"><img src="'+imgs[i]+'" alt=""/></div></div>'+
        '</div>'+
      '</div>');
  });
  document.getElementById('fontseg').addEventListener('click',function(e){
    var b=e.target.closest('button'); if(!b)return;
    document.querySelectorAll('#fontseg button').forEach(x=>x.classList.remove('on')); b.classList.add('on');
    document.documentElement.style.setProperty('--serif', b.dataset.f);
  });
</script>
</body>
</html>
